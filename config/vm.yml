# =============================================================================
# Talos Kubernetes Cluster
# =============================================================================
# 3-node cluster with combined control plane + worker roles
# Cilium CNI with L2 announcements for VIP (10.0.3.19)

talos_trinity:
  id: 1030
  name: "talos-trinity"
  role: "controlplane"
  node: "trinity"
  cores: 8
  memory: 32768
  disk_gb: 128
  disk_datastore: "local-lvm"
  legacy_etcd_disk_gb: 32
  ci_scratch_disk_gb: 256
  ip: "10.0.3.16"
  gateway: "10.0.3.1"

talos_neo:
  id: 1031
  name: "talos-neo"
  role: "controlplane"
  node: "neo"
  cores: 32
  memory: 49152
  # GPU node still carries heavier image/runtime churn than the other CI nodes.
  # CI build scratch lives on ci_scratch_disk_gb, not on this root disk.
  disk_gb: 192
  disk_datastore: "local-lvm"
  legacy_etcd_disk_gb: 32
  ci_scratch_disk_gb: 256
  gpu: true
  gpu_pool: "blackwell"
  gpu_class: "rtx-pro-6000-blackwell"
  gpu_hostpci_id: "0000:01:00.0"
  gpu_rom_file: "rtx6000.rom"
  # Local NVMe (local-lvm on neo) for GPU model/state storage. Mounted on the
  # Talos node at /var/mnt/gpu-storage and exposed to k8s via a static local PV.
  gpu_storage_disk_gb: 500
  ip: "10.0.3.17"
  gateway: "10.0.3.1"

talos_niobe:
  id: 1032
  name: "talos-niobe"
  role: "controlplane"
  node: "niobe"
  cores: 8
  memory: 24576
  disk_gb: 128
  disk_datastore: "local-fast"
  legacy_etcd_disk_gb: 32
  legacy_etcd_disk_datastore: "local-fast"
  ci_scratch_disk_gb: 256
  ip: "10.0.3.18"
  gateway: "10.0.3.1"

talos_smith:
  id: 1034
  name: "talos-smith"
  role: "worker"
  node: "smith"
