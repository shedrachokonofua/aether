# =============================================================================
# Talos Kubernetes Cluster
# =============================================================================
# 3-node VM control plane, 1 additional VM worker, and 4 bare-metal ARM workers
# Cilium CNI with L2 announcements for VIP (10.0.3.19)

talos_trinity:
  id: 1030
  name: "talos-trinity"
  role: "controlplane"
  node: "trinity"
  cores: 8
  memory: 32768
  disk_gb: 128
  disk_datastore: "local-lvm"
  ci_disk_gb: 128
  ip: "10.0.3.16"
  gateway: "10.0.3.1"

talos_neo:
  id: 1031
  name: "talos-neo"
  role: "controlplane"
  node: "neo"
  cores: 32
  memory: 65536
  # GPU node still carries heavier image/runtime churn than the other CI nodes.
  # CI build scratch lives on ci_disk_gb, not on this root disk.
  disk_gb: 256
  disk_datastore: "local-lvm"
  ci_disk_gb: 128
  gpu: true
  # uinput extension + module + userns sysctl for the Sunshine game-server.
  # Moved here from smith: neo's Ryzen 9 9950X handles PS3 (RPCS3) emulation
  # far better than smith's 3700X. neo is control-plane, so the game pod runs
  # with a bounded CPU request (no exclusive pinning) to protect etcd.
  gpu_input: true
  gpu_pool: "blackwell"
  gpu_class: "rtx-pro-6000-blackwell"
  gpu_hostpci_id: "0000:01:00.0"
  gpu_rom_file: "rtx6000.rom"
  # Local NVMe (local-lvm on neo) for GPU model/state storage. Mounted on the
  # Talos node at /var/mnt/gpu-storage and exposed to k8s via a static local PV.
  gpu_storage_disk_gb: 500
  ip: "10.0.3.17"
  gateway: "10.0.3.1"

talos_niobe:
  id: 1032
  name: "talos-niobe"
  role: "controlplane"
  node: "niobe"
  cores: 8
  memory: 24576
  disk_gb: 128
  disk_datastore: "local-fast"
  ci_disk_gb: 128
  ip: "10.0.3.18"
  gateway: "10.0.3.1"

talos_smith:
  id: 1034
  name: "talos-smith"
  role: "worker"
  node: "smith"
  cores: 12
  memory: 32768
  disk_gb: 128
  gpu: true
  gpu_input: true # uinput extension + module for the Sunshine game-server (kept as a fallback; primary host is now neo)
  gpu_pool: "turing"
  gpu_class: "gtx-1660-super"
  gpu_hostpci_id: "0000:0a:00.0"
  gpu_rom_file: "gtx1660super.rom"
  # smith is the fleet's busiest host; its TSC watchdog false-trips on CPU-busy
  # boots and demotes the invariant Zen2 TSC, falling to non-vDSO acpi_pm — which
  # turns every guest clock_gettime into a port-0x608 PIO vmexit (~300k/s, ~60%
  # of all KVM exits on this host). Pin TSC reliable so it survives busy boots.
  extra_kernel_args:
    - "tsc=reliable"
  ip: "10.0.3.22"
  gateway: "10.0.3.1"

talos_mouse:
  name: "talos-mouse"
  role: "worker"
  platform: "baremetal"
  arch: "arm64"
  hardware: "rpi"
  pool: "arm"
  model: "raspberry-pi-4"
  install_disk: "/dev/mmcblk0"
  network_interface: "end0"
  ip: "10.0.3.25"
  gateway: "10.0.3.1"
