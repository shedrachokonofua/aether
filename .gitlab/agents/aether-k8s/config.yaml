# GitLab Agent for Kubernetes - CI Access Configuration
# Jobs under the "so" group are forced through a fixed Kubernetes
# impersonation identity. RBAC for that identity is declared in
# tofu/home/kubernetes/gitlab_agent.tf; the agent service account only gets
# the right to impersonate this identity, not direct cluster-admin.

ci_access:
  groups:
    - id: so
      access_as:
        impersonate:
          username: gitlab-ci:so
          groups:
            - gitlab-ci:so
