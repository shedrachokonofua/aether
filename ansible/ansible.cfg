[defaults]
inventory = ./inventory/
roles_path = ./roles
# Disable host key checking, VMs are frequently recreated
host_key_checking = False

[ssh_connection]
# ControlMaster/Persist matter: setting ssh_args REPLACES Ansible's defaults,
# which silently disabled connection multiplexing - every task then opened a
# fresh SSH connection + logind session. The resulting session storm from big
# plays corrupted logind on monitoring-stack (2026-07-17, user@1000 death took
# every quadlet down). One multiplexed connection per host instead.
ssh_args = -o ServerAliveInterval=30 -o ControlMaster=auto -o ControlPersist=60s
pipelining = True
