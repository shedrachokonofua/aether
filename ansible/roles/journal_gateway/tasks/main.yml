---
- name: Validate journal_gateway inputs
  ansible.builtin.assert:
    that:
      - journal_gateway_bind_address | length > 0
      - (not journal_gateway_tls_enabled) or (journal_gateway_step_ca_provisioner_password | length > 0)
    fail_msg: >-
      journal_gateway needs a bind address (and, in TLS mode, the step-ca
      provisioner password) on {{ inventory_hostname }}.
    quiet: true

- name: Install systemd-journal-gatewayd
  ansible.builtin.package:
    name: systemd-journal-remote
    state: present
  become: true

- name: Create gatewayd socket drop-in directory
  ansible.builtin.file:
    path: /etc/systemd/system/systemd-journal-gatewayd.socket.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Bind gatewayd socket to the intended address
  ansible.builtin.template:
    src: socket-override.conf.j2
    dest: /etc/systemd/system/systemd-journal-gatewayd.socket.d/override.conf
    owner: root
    group: root
    mode: "0644"
  become: true
  notify:
    - reload journal-gatewayd systemd
    - restart journal-gatewayd socket

# Debian systemd is openssl-built, so gatewayd's own --trust (client mTLS) is
# unavailable. Remove any mTLS service drop-in; TLS is handled by ghostunnel.
- name: Remove obsolete gatewayd mTLS service drop-in
  ansible.builtin.file:
    path: /etc/systemd/system/systemd-journal-gatewayd.service.d/override.conf
    state: absent
  become: true
  notify:
    - reload journal-gatewayd systemd
    - restart journal-gatewayd service

# ---------------------------------------------------------------------------
# TLS mode (Proxmox hosts): ghostunnel mTLS terminator in front of loopback gatewayd
# ---------------------------------------------------------------------------
- name: Configure gatewayd mTLS (ghostunnel)
  when: journal_gateway_tls_enabled | bool
  become: true
  block:
    - name: Download pinned ghostunnel binary
      ansible.builtin.get_url:
        url: "{{ journal_gateway_ghostunnel_download_url }}"
        dest: /tmp/ghostunnel-linux-amd64
        checksum: "sha256:{{ journal_gateway_ghostunnel_sha256 }}"
        mode: "0644"

    - name: Install ghostunnel binary
      ansible.builtin.copy:
        src: /tmp/ghostunnel-linux-amd64
        dest: "{{ journal_gateway_ghostunnel_binary }}"
        remote_src: true
        owner: root
        group: root
        mode: "0755"
      notify: restart journal-gatewayd ghostunnel

    - name: Check for step-cli
      ansible.builtin.stat:
        path: /usr/bin/step
      register: journal_gateway_step_stat

    - name: Install step-cli
      when: not journal_gateway_step_stat.stat.exists
      block:
        - name: Download step-cli
          ansible.builtin.get_url:
            url: "{{ journal_gateway_step_download_url }}"
            dest: /tmp/step_linux_amd64.tar.gz
            mode: "0644"
            timeout: 120

        - name: Extract step-cli
          ansible.builtin.unarchive:
            src: /tmp/step_linux_amd64.tar.gz
            dest: /tmp
            remote_src: true

        - name: Install step-cli binary
          ansible.builtin.copy:
            src: /tmp/step_linux_amd64/bin/step
            dest: /usr/bin/step
            remote_src: true
            owner: root
            group: root
            mode: "0755"

    - name: Create gatewayd TLS and step directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0700"
      loop:
        - "{{ journal_gateway_tls_dir }}"
        - "{{ journal_gateway_step_dir }}"

    - name: Fetch step-ca root certificate
      ansible.builtin.get_url:
        url: "{{ journal_gateway_step_ca_url }}/roots.pem"
        dest: /tmp/journal-gateway-step-root.pem
        mode: "0644"
        validate_certs: false

    - name: Get step-ca root fingerprint
      ansible.builtin.command:
        cmd: step certificate fingerprint /tmp/journal-gateway-step-root.pem
      register: journal_gateway_ca_fingerprint
      changed_when: false

    - name: Bootstrap step-ca trust for gatewayd renewal
      ansible.builtin.command:
        cmd: >
          step ca bootstrap
          --ca-url={{ journal_gateway_step_ca_url }}
          --fingerprint={{ journal_gateway_ca_fingerprint.stdout }}
          --force
      environment:
        STEPPATH: "{{ journal_gateway_step_dir }}"
      args:
        creates: "{{ journal_gateway_step_dir }}/certs/root_ca.crt"

    - name: Write step-ca provisioner password
      ansible.builtin.copy:
        content: "{{ journal_gateway_step_ca_provisioner_password }}"
        dest: "{{ journal_gateway_step_dir }}/provisioner-password.txt"
        owner: root
        group: root
        mode: "0600"
      no_log: true

    - name: Request gatewayd server certificate from step-ca
      ansible.builtin.command:
        cmd: >
          step ca certificate
          {{ journal_gateway_cert_cn }}
          {{ journal_gateway_cert_path }}
          {{ journal_gateway_key_path }}
          {% for san in journal_gateway_cert_sans %}--san={{ san }} {% endfor %}
          --provisioner={{ journal_gateway_step_ca_provisioner }}
          --provisioner-password-file={{ journal_gateway_step_dir }}/provisioner-password.txt
          --force
      environment:
        STEPPATH: "{{ journal_gateway_step_dir }}"
      args:
        creates: "{{ journal_gateway_cert_path }}"
      no_log: true
      notify: restart journal-gatewayd ghostunnel

    - name: Enforce gatewayd key permissions
      ansible.builtin.file:
        path: "{{ journal_gateway_key_path }}"
        owner: root
        group: root
        mode: "0600"

    - name: Fetch the journal-client CA (trust anchor)
      # The public CA endpoint is only reachable from the routed VLANs, not the
      # Gigahub network the hypervisors sit on. Fetch on the controller (the CA
      # pem is public, non-secret) and template it onto the host.
      ansible.builtin.uri:
        url: "{{ journal_gateway_pki_ca_pem_url }}"
        return_content: true
        validate_certs: false
      delegate_to: localhost
      become: false
      register: journal_gateway_ca_response

    - name: Set journal-client CA fact
      ansible.builtin.set_fact:
        journal_gateway_ca_pem: "{{ journal_gateway_ca_response.content | trim }}"

    - name: Render the journal-client trust bundle
      ansible.builtin.template:
        src: trust-bundle.crt.j2
        dest: "{{ journal_gateway_trust_path }}"
        owner: root
        group: root
        mode: "0644"
      notify: restart journal-gatewayd ghostunnel

    - name: Install ghostunnel systemd unit
      ansible.builtin.template:
        src: ghostunnel.service.j2
        dest: "/etc/systemd/system/{{ journal_gateway_ghostunnel_service }}"
        owner: root
        group: root
        mode: "0644"
      notify:
        - reload journal-gatewayd systemd
        - restart journal-gatewayd ghostunnel

    - name: Install gatewayd certificate renewal service
      ansible.builtin.template:
        src: cert-renew.service.j2
        dest: "/etc/systemd/system/{{ journal_gateway_cert_renew_service }}.service"
        owner: root
        group: root
        mode: "0644"
      notify: reload journal-gatewayd systemd

    - name: Remove step-ca root temporary file
      ansible.builtin.file:
        path: /tmp/journal-gateway-step-root.pem
        state: absent

    - name: Remove obsolete stunnel terminator artifacts
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/systemd/system/aether-journal-stunnel.service
        - /etc/stunnel/journal-gateway.conf
      register: journal_gateway_stunnel_removed

    - name: Stop and disable the obsolete stunnel terminator
      ansible.builtin.systemd:
        name: aether-journal-stunnel.service
        state: stopped
        enabled: false
        daemon_reload: true
      failed_when: false
      when: journal_gateway_stunnel_removed is changed

    - name: Remove ghostunnel temporary binary
      ansible.builtin.file:
        path: /tmp/ghostunnel-linux-amd64
        state: absent

- name: Flush journal-gatewayd handlers
  ansible.builtin.meta: flush_handlers

- name: Reset any failed gatewayd units before (re)starting
  ansible.builtin.command:
    cmd: systemctl reset-failed systemd-journal-gatewayd.socket systemd-journal-gatewayd.service {{ journal_gateway_ghostunnel_service }}
  become: true
  changed_when: false
  failed_when: false

- name: Enable and start the gatewayd socket
  ansible.builtin.systemd:
    name: systemd-journal-gatewayd.socket
    enabled: true
    state: started
    daemon_reload: true
  become: true

- name: Enable and start the ghostunnel mTLS terminator
  ansible.builtin.systemd:
    name: "{{ journal_gateway_ghostunnel_service }}"
    enabled: true
    state: started
    daemon_reload: true
  become: true
  when: journal_gateway_tls_enabled | bool

- name: Enable and start the gatewayd certificate renewal daemon
  ansible.builtin.systemd:
    name: "{{ journal_gateway_cert_renew_service }}.service"
    enabled: true
    state: started
    daemon_reload: true
  become: true
  when: journal_gateway_tls_enabled | bool
