---
aether_identity:
  fabric: aether
  site: null
  host: null
site_wireguard_interface: wg-site
site_wireguard_retired_interfaces: []
site_wireguard_mtu: 1380
site_wireguard_listen_port: null
site_wireguard_addresses: []
site_wireguard_peers: []
site_wireguard_source_address: null
site_wireguard_remote_prefixes: []
site_wireguard_policy_rules: []
site_wireguard_enable_forwarding: false
site_wireguard_topology_role: spoke
site_wireguard_input_allow_cidrs: []
site_wireguard_forward_allow_cidrs: []
# Per-service input allows to this host's own site address (spoke DNS, etc.).
# An optional daddr targets an additional local service address:
#   - { proto: udp, port: 53, daddr: 10.53.0.1, cidrs: [10.0.0.0/16] }
site_wireguard_service_allow: []
# Hub-only: spoke site addresses the monitoring source may scrape (forwarded).
site_wireguard_monitoring_targets: []
# Hub-only: generic forward allows (wg->wg), e.g. home DNS clients -> a spoke:
#   - { saddr: [10.0.0.0/16], daddr: 10.3.0.10, proto: udp, ports: [53] }
site_wireguard_service_forwards: []
site_wireguard_monitoring_source: 10.0.2.3
site_wireguard_monitoring_ports:
  - 19531
