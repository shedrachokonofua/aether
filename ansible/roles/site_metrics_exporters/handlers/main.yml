---
- name: Restart node exporter
  ansible.builtin.systemd:
    name: aether-node-exporter
    state: restarted
    daemon_reload: true
  become: true

- name: Restart WireGuard exporter
  ansible.builtin.systemd:
    name: aether-wireguard-exporter
    state: restarted
    daemon_reload: true
  become: true
