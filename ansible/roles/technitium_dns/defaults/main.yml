---
# Technitium DNS Server resolver on an Ubuntu spoke (rootful podman quadlet,
# cluster secondary ns3). Answers come from the shared
# config/technitium-settings.json (same source the nix LXC resolvers use),
# reconciled by scripts/technitium-apply.sh so blocklists/zones/upstreams
# never drift.
technitium_image: docker.io/technitium/dns-server:15.4.0
technitium_conf_dir: /opt/technitium/config
technitium_log_dir: /var/log/technitium
# Log Exporter NDJSON (per-client query attribution). A small systemd unit
# tails this into the journal so the agent-free pull path (journal-gatewayd ->
# otel_journal_forwarder -> Loki) carries it; the identifier is the Loki filter.
technitium_querylog_path: "{{ technitium_log_dir }}/query.ndjson"
technitium_querylog_syslog_identifier: technitium-querylog
technitium_apply_dir: /opt/technitium
technitium_server_domain: ns3.dns.home.shdr.ch

# Shared answer data (overrideable). aether_root is the repo root (inventory global).
technitium_settings_json_path: "{{ aether_root }}/config/technitium-settings.json"
technitium_apply_script_path: "{{ aether_root }}/scripts/technitium-apply.sh"

# Bound to the WireGuard site-edge IP (+ loopback) via dnsServerLocalEndPoints;
# an optional routed anycast address is added when technitium_anycast_ip is set.
# Never bind 0.0.0.0: an internet-facing resolver would be an open-resolver /
# topology-leak.
technitium_wg_ip: 10.3.0.10
# Optional routed anycast service address. Empty keeps the offsite node on its
# WireGuard address only.
technitium_anycast_ip: ""

# Cluster join: gated OFF by default (conservative default for a fresh Ubuntu
# Technitium node); the oci play sets it true for rama (ns3). Cross-WAN
# membership WORKS (2026-07-18): the offsite node needs BOTH the HTTPS cluster
# API (:53443) AND the DNS zone-transfer path (TCP :53 + TSIG) open to the
# primary IP, so the catalog + the dns.home.shdr.ch member zone (which carries
# the peers' DANE-EE TLSA records) replicate by AXFR/IXFR and inter-node DANE
# validation resolves authoritatively. The earlier "standalone-only" verdict
# was wrong - it had only the :53443 leg open, never :53. See the oci play's
# fabric legs. git+apply still reconciles blocklists/zones from one source.
technitium_cluster_enabled: false
# The ns2 primary admin password (sops), used only if the cluster gate is on.
technitium_primary_admin_password: "{{ secrets.technitium.cluster_admin_password | default('') }}"

# Run the full shared config (all 21 blocklists from config/technitium-settings.json)
# instead of the slim override below. Set true on hosts with the RAM for it
# (rama: 12GB). Default false keeps the slim list for constrained boxes.
technitium_full_blocklist: false

# Hard containment (2026-07-16/17 incident rule): the container must never be
# able to thrash the host. Default 700M/1700M suits a constrained box; hosts
# running the full list override upward (rama: 2g/3g). Swap absorbs
# blocklist-refresh spikes.
technitium_memory_limit: 700m
technitium_memory_swap_limit: 1700m
technitium_swapfile_size_mb: 2048

# Slim blocklist override for the 1 GB spoke: the shared 21-list set needs
# ~1 GB+ of RAM in Technitium. The offsite backup keeps baseline ad/tracker
# blocking only; full parity returns when the host is resized.
technitium_blocklist_urls:
  - "https://adguardteam.github.io/HostlistsRegistry/assets/filter_1.txt"
