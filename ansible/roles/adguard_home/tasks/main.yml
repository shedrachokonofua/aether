---
- name: Ensure podman is installed (Debian family; self-contained for --tags adguard)
  ansible.builtin.apt:
    name: podman
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true
  when: ansible_os_family == 'Debian'

- name: Ensure AdGuard Home directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0750"
  loop:
    - "{{ adguard_conf_dir }}"
    - "{{ adguard_work_dir }}"
  become: true

- name: Render AdGuardHome.yaml (shared settings + WG bind + admin)
  ansible.builtin.template:
    src: AdGuardHome.yaml.j2
    dest: "{{ adguard_conf_dir }}/AdGuardHome.yaml"
    mode: "0640"
  become: true
  notify: Restart adguard-home

# AdGuard runs in the host network namespace and binds ONLY the WireGuard
# site-edge IP (10.3.0.10) — reachable solely over the fabric, never the public
# interface (no open resolver / topology leak). The site_wireguard nft input
# chain governs :53 reachability via site_wireguard_service_allow.
- name: Deploy AdGuard Home podman quadlet
  containers.podman.podman_container:
    name: adguard-home
    image: "{{ adguard_image }}"
    network: host
    volumes:
      - "{{ adguard_conf_dir }}:/opt/adguardhome/conf:Z"
      - "{{ adguard_work_dir }}:/opt/adguardhome/work:Z"
    state: quadlet
    quadlet_options:
      - |
        [Service]
        Restart=on-failure
        RestartSec=30s
        TimeoutStartSec=120s
      - |
        [Install]
        WantedBy=default.target
  become: true
  notify: Restart adguard-home
