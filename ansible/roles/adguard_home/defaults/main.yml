---
# AdGuard Home resolver on an Ubuntu spoke (rootful podman quadlet).
# Answers come from the shared config/adguard-settings.json (same source the nix
# LXC resolvers use) so blocklists/rewrites/upstreams never drift.
adguard_image: docker.io/adguard/adguardhome:latest
adguard_conf_dir: /opt/adguardhome/conf
adguard_work_dir: /opt/adguardhome/work

# Shared answer data (overrideable). aether_root is the repo root (inventory global).
adguard_settings_json_path: "{{ aether_root }}/config/adguard-settings.json"

# Bound ONLY to the WireGuard site-edge IP (+ loopback); never 0.0.0.0. An
# internet-facing AdGuard would be an open-resolver / topology-leak.
adguard_wg_ip: 10.3.0.10

# Fabric CIDRs allowed to reach :53 on the wg interface (host firewall). Keep in
# sync with what this spoke actually routes (site_wireguard_remote_prefixes).
adguard_dns_allow_cidrs:
  - 10.0.0.0/16
  - 10.1.0.0/16
  - 10.254.0.2/32 # VyOS DNS-forwarder source over wg10 (home failover path)

adguard_web_interface: wg-site
# Web-UI admin credentials for the headless config. Reuse the existing AdGuard
# admin hash (same bcrypt the nix LXC resolvers use) so there's one admin login.
adguard_web_user: admin
adguard_web_password_hash: "{{ secrets.adguard_password_bcrypt }}"
