---
- name: Deploy Uptime Kuma
  hosts: uptime-monitor
  gather_facts: true
  become: true
  vars_files:
    - monitors.yml
  roles:
    - common
  tasks:
    - name: Create uptime-kuma system user
      user:
        name: uptime-kuma
        system: yes
        shell: /sbin/nologin
        create_home: no
        home: /opt/uptime-kuma

    - name: Download Nodesource setup script
      get_url:
        url: https://deb.nodesource.com/setup_20.x
        dest: /tmp/nodesource_setup.sh
        mode: '0755'

    - name: Run Nodesource setup script
      command: /tmp/nodesource_setup.sh
      args:
        creates: /etc/apt/sources.list.d/nodesource.list

    - name: Install Node.js, git, build-essential, and acl
      apt:
        name:
          - nodejs
          - git
          - build-essential
          - acl # Required for Ansible become_user file permissions
        state: present
        update_cache: yes

    - name: Check if /opt/uptime-kuma is a git repository
      stat:
        path: /opt/uptime-kuma/.git
      register: kuma_git_dir

    - name: Remove non-git /opt/uptime-kuma directory
      file:
        path: /opt/uptime-kuma
        state: absent
      when: not kuma_git_dir.stat.exists

    # Set directory ownership first to ensure the user can write to it
    - name: Ensure /opt/uptime-kuma exists and is owned by uptime-kuma
      file:
        path: /opt/uptime-kuma
        owner: uptime-kuma
        group: uptime-kuma
        state: directory

    - name: Clone Uptime Kuma repository
      become_user: uptime-kuma
      git:
        repo: https://github.com/louislam/uptime-kuma.git
        dest: /opt/uptime-kuma
        version: master # Track master branch
        force: yes
      register: kuma_clone

    - name: Check if Uptime Kuma is already built
      stat:
        path: /opt/uptime-kuma/node_modules
      register: kuma_node_modules

    - name: Set ownership of Uptime Kuma files
      file:
        path: /opt/uptime-kuma
        owner: uptime-kuma
        group: uptime-kuma
        recurse: yes
        state: directory

    - name: Run npm setup and build
      become_user: uptime-kuma
      command: npm run setup
      args:
        chdir: /opt/uptime-kuma
      when: kuma_clone.changed or not kuma_node_modules.stat.exists

    - name: Write systemd service file for Uptime Kuma
      copy:
        content: |
          [Unit]
          Description=Uptime Kuma - Self-hosted monitoring tool
          After=network.target

          [Service]
          Type=simple
          User=uptime-kuma
          WorkingDirectory=/opt/uptime-kuma
          ExecStart=/usr/bin/node server/server.js
          Restart=on-failure
          RestartSec=10
          Environment=PORT=3001 HOST=127.0.0.1

          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/uptime-kuma.service
        mode: '0644'
      notify: Restart Uptime Kuma

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

    - name: Start and enable Uptime Kuma service
      systemd:
        name: uptime-kuma
        state: started
        enabled: yes

    # Declarative GitOps Monitors Seeding
    - name: Write monitors configuration JSON file
      copy:
        content: "{{ monitors | to_json }}"
        dest: /opt/uptime-kuma/data/monitors.json
        owner: uptime-kuma
        group: uptime-kuma
        mode: '0644'

    - name: Write notification configuration JSON file
      copy:
        content: |
          {{
            {
              "name": "SES Email",
              "config": {
                "type": "smtp",
                "smtpHost": "email-smtp.us-east-1.amazonaws.com",
                "smtpPort": 587,
                "smtpSecure": false,
                "smtpUsername": tf_outputs.aws_ses_smtp_username.value,
                "smtpPassword": tf_outputs.aws_ses_smtp_password.value,
                "smtpFrom": "notifications@shdr.ch",
                "smtpTo": secrets.notification_email,
                "name": "SES Email"
              }
            } | to_nice_json
          }}
        dest: /opt/uptime-kuma/data/notification.json
        owner: uptime-kuma
        group: uptime-kuma
        mode: '0600'
      no_log: true

    - name: Write monitors sync python script
      copy:
        content: |
          import json
          import sqlite3
          import sys
          from datetime import datetime, timezone

          db_path = "/opt/uptime-kuma/data/kuma.db"
          monitors_file = "/opt/uptime-kuma/data/monitors.json"
          notification_file = "/opt/uptime-kuma/data/notification.json"

          try:
              with open(monitors_file, "r") as f:
                  desired_monitors = json.load(f)
          except Exception as e:
              print(f"Error loading monitors file: {e}")
              sys.exit(1)

          try:
              with open(notification_file, "r") as f:
                  notification_spec = json.load(f)
          except Exception as e:
              print(f"Error loading notification file: {e}")
              sys.exit(1)

          conn = sqlite3.connect(db_path)
          cursor = conn.cursor()

          def columns(table):
              cursor.execute(f"PRAGMA table_info({table})")
              return {row[1] for row in cursor.fetchall()}

          def timestamp():
              return datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M:%S")

          def filter_columns(table, values):
              available = columns(table)
              return {key: value for key, value in values.items() if key in available}

          def upsert_monitor(name, desired):
              monitor_columns = columns("monitor")
              cursor.execute("SELECT id FROM monitor WHERE name=?", (name,))
              row = cursor.fetchone()
              monitor_id = row[0] if row else None

              set_values = filter_columns("monitor", desired)
              if monitor_id is None:
                  keys = ", ".join(set_values.keys())
                  placeholders = ", ".join("?" for _ in set_values)
                  cursor.execute(
                      f"INSERT INTO monitor ({keys}) VALUES ({placeholders})",
                      tuple(set_values.values()),
                  )
                  print(f"Added monitor: {name}")
                  return cursor.lastrowid

              cursor.execute(
                  "SELECT * FROM monitor WHERE id=?",
                  (monitor_id,),
              )
              current_row = cursor.fetchone()
              current = dict(zip([d[0] for d in cursor.description], current_row))
              changed = any(current.get(key) != value for key, value in set_values.items())
              if changed:
                  assignments = ", ".join(f"{key}=?" for key in set_values)
                  cursor.execute(
                      f"UPDATE monitor SET {assignments} WHERE id=?",
                      tuple(set_values.values()) + (monitor_id,),
                  )
                  print(f"Updated monitor: {name}")
              return monitor_id

          def upsert_notification(spec, user_id):
              config_json = json.dumps(spec["config"], separators=(",", ":"))
              values = {
                  "name": spec["name"],
                  "active": 1,
                  "is_default": 1,
                  "config": config_json,
                  "user_id": user_id,
                  "apply_existing": 1,
                  "created_date": timestamp(),
                  "updated_date": timestamp(),
              }
              set_values = filter_columns("notification", values)

              cursor.execute("SELECT id FROM notification WHERE name=?", (spec["name"],))
              row = cursor.fetchone()
              if row is None:
                  keys = ", ".join(set_values.keys())
                  placeholders = ", ".join("?" for _ in set_values)
                  cursor.execute(
                      f"INSERT INTO notification ({keys}) VALUES ({placeholders})",
                      tuple(set_values.values()),
                  )
                  print(f"Added notification provider: {spec['name']}")
                  return cursor.lastrowid

              notification_id = row[0]
              update_values = {
                  key: value
                  for key, value in set_values.items()
                  if key not in {"created_date"}
              }
              assignments = ", ".join(f"{key}=?" for key in update_values)
              cursor.execute(
                  f"UPDATE notification SET {assignments} WHERE id=?",
                  tuple(update_values.values()) + (notification_id,),
              )
              print(f"Updated notification provider: {spec['name']}")
              return notification_id

          # Get user_id if an admin has been created.
          cursor.execute("SELECT id FROM user LIMIT 1")
          user_row = cursor.fetchone()
          user_id = user_row[0] if user_row else None

          # Delete monitors not in desired list.
          cursor.execute("SELECT id, name FROM monitor")
          existing = {row[1]: row[0] for row in cursor.fetchall()}
          desired_names = {m["name"] for m in desired_monitors}
          for name, monitor_id in existing.items():
              if name not in desired_names:
                  cursor.execute("DELETE FROM monitor WHERE id=?", (monitor_id,))
                  print(f"Deleted monitor: {name}")

          # Sync monitors. Push monitors have no URL and use a stable push token.
          monitor_ids = []
          for m in desired_monitors:
              name = m["name"]
              m_type = m.get("type", "http")
              interval = m.get("interval", 60)
              is_push = m_type == "push"
              desired = {
                  "name": name,
                  "active": 1,
                  "url": "" if is_push else m["url"],
                  "type": m_type,
                  "interval": interval,
                  "weight": 2000,
                  "maxretries": 0,
                  "ignore_tls": 0,
                  "upside_down": 0,
                  "maxredirects": 10,
                  "accepted_statuscodes_json": '["200-299"]',
                  "retry_interval": 0,
                  "user_id": user_id,
              }
              if is_push:
                  desired["push_token"] = m["push_token"]
              monitor_ids.append(upsert_monitor(name, desired))

          # Create/update the SES notification provider and link it to every monitor.
          notification_id = upsert_notification(notification_spec, user_id)
          if "monitor_notification" in {
              row[0] for row in cursor.execute("SELECT name FROM sqlite_master WHERE type='table'")
          }:
              cursor.execute("DELETE FROM monitor_notification WHERE notification_id=?", (notification_id,))
              link_columns = columns("monitor_notification")
              for monitor_id in monitor_ids:
                  link_values = {
                      "monitor_id": monitor_id,
                      "notification_id": notification_id,
                  }
                  link_values = {key: value for key, value in link_values.items() if key in link_columns}
                  keys = ", ".join(link_values.keys())
                  placeholders = ", ".join("?" for _ in link_values)
                  cursor.execute(
                      f"INSERT INTO monitor_notification ({keys}) VALUES ({placeholders})",
                      tuple(link_values.values()),
                  )
              print(f"Linked notification provider to {len(monitor_ids)} monitors")

          # Create default status page if it doesn't exist.
          cursor.execute("SELECT id FROM status_page WHERE slug='default'")
          sp_row = cursor.fetchone()
          if not sp_row:
              cursor.execute("""
                  INSERT INTO status_page (slug, title, description, icon, theme, published, search_engine_index, show_tags, show_powered_by, show_certificate_expiry)
                  VALUES ('default', 'Aether Services', 'Lab status monitoring page', 'circle-check', 'dark', 1, 1, 0, 0, 1)
              """)
              sp_id = cursor.lastrowid
              print("Created default status page")
          else:
              sp_id = sp_row[0]

          # Create default group if it doesn't exist for the status page.
          cursor.execute("SELECT id FROM `group` WHERE status_page_id=?", (sp_id,))
          group_row = cursor.fetchone()
          if not group_row:
              cursor.execute("""
                  INSERT INTO `group` (name, public, active, weight, status_page_id)
                  VALUES ('Services', 1, 1, 1000, ?)
              """, (sp_id,))
              group_id = cursor.lastrowid
              print("Created default status page group")
          else:
              group_id = group_row[0]

          # Clear old links and link current monitors to the group.
          cursor.execute("DELETE FROM monitor_group WHERE group_id=?", (group_id,))

          cursor.execute("SELECT id FROM monitor WHERE active=1")
          active_monitors = [row[0] for row in cursor.fetchall()]

          for idx, monitor_id in enumerate(active_monitors):
              cursor.execute("""
                  INSERT INTO monitor_group (monitor_id, group_id, weight)
                  VALUES (?, ?, ?)
              """, (monitor_id, group_id, idx * 10))
          print(f"Linked {len(active_monitors)} monitors to the status page group")

          # Set default entry page to the status page.
          cursor.execute("INSERT OR REPLACE INTO setting (key, value, type) VALUES ('entryPage', '\"statusPage-default\"', 'string')")
          print("Set entryPage setting to the default status page")

          conn.commit()
          conn.close()
        dest: /opt/uptime-kuma/sync_monitors.py
        owner: uptime-kuma
        group: uptime-kuma
        mode: '0755'

    - name: Run monitors sync script
      command: python3 /opt/uptime-kuma/sync_monitors.py
      register: sync_output
      changed_when: "'Added' in sync_output.stdout or 'Updated' in sync_output.stdout or 'Deleted' in sync_output.stdout or 'Created' in sync_output.stdout"
      notify: Restart Uptime Kuma

  handlers:
    - name: Restart Uptime Kuma
      systemd:
        name: uptime-kuma
        state: restarted
