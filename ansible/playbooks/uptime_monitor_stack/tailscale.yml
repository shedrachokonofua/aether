---
- name: Deploy tailscale
  hosts: uptime-monitor
  gather_facts: true
  become: true
  vars:
    tailscale_authkey: "{{ tf_outputs.tailscale_uptime_monitor_oauth_client_secret.value }}?ephemeral=false"
  tasks:
    - name: Install tailscale prerequisites
      apt:
        name:
          - curl
          - apt-transport-https
          - gnupg
        state: present
        update_cache: yes

    - name: Download Tailscale GPG key
      get_url:
        url: https://pkgs.tailscale.com/stable/debian/bookworm.noarmor.gpg
        dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
        mode: '0644'

    - name: Add Tailscale APT repository
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/debian bookworm main"
        state: present
        filename: tailscale

    - name: Install Tailscale
      apt:
        name: tailscale
        state: present
        update_cache: yes

    - name: Enable and start tailscaled service
      systemd:
        name: tailscaled
        state: started
        enabled: yes

    - name: Check if Tailscale is already authenticated
      command: tailscale status
      register: tailscale_status
      changed_when: false
      failed_when: false

    - name: Authenticate Tailscale with auth key
      command: tailscale up --authkey="{{ tailscale_authkey }}" --hostname="aether-uptime-monitor" --advertise-tags="tag:uptime-monitor" --accept-routes --accept-dns=false
      when: tailscale_status.rc != 0
