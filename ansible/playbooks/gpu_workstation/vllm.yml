---
- name: Deploy vLLM server
  hosts: gpu-workstation
  gather_facts: true
  roles:
    - common
  vars:
    vllm_model: "Qwen/Qwen3.5-27B"
  tasks:
    - name: Create required vLLM directories
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - ./vllm
        - ./vllm/huggingface

    - name: Install runtime dependencies
      become: true
      dnf:
        name:
          - git
          - python3.12
          - python3-pip
        state: present

    - name: Stop legacy vLLM user service if present
      systemd:
        name: vllm
        state: stopped
        scope: user
      ignore_errors: true

    - name: Remove legacy vLLM quadlet definition if present
      file:
        path: /home/aether/.config/containers/systemd/vllm.container
        state: absent

    - name: Remove legacy vLLM podman container if present
      command: podman rm -f vllm
      changed_when: true
      failed_when: false

    - name: Remove existing vLLM virtual environment
      file:
        path: /home/aether/vllm/venv
        state: absent

    - name: Create Python virtual environment
      command: python3.12 -m venv /home/aether/vllm/venv

    - name: Upgrade pip toolchain in venv
      pip:
        name:
          - pip
          - setuptools
          - wheel
        state: latest
        virtualenv: /home/aether/vllm/venv

    - name: Install latest Transformers from source (Qwen3.5 support)
      pip:
        name: git+https://github.com/huggingface/transformers.git@main
        virtualenv: /home/aether/vllm/venv
        state: latest

    - name: Install vLLM nightly in venv
      pip:
        name: vllm
        virtualenv: /home/aether/vllm/venv
        state: latest
        extra_args: --extra-index-url https://wheels.vllm.ai/nightly

    - name: Write vLLM user systemd unit
      copy:
        dest: /home/aether/.config/systemd/user/vllm.service
        mode: "0644"
        content: |
          [Unit]
          Description=vLLM OpenAI-compatible API server
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          WorkingDirectory=/home/aether/vllm
          Environment=HF_HOME=/home/aether/vllm/huggingface
          Environment=PYTHONUNBUFFERED=1
          ExecStart=/home/aether/vllm/venv/bin/vllm serve {{ vllm_model }} --host 0.0.0.0 --port {{ vm.gpu_workstation.ports.vllm }}
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=default.target

    - name: Reload systemd daemon for user
      systemd:
        daemon_reload: yes
        scope: user

    - name: Start vLLM service
      systemd:
        name: vllm
        state: restarted
        enabled: yes
        scope: user

    - name: Wait for vLLM to start
      wait_for:
        port: "{{ vm.gpu_workstation.ports.vllm }}"
        host: 127.0.0.1
        timeout: 300

    - name: Check vLLM health endpoint
      uri:
        url: "http://localhost:{{ vm.gpu_workstation.ports.vllm }}/health"
        method: GET
        status_code: 200
      register: vllm_health
      retries: 30
      delay: 10

    - name: Display vLLM status
      debug:
        msg: "vLLM is healthy on port {{ vm.gpu_workstation.ports.vllm }} and serving {{ vllm_model }}"
