---
- name: Deploy messaging stack
  hosts: messaging-stack
  gather_facts: true
  roles:
    - common
    - vm_baseline
    - dnf
    - role: vm_monitoring_agent
      prometheus_scrape_configs:
        - job_name: "ntfy"
          scrape_interval: 15s
          static_configs:
            - targets: ["localhost:{{ vm.messaging_stack.ports.ntfy_metrics }}"]
        - job_name: "postfix"
          scrape_interval: 15s
          static_configs:
            - targets:
                ["localhost:{{ vm.messaging_stack.ports.postfix_metrics }}"]

# Matrix moved to the Talos cluster (tofu/home/kubernetes/matrix.tf) —
# see docs/worklogs/messaging-stack-migration.md. matrix.yml and
# decommission_matrix.yml are kept as historical record.

- name: Deploy apprise gateway
  import_playbook: apprise.yml

- name: Deploy ntfy pod
  import_playbook: ntfy.yml

- name: Deploy postfix relay
  import_playbook: postfix.yml
