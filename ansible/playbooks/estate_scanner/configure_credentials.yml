---
# Deploy estate-scanner ClickHouse writer credential to the guest.
# Password is rendered from SOPS; never baked into the NixOS closure.
# Uses localhost SSH (not remote Ansible modules) — the guest has no Python.
- name: Configure estate-scanner writer credentials
  hosts: localhost
  gather_facts: false
  connection: local
  roles:
    - common
  vars:
    estate_scan_clickhouse_user: estate_scan
    estate_scanner_host: "{{ vm.estate_scanner.ip }}"
  tasks:
    - name: Assert estate_scan ClickHouse credential is present
      ansible.builtin.assert:
        that:
          - secrets.estate_scan is defined
          - secrets.estate_scan.clickhouse_password is string
          - secrets.estate_scan.clickhouse_password | length >= 32
          - not secrets.estate_scan.clickhouse_password.startswith('ENC[')
        fail_msg: >-
          Add estate_scan.clickhouse_password (at least 32 characters) to the
          encrypted SOPS inventory before deploying scanner writer credentials.
      no_log: true
      tags: [estate-scan-credentials]

    - name: Ensure estate-scanner config directory and group ownership
      ansible.builtin.command:
        argv:
          - ssh
          - -o
          - BatchMode=yes
          - -o
          - StrictHostKeyChecking=accept-new
          - "root@{{ estate_scanner_host }}"
          - >
            mkdir -p /etc/estate-scanner &&
            chgrp estate-scan /etc/estate-scanner &&
            chmod 0750 /etc/estate-scanner
      changed_when: true
      tags: [estate-scan-credentials]

    - name: Render estate-scanner ClickHouse password over SSH
      ansible.builtin.shell: |
        set -euo pipefail
        umask 077
        tmp=$(mktemp)
        printf '%s\n' {{ secrets.estate_scan.clickhouse_password | quote }} > "$tmp"
        scp -o BatchMode=yes -o StrictHostKeyChecking=accept-new \
          "$tmp" "root@{{ estate_scanner_host }}:/etc/estate-scanner/clickhouse-password"
        ssh -o BatchMode=yes -o StrictHostKeyChecking=accept-new \
          "root@{{ estate_scanner_host }}" \
          'chown root:estate-scan /etc/estate-scanner/clickhouse-password && chmod 0640 /etc/estate-scanner/clickhouse-password'
        rm -f "$tmp"
      no_log: true
      changed_when: true
      tags: [estate-scan-credentials]

    - name: Record ClickHouse writer identity for operators
      ansible.builtin.shell: |
        set -euo pipefail
        ssh -o BatchMode=yes -o StrictHostKeyChecking=accept-new \
          "root@{{ estate_scanner_host }}" \
          "printf '%s\n' \
            'user={{ estate_scan_clickhouse_user }}' \
            'password_file=/etc/estate-scanner/clickhouse-password' \
            'url=http://{{ vm.monitoring_stack.ip }}:{{ vm.monitoring_stack.ports.clickhouse }}' \
            > /etc/estate-scanner/clickhouse-writer.env &&
           chown root:estate-scan /etc/estate-scanner/clickhouse-writer.env &&
           chmod 0640 /etc/estate-scanner/clickhouse-writer.env"
      changed_when: true
      tags: [estate-scan-credentials]
