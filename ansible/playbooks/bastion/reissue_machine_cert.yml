---
- name: Reissue the bastion machine certificate
  hosts: oracle
  gather_facts: false
  roles:
    - common
  vars:
    lxc_id: "{{ vm.bastion.id }}"
    step_ca_url: "https://{{ vm.step_ca.ip }}:{{ vm.step_ca.ports.https }}"
    step_ca_provisioner: machine-bootstrap
    step_ca_provisioner_password: "{{ secrets.step_ca.provisioner_password }}"
    cert_hostname: "{{ vm.bastion.name }}.home.shdr.ch"
    cert_local_dir: /tmp/bastion-cert-reissue
    cert_stage_prefix: /tmp/bastion-reissue

  tasks:
    - name: Reissue and install the bastion machine identity
      block:
        - name: Prepare local certificate directory
          ansible.builtin.file:
            path: "{{ cert_local_dir }}"
            state: directory
            mode: "0700"
          delegate_to: localhost

        - name: Fetch the current step-ca root
          ansible.builtin.get_url:
            url: "{{ step_ca_url }}/roots.pem"
            dest: "{{ cert_local_dir }}/step-ca-root.crt"
            validate_certs: false
            mode: "0644"
            force: true
          delegate_to: localhost

        - name: Write the provisioner password locally
          ansible.builtin.copy:
            content: "{{ step_ca_provisioner_password }}"
            dest: "{{ cert_local_dir }}/provisioner-password.txt"
            mode: "0600"
          delegate_to: localhost
          no_log: true

        - name: Issue a fresh bastion machine certificate
          ansible.builtin.command:
            argv:
              - step
              - ca
              - certificate
              - "{{ cert_hostname }}"
              - "{{ cert_local_dir }}/machine.crt"
              - "{{ cert_local_dir }}/machine.key"
              - "--ca-url={{ step_ca_url }}"
              - "--root={{ cert_local_dir }}/step-ca-root.crt"
              - "--san={{ cert_hostname }}"
              - "--san={{ vm.bastion.ip }}"
              - "--san={{ vm.bastion.name }}"
              - --san=localhost
              - --san=127.0.0.1
              - "--provisioner={{ step_ca_provisioner }}"
              - "--provisioner-password-file={{ cert_local_dir }}/provisioner-password.txt"
              - --force
          delegate_to: localhost
          changed_when: true

        - name: Stage the new machine identity on Oracle
          ansible.builtin.copy:
            src: "{{ cert_local_dir }}/{{ item }}"
            dest: "{{ cert_stage_prefix }}-{{ item }}"
            mode: "0600"
          loop:
            - machine.crt
            - machine.key
            - step-ca-root.crt

        - name: Stop certificate renewal while replacing the identity
          ansible.builtin.command:
            cmd: >-
              pct exec {{ lxc_id }} --
              /run/current-system/sw/bin/systemctl stop step-ca-cert-renew.service
          changed_when: true

        - name: Install the machine certificate
          ansible.builtin.command:
            cmd: >-
              pct push {{ lxc_id }} {{ cert_stage_prefix }}-machine.crt
              /etc/ssl/certs/machine.crt --perms 0644 --user 0 --group 0
          changed_when: true

        - name: Install the machine private key
          ansible.builtin.command:
            cmd: >-
              pct push {{ lxc_id }} {{ cert_stage_prefix }}-machine.key
              /etc/ssl/private/machine.key --perms 0600 --user 0 --group 0
          changed_when: true
          no_log: true

        - name: Install the current step-ca root
          ansible.builtin.command:
            cmd: >-
              pct push {{ lxc_id }} {{ cert_stage_prefix }}-step-ca-root.crt
              /etc/ssl/certs/step-ca-root.crt --perms 0644 --user 0 --group 0
          changed_when: true

        - name: Restart certificate consumers
          ansible.builtin.command:
            cmd: >-
              pct exec {{ lxc_id }} -- /run/current-system/sw/bin/systemctl
              restart step-ca-cert-renew.service vault-agent.service
              aether-x509-certificate-exporter.service
              opentelemetry-collector.service
          changed_when: true

        - name: Verify bastion certificate services are active
          ansible.builtin.command:
            cmd: >-
              pct exec {{ lxc_id }} -- /run/current-system/sw/bin/systemctl
              is-active step-ca-cert-renew.service vault-agent.service
              aether-x509-certificate-exporter.service
              opentelemetry-collector.service
          register: bastion_cert_services
          changed_when: false
          failed_when: bastion_cert_services.stdout_lines | reject('equalto', 'active') | list | length > 0

      always:
        - name: Remove staged certificate files from Oracle
          ansible.builtin.file:
            path: "{{ cert_stage_prefix }}-{{ item }}"
            state: absent
          loop:
            - machine.crt
            - machine.key
            - step-ca-root.crt

        - name: Remove the local certificate working directory
          ansible.builtin.file:
            path: "{{ cert_local_dir }}"
            state: absent
          delegate_to: localhost
