---
- name: Install necessary packages on Proxmox hosts
  hosts: machines
  become: true
  become_method: su
  roles:
    - common
    - ssh_ca_trust

  tasks:
    - name: Install proxmoxer
      apt:
        name:
          - python3-pip
          - python3-proxmoxer
        state: present

    - name: Enable Proxmox Snippets
      command: pvesm set local --content images,rootdir,vztmpl,backup,iso,snippets

    # ---------------------------------------------------------------
    # KSM: disabled on smith only. smith's guests (talos-smith k8s node,
    # etc.) have volatile memory KSM cannot dedup — it merges ~178 pages
    # while ksmd burns ~0.5 core scanning millions of pages. niobe/trinity
    # dedup ~480k pages effectively (ksmd idle), so KSM stays on there.
    # ---------------------------------------------------------------
    - name: Disable KSM tuner on smith (ineffective there, wastes CPU)
      ansible.builtin.systemd:
        name: ksmtuned
        state: stopped
        enabled: false
      when: inventory_hostname == "smith"
      tags: [ksm]

    - name: Stop KSM scanning and unmerge pages on smith
      ansible.builtin.shell: echo 2 > /sys/kernel/mm/ksm/run
      args:
        executable: /bin/bash
      changed_when: false
      when: inventory_hostname == "smith"
      tags: [ksm]

    # ---------------------------------------------------------------
    # CPU governor: move OFF Proxmox's default 'performance' (which pins
    # every core near max freq 24/7 — measured 16c @ ~4.1GHz on smith,
    # base 2.2GHz) to the most power-efficient DYNAMIC governor each host
    # supports. Fleet is heterogeneous:
    #   acpi-cpufreq (smith)          -> schedutil
    #   intel_pstate / amd-pstate-epp -> powersave gov + balance_performance EPP
    #     (on pstate drivers 'powersave' IS the dynamic HWP mode; 'performance'
    #      pins max clock). A boot-time oneshot applies it — no persistent sysfs.
    # ---------------------------------------------------------------
    - name: Remove legacy schedutil-only governor unit
      ansible.builtin.systemd:
        name: cpu-governor-schedutil.service
        state: stopped
        enabled: false
      failed_when: false
      tags: [cpufreq]

    - name: Delete legacy governor unit file
      ansible.builtin.file:
        path: /etc/systemd/system/cpu-governor-schedutil.service
        state: absent
      tags: [cpufreq]

    - name: Install power-efficient CPU governor script
      ansible.builtin.copy:
        dest: /usr/local/sbin/aether-cpu-governor.sh
        mode: "0755"
        content: |
          #!/bin/bash
          # Pick the most power-efficient dynamic governor each policy supports.
          for p in /sys/devices/system/cpu/cpu*/cpufreq; do
            [ -d "$p" ] || continue
            avail=$(cat "$p/scaling_available_governors" 2>/dev/null)
            case " $avail " in
              *" schedutil "*)
                echo schedutil > "$p/scaling_governor" 2>/dev/null ;;
              *)
                echo powersave > "$p/scaling_governor" 2>/dev/null
                [ -w "$p/energy_performance_preference" ] && echo balance_performance > "$p/energy_performance_preference" 2>/dev/null ;;
            esac
          done
          exit 0
      tags: [cpufreq]

    - name: Install power governor oneshot unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/cpu-power-governor.service
        mode: "0644"
        content: |
          [Unit]
          Description=Set power-efficient CPU governor (schedutil or powersave+EPP)
          After=sysinit.target

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          ExecStart=/usr/local/sbin/aether-cpu-governor.sh

          [Install]
          WantedBy=multi-user.target
      tags: [cpufreq]

    - name: Enable and start power governor unit
      ansible.builtin.systemd:
        name: cpu-power-governor.service
        daemon_reload: true
        enabled: true
        state: started
      tags: [cpufreq]

    # ---------------------------------------------------------------
    # KVM halt-polling disabled on smith: vcpus spin up to 200us before
    # halting on idle, burning CPU/power for a wakeup-latency optimization
    # this power-focused host doesn't need. smith-only (other hosts may run
    # latency-sensitive VMs). Runtime value set live via sysfs; modprobe.d
    # persists it across reboots (applied on module load).
    # ---------------------------------------------------------------
    - name: Persist KVM halt_poll_ns=0 on smith
      ansible.builtin.copy:
        dest: /etc/modprobe.d/kvm-halt-poll.conf
        mode: "0644"
        content: "options kvm halt_poll_ns=0\n"
      when: inventory_hostname == "smith"
      tags: [kvm]

    # ---------------------------------------------------------------
    # NVMe stability + kdump (Jul 3-4 2026 incident): during the first
    # full volume-snapshot pass, all three of neo's NVMe controllers
    # (2x WD SN5000 OSD disks AND the Samsung 9100 PRO boot disk) threw
    # kernel I/O command timeouts; nvme_reset_work soft-locked a CPU,
    # both OSDs aborted ("KernelDevice: Unexpected IO error"), and the
    # host had to be hard-rebooted twice. Multiple vendors incl. the
    # boot disk => platform-level (NVMe APST / PCIe ASPM power-state
    # transitions under sustained load), not a single bad drive.
    # Both fixes only take effect at the NEXT REBOOT of each host; this
    # playbook stages grub drop-ins and runs update-grub, nothing more.
    # ---------------------------------------------------------------
    - name: Ensure grub drop-in directory exists
      ansible.builtin.file:
        path: /etc/default/grub.d
        state: directory
        mode: "0755"
      tags: [nvme, kdump]

    - name: Pin NVMe/PCIe power states on neo (grub drop-in)
      ansible.builtin.copy:
        dest: /etc/default/grub.d/aether-nvme-stability.cfg
        mode: "0644"
        content: |
          # Managed by ansible (baseline_machines.yml, tag: nvme).
          # Jul 3-4 2026: NVMe controller stalls under sustained Ceph
          # snapshot load wedged this host twice (kernel I/O timeouts on
          # nvme0/1/2, soft-lockup in nvme_reset_work). Disable NVMe APST
          # and PCIe ASPM so devices never enter the flaky low-power states.
          # NOTE: costs some idle power on this host — deliberate tradeoff
          # against the fleet powersave-governor work (b0350ba).
          GRUB_CMDLINE_LINUX_DEFAULT="$GRUB_CMDLINE_LINUX_DEFAULT nvme_core.default_ps_max_latency_us=0 pcie_aspm=off"
      when: inventory_hostname == "neo"
      notify: Update grub
      tags: [nvme]

    - name: Install kdump-tools
      ansible.builtin.apt:
        name: kdump-tools
        state: present
      tags: [kdump]

    # zz- prefix: grub-mkconfig sources /etc/default/grub.d/*.cfg in
    # alphabetical order and the kernel honors the LAST crashkernel= on
    # the cmdline; this must override the 384M-:128M default shipped in
    # the package's kdump-tools.cfg (too small for these hosts' module set).
    - name: Reserve crash kernel memory (grub drop-in)
      ansible.builtin.copy:
        dest: /etc/default/grub.d/zz-aether-kdump.cfg
        mode: "0644"
        content: |
          # Managed by ansible (baseline_machines.yml, tag: kdump).
          GRUB_CMDLINE_LINUX_DEFAULT="$GRUB_CMDLINE_LINUX_DEFAULT crashkernel=512M"
      notify: Update grub
      tags: [kdump]

    - name: Enable kdump capture
      ansible.builtin.lineinfile:
        path: /etc/default/kdump-tools
        regexp: "^#?USE_KDUMP="
        line: "USE_KDUMP=1"
      tags: [kdump]

    # enabled only — starting it now would fail: the crashkernel memory
    # reservation does not exist until the host reboots.
    - name: Enable kdump-tools at boot
      ansible.builtin.systemd:
        name: kdump-tools
        enabled: true
      tags: [kdump]

  handlers:
    - name: Update grub
      ansible.builtin.command: update-grub
