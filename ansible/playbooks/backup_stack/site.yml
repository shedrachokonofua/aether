---
- hosts: backup-stack
  gather_facts: true
  vars:
    # backrest + PBS run as root (UID 0), excluded by the journald receiver's
    # default _UID=1000 match and not in the default monitored_systemd_units
    # list. Add them here so their logs ship to Loki.
    certificate_monitoring_enabled: true
    certificate_monitoring_emit_local_scrape: true
    certificate_monitoring_scope: "vm"
    x509_certificate_exporter_watch_files:
      - /etc/step-ca/certs/cert-leaf.pem
    systemd_exporter_units:
      - backrest-cert-renew.service
      - backrest-cert-renew.timer
    monitored_systemd_units_extra:
      - backrest.service
      - proxmox-backup.service
      - proxmox-backup-proxy.service
    prometheus_scrape_configs:
      - job_name: aether-restic
        scrape_interval: 60s
        static_configs:
          - targets:
              - 127.0.0.1:19100
            labels:
              service_name: aether-restic
              host_name: backup-stack
  roles:
    - common
    - vm_baseline
    - vm_monitoring_agent

- name: Configure Proxmox Backup Server
  import_playbook: configure_pbs.yml

- name: Configure Proxmox backups
  import_playbook: configure_proxmox_backups.yml

- name: Configure Offsite backups
  import_playbook: configure_offsite_backups/site.yml
