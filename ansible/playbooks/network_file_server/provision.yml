---
- name: Provision Network File Server LXC
  hosts: smith
  gather_facts: true
  roles:
    - common
  tasks:
    - name: Pull fedora template
      community.general.proxmox_template:
        node: "{{vm.nfs.node}}"
        api_host: "{{secrets.proxmox.cluster_host}}"
        api_user: "{{secrets.proxmox.cluster_username}}"
        api_password: "{{secrets.proxmox.cluster_password}}"
        url: "http://download.proxmox.com/images/system/fedora-41-default_20241118_amd64.tar.xz"

    - name: Write hookscript
      copy:
        content: "{{ lookup('template', 'hookscript.sh.j2') }}"
        dest: "/var/lib/vz/snippets/nfs-hookscript.sh"
        mode: "0755"

    - name: Check if NFS LXC exists
      community.general.proxmox_vm_info:
        vmid: "{{vm.nfs.id}}"
        api_host: "{{secrets.proxmox.cluster_host}}"
        api_user: "{{secrets.proxmox.cluster_username}}"
        api_password: "{{secrets.proxmox.cluster_password}}"
      register: previous_vm_info
      ignore_errors: true

    - name: Stop NFS LXC
      community.general.proxmox:
        vmid: "{{vm.nfs.id}}"
        api_host: "{{secrets.proxmox.cluster_host}}"
        api_user: "{{secrets.proxmox.cluster_username}}"
        api_password: "{{secrets.proxmox.cluster_password}}"
        state: stopped
      when: (previous_vm_info.proxmox_vms | length) > 0
      register: stop_result
      until: not stop_result.failed
      retries: 5
      delay: 5
      ignore_errors: true

    - name: Delete NFS LXC
      community.general.proxmox:
        vmid: "{{vm.nfs.id}}"
        api_host: "{{secrets.proxmox.cluster_host}}"
        api_user: "{{secrets.proxmox.cluster_username}}"
        api_password: "{{secrets.proxmox.cluster_password}}"
        state: absent
      when: (previous_vm_info.proxmox_vms | length) > 0
      register: delete_result
      until: not delete_result.failed
      retries: 5
      delay: 5
      ignore_errors: true

    - name: Create NFS LXC
      community.general.proxmox:
        node: "{{vm.nfs.node}}"
        api_host: "{{secrets.proxmox.cluster_host}}"
        api_user: "{{secrets.proxmox.cluster_username}}"
        api_password: "{{secrets.proxmox.cluster_password}}"
        vmid: "{{vm.nfs.id}}"
        password: "{{secrets.nfs_password}}"
        hostname: "{{vm.nfs.name}}"
        ostemplate: "local:vztmpl/fedora-41-default_20241118_amd64.tar.xz"
        ostype: "fedora"
        cores: "{{vm.nfs.cores}}"
        memory: "{{vm.nfs.memory}}"
        disk: "zfs-nvme-vm-dataset:{{vm.nfs.disk_gb}}"
        hookscript: "local:snippets/nfs-hookscript.sh"
        mounts:
          mp0: "/mnt/nvme/personal,mp=/mnt/nvme/personal"
          mp1: "/mnt/nvme/vm,mp=/mnt/nvme/vm"
          mp2: "/mnt/nvme/data,mp=/mnt/nvme/data"
          mp3: "/mnt/hdd/vm,mp=/mnt/hdd/vm"
          mp4: "/mnt/hdd/data,mp=/mnt/hdd/data"
          mp5: "/mnt/hdd/blockchain,mp=/mnt/hdd/blockchain"
        netif:
          net0: "name=eth0,bridge=vmbr0,gw={{vm.nfs.gateway.gigahub}},ip={{vm.nfs.ip.gigahub}}/24"
          net1: "name=eth1,bridge=vmbr0,gw={{vm.nfs.gateway.vyos}},ip={{vm.nfs.ip.vyos}}/24,tag=2"
        features:
          - nesting=1
          - mount=nfs
          - keyctl=1
        unprivileged: false

    - name: Set AppArmor to unconfined for NFS server support
      ansible.builtin.lineinfile:
        path: "/etc/pve/lxc/{{ vm.nfs.id }}.conf"
        line: "lxc.apparmor.profile = unconfined"
        create: false

    - name: Start NFS LXC
      community.general.proxmox:
        vmid: "{{vm.nfs.id}}"
        api_host: "{{secrets.proxmox.cluster_host}}"
        api_user: "{{secrets.proxmox.cluster_username}}"
        api_password: "{{secrets.proxmox.cluster_password}}"
        state: started
        timeout: 300
      ignore_errors: true

    - name: Wait for NetworkManager inside NFS LXC
      ansible.builtin.command:
        argv:
          - pct
          - exec
          - "{{ vm.nfs.id }}"
          - --
          - nmcli
          - general
          - status
      register: nfs_networkmanager_status
      until: nfs_networkmanager_status.rc == 0
      retries: 12
      delay: 5

    - name: Enforce static Gigahub-side eth0 profile through NetworkManager
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail
          profile_uuid="$(pct exec {{ vm.nfs.id }} -- nmcli -t -f UUID,DEVICE connection show |
            awk -F: '$2 == "eth0" && $1 != "--" { print $1; exit }')"
          test -n "$profile_uuid"
          # NetworkManager treats gateway + never-default as mutually exclusive;
          # never-default is intentional because eth1 owns the only default route.
          pct exec {{ vm.nfs.id }} -- nmcli connection modify uuid "$profile_uuid" \
            ipv4.method manual \
            ipv4.addresses "{{ vm.nfs.ip.gigahub }}/24" \
            ipv4.gateway "{{ vm.nfs.gateway.gigahub }}" \
            ipv4.never-default yes
          pct exec {{ vm.nfs.id }} -- nmcli connection up uuid "$profile_uuid"
        executable: /bin/bash
