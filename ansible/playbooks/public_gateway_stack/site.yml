---
- name: Configure public gateway stack
  hosts: link
  gather_facts: true
  vars:
    aether_identity:
      fabric: aether
      site: aws
      host: link
    site_wireguard_listen_port: 51820
    site_wireguard_addresses:
      - 10.1.0.10/32
      - 10.254.0.1/32
    site_wireguard_private_key: "{{ secrets.wireguard.aws_private_key }}"
    site_wireguard_source_address: 10.1.0.10
    site_wireguard_remote_prefixes:
      - 10.0.0.0/16
      - 10.2.0.0/16
      - 10.3.0.0/16
    # Tailscale's accepted subnet route lives in policy table 52 during the
    # migration. New site-address and transit traffic must prefer the declared
    # WireGuard routes in the main table until tailscaled is retired.
    site_wireguard_policy_rules:
      - priority: 97
        match: to 10.1.0.0/16
      - priority: 98
        match: to 10.2.0.0/16
      - priority: 99
        match: to 10.0.0.0/16
      - priority: 100
        match: from 10.1.0.10/32
      - priority: 101
        match: from 10.2.0.0/16
      - priority: 96
        match: to 10.3.0.0/16
      - priority: 102
        match: from 10.3.0.0/16
    site_wireguard_enable_forwarding: true
    site_wireguard_topology_role: hub
    site_wireguard_monitoring_ports:
      - 19531
      - 6060
      - 9100
      - 9586
    # Personal clients manage each site host over WireGuard. Talos node SNAT is
    # restricted to the CrowdSec sync account on this host by the router.
    site_wireguard_input_allow_cidrs:
      - 10.0.4.0/24
      - "{{ vm.estate_scanner.ip }}/32"
      - "{{ vm.talos_trinity.ip }}/32"
      - "{{ vm.talos_neo.ip }}/32"
      - "{{ vm.talos_niobe.ip }}/32"
      - "{{ vm.talos_smith.ip }}/32"
      - "{{ vm.talos_tank.ip }}/32"
      - "{{ vm.talos_dozer.ip }}/32"
      - "{{ vm.talos_mouse.ip }}/32"
      - "{{ vm.talos_sparks.ip }}/32"
    site_wireguard_forward_allow_cidrs:
      - 10.0.4.0/24
      - "{{ vm.estate_scanner.ip }}/32"
    # Spokes the home monitoring source scrapes through the hub (forwarded).
    site_wireguard_monitoring_targets:
      - 10.2.0.10
      - 10.3.0.10
    # Forwarded service flows (wg->wg): GCP uptime -> Grafana push, and home
    # DNS clients -> the OCI AdGuard resolver.
    site_wireguard_service_forwards:
      - saddr: [10.2.0.10]
        daddr: 10.0.2.2
        proto: tcp
        ports: [443, 9443]
      - saddr: [10.0.0.0/16, 10.1.0.0/16, 10.254.0.2/32]
        daddr: 10.3.0.10
        proto: udp
        ports: [53]
      - saddr: [10.0.0.0/16, 10.1.0.0/16, 10.254.0.2/32]
        daddr: 10.3.0.10
        proto: tcp
        ports: [53]
      - saddr: [10.0.2.2/32] # home gateway Caddy -> OCI Technitium admin UI (dns.oci.shdr.ch)
        daddr: 10.3.0.10
        proto: tcp
        ports: [5380]
    site_wireguard_peers:
      - site: home
        host: router
        public_key: "{{ secrets.wireguard.vyos_public_key }}"
        allowed_ips:
          - 10.0.0.0/16
          - 10.254.0.2/32
      - site: gcp
        host: vigilant
        public_key: "{{ secrets.wireguard.gcp_public_key }}"
        allowed_ips:
          - 10.2.0.0/16
          - 10.254.0.3/32
      - site: oci
        host: oci-adguard
        public_key: "{{ secrets.wireguard.oci_public_key }}"
        allowed_ips:
          - 10.3.0.0/16
          - 10.254.0.4/32
  roles:
    - common
    - role: site_wireguard
      tags: [site-wireguard]
    - role: site_metrics_exporters
      vars:
        wireguard_exporter_container_engine: docker
        wireguard_exporter_peers: "{{ site_wireguard_peers }}"
        wireguard_exporter_interface: "{{ site_wireguard_interface }}"
        node_exporter_listen_address: 10.1.0.10
        wireguard_exporter_listen_address: 10.1.0.10
      tags: [site-metrics]
    - role: journal_gateway
      vars:
        journal_gateway_tls_enabled: false
        journal_gateway_bind_address: "10.1.0.10"
      tags: [journal-gateway]
#     - dnf

- name: Deploy CrowdSec
  import_playbook: crowdsec/site.yml

- name: Deploy caddy
  import_playbook: caddy/site.yml
