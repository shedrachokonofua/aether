---
- name: Deploy monitoring stack
  hosts: monitoring-stack
  gather_facts: true
  vars:
    # Disable OTLP receiver in vm_monitoring_agent - central collector handles it
    otlp_receiver_enabled: false
    clickhouse_admin_user: aether
    clickhouse_grafana_user: grafana_readonly
    clickhouse_grafana_role: grafana_readonly_role
    clickhouse_grafana_databases:
      - zeek
      - suricata
      - metrics
      - argos
      - network
      - estate_scan
    # Preserve the final newline: immutable migration ledger checksum.
    estate_scan_schema_checksum: "{{ lookup('file', playbook_dir ~ '/clickhouse/11-estate-scan-schema.sql', rstrip=False) | hash('sha256') }}"
    estate_scan_clickhouse_user: estate_scan
    estate_scan_clickhouse_role: estate_scan_writer_role
    argos_version: "857c94e60d71ae90d70f05a21b570fcdf0bc89e9"
    argos_artifact_url: "https://gitlab.home.shdr.ch/so/argos/-/jobs/13409/artifacts/raw/artifacts/argos"
    argos_binary_sha256: "dfd105d156e4c1cfe68dd07bcfafe7bed7be857a2a27a75da13a6a13c09819df"
    # Preserve the final newline: this is the exact SHA-256 Argos and operators
    # use for the immutable migration ledger, not Ansible's trimmed file lookup.
    argos_schema_checksum: "{{ lookup('file', playbook_dir ~ '/clickhouse/10-argos-schema.sql', rstrip=False) | hash('sha256') }}"
    argos_clickhouse_user: argos
    argos_clickhouse_role: argos_detector_role
    # A10 uses the 60-second measured Zeek acknowledgement-to-typed-row SLO.
    # 300 seconds is both the five-minute floor and more than 2x that SLO.
    argos_supervisor_tick_seconds: 60
    argos_evaluation_interval_seconds: 3600
    argos_ingest_settle_seconds: 300
    argos_zeek_retention_seconds: 1209600
    argos_feature_lookback_seconds: 86400
    argos_max_catchup_cycles: 12
    # A full 50k-pair feature batch can exceed ClickHouse's 1.86 GiB per-query
    # ceiling on busy hours. Smaller deterministic pages preserve coverage
    # while keeping the 24-hour rolling aggregation bounded.
    argos_max_changed_pairs_per_page: 5000
    argos_max_changed_pairs_per_cycle: 250000
    argos_query_timeout_seconds: 60
    # Ten days of the current fourteen-day Zeek retention leaves four days for
    # catch-up and the required 24-hour retention headroom before enablement.
    argos_bootstrap_start: "2026-07-01T00:00:00Z"
    argos_service_enabled: false
  roles:
    - common
    - vm_baseline
    - dnf
    - vm_monitoring_agent
  tasks:
    # === Directory Setup ===
    - name: Create prometheus directories
      become: true
      file:
        path: "{{ item }}"
        state: directory
        mode: "0777"
        owner: aether
        group: aether
      loop:
        - ./prometheus/data
        - ./prometheus/rules
      tags: [prometheus]

    - name: Create loki directory
      become: true
      file:
        path: ./loki/data
        state: directory
        mode: "0777"
        owner: aether
        group: aether
      tags: [loki]

    - name: Create tempo directory
      become: true
      file:
        path: ./tempo
        state: directory
        mode: "0777"
        owner: aether
        group: aether
      tags: [tempo]

    - name: Create otel directory
      become: true
      file:
        path: ./otel
        state: directory
        mode: "0777"
        owner: aether
        group: aether
      tags: [otel]

    - name: Create janus directory
      become: true
      file:
        path: ./janus
        state: directory
        mode: "0777"
        owner: aether
        group: aether
      tags: [janus, tenant-proxy]

    - name: Create grafana directory
      become: true
      file:
        path: ./grafana/provisioning
        state: directory
        mode: "0777"
        owner: aether
        group: aether
      tags: [grafana]

    - name: Create pve-exporter directory
      become: true
      file:
        path: ./pve-exporter
        state: directory
        mode: "0777"
        owner: aether
        group: aether
      tags: [pve-exporter]

    - name: Create pbs-exporter directory
      become: true
      file:
        path: ./pbs-exporter
        state: directory
        mode: "0777"
        owner: aether
        group: aether
      tags: [pbs-exporter]

    - name: Create blackbox-exporter directory
      become: true
      file:
        path: ./blackbox
        state: directory
        mode: "0777"
        owner: aether
        group: aether
      tags: [blackbox]

    - name: Create clickhouse directories
      become: true
      file:
        path: "{{ item }}"
        state: directory
        mode: "0777"
        owner: aether
        group: aether
      loop:
        - ./clickhouse/data
        - ./clickhouse/init
        - ./clickhouse/config.d
        - ./clickhouse/users.d
      tags: [clickhouse]

    # === Configuration Files ===
    - name: Template prometheus config
      template:
        src: ./prometheus.yml.j2
        dest: ./prometheus/prometheus.yml
        mode: "0755"
      tags: [prometheus]

    - name: Copy prometheus rules
      copy:
        src: ./prometheus-rules/
        dest: ./prometheus/rules/
        mode: "0644"
      tags: [prometheus]

    - name: Copy blackbox-exporter config
      copy:
        src: ./blackbox.yml
        dest: ./blackbox/blackbox.yml
        mode: "0755"
      tags: [blackbox]

    - name: Create loki config
      copy:
        src: ./loki_config.yml
        dest: ./loki/loki_config.yml
        mode: "0755"
      tags: [loki]

    - name: Create tempo config
      copy:
        src: ./tempo.yml
        dest: ./tempo/tempo.yml
        mode: "0755"
      tags: [tempo]

    - name: Create otel config
      template:
        src: ./otel_config.yml.j2
        dest: ./otel/otel_config.yml
        mode: "0755"
      tags: [otel]

    - name: Create Janus config
      template:
        src: ./janus_config.yml.j2
        dest: ./janus/config.yml
        mode: "0644"
      tags: [janus, tenant-proxy]

    - name: Create grafana config
      template:
        src: ./grafana/grafana.ini.j2
        dest: ./grafana/grafana.ini
        mode: "0755"
      tags: [grafana]

    - name: Create grafana provisioning directories
      file:
        path: "./grafana/provisioning/{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - datasources
        - dashboards
        - alerting
      tags: [grafana]

    - name: Template grafana datasources
      template:
        src: ./grafana/provisioning/datasources/datasource.yml.j2
        dest: ./grafana/provisioning/datasources/datasource.yml
        mode: "0644"
      tags: [grafana, clickhouse-grafana-reader]

    - name: Copy grafana dashboards provisioning
      copy:
        src: ./grafana/provisioning/dashboards/
        dest: ./grafana/provisioning/dashboards/
        mode: "0755"
      tags: [grafana]

    - name: Copy grafana alerting provisioning
      copy:
        src: "./grafana/provisioning/alerting/{{ item }}"
        dest: "./grafana/provisioning/alerting/{{ item }}"
        mode: "0644"
      loop:
        - rules.yml
        - notification-policies.yml
      tags: [grafana]

    - name: Template grafana contact points
      template:
        src: ./grafana/provisioning/alerting/contact-points.yml.j2
        dest: ./grafana/provisioning/alerting/contact-points.yml
        mode: "0644"
      tags: [grafana]

    - name: Create PVE exporter config
      copy:
        content: |
          default:
            user: {{ secrets.proxmox.cluster_username }}
            token_name: {{ secrets.proxmox.monitoring_token_id }}
            token_value: "{{ secrets.proxmox.monitoring_secret }}"
            verify_ssl: false
        dest: ./pve-exporter/pve.yml
        mode: "0644"
      tags: [pve-exporter]

    - name: Copy ClickHouse init scripts
      copy:
        src: ./clickhouse/
        dest: ./clickhouse/init/
        mode: "0644"
      tags: [clickhouse]

    - name: Label VyOS observation schema for the ClickHouse container
      ansible.builtin.file:
        path: /home/aether/clickhouse/init/09-vyos-observations.sql
        setype: container_file_t
      become: true
      tags: [clickhouse, vyos-exporter]

    - name: Copy ClickHouse config overrides
      copy:
        src: ./clickhouse-config.d/
        dest: ./clickhouse/config.d/
        mode: "0644"
      tags: [clickhouse]

    - name: Copy ClickHouse user profile overrides
      copy:
        src: ./clickhouse-users.d/
        dest: ./clickhouse/users.d/
        mode: "0644"
      tags: [clickhouse]

    # === Pods ===
    - name: Create monitoring stack pod
      containers.podman.podman_pod:
        name: monitoring-stack
        ports:
          - "{{ vm.monitoring_stack.ports.grafana }}:3000"
          - "{{ vm.monitoring_stack.ports.janus }}:8080"
          - "{{ vm.monitoring_stack.ports.prometheus }}:9090"
          - "{{ vm.monitoring_stack.ports.loki }}:3100"
          - "{{ vm.monitoring_stack.ports.loki_push }}:3500" # collector Loki push-API receiver (unpoller UniFi events)
          - "{{ vm.monitoring_stack.ports.otel_grpc }}:4317"
          - "{{ vm.monitoring_stack.ports.otel_http }}:4318"
          - "{{ vm.monitoring_stack.ports.otel_metrics }}:8888"
          - "{{ vm.monitoring_stack.ports.otel_prometheus }}:8889"
          - "{{ vm.monitoring_stack.ports.clickhouse }}:8123" # ClickHouse HTTP/Play UI
          - "9221:9221" # PVE Exporter
          - "10019:10019" # PBS Exporter
          - "{{ vm.monitoring_stack.ports.blackbox }}:9115" # blackbox-exporter (cert expiry probes)
        state: quadlet
        restart_policy: on-failure
        recreate: true
        quadlet_options:
          - |
            [Install]
            WantedBy=default.target
      tags:
        [
          prometheus,
          loki,
          tempo,
          otel,
          janus,
          grafana,
          clickhouse,
          pve-exporter,
          pbs-exporter,
          blackbox,
          monitoring-pod,
        ]

    # === Volumes ===
    - name: Create prometheus storage volume
      containers.podman.podman_volume:
        name: prometheus_storage
        state: quadlet
      tags: [prometheus]

    - name: Create grafana storage volume
      containers.podman.podman_volume:
        name: grafana_storage
        state: quadlet
      tags: [grafana]

    - name: Create clickhouse storage volume
      containers.podman.podman_volume:
        name: clickhouse_storage
        state: quadlet
      tags: [clickhouse]

    # === Containers ===
    - name: Start prometheus
      containers.podman.podman_container:
        name: prometheus
        image: docker.io/prom/prometheus:latest
        pod: monitoring-stack.pod
        volumes:
          - prometheus_storage.volume:/prometheus
          - /home/aether/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:Z
          - /home/aether/prometheus/rules:/etc/prometheus/rules:Z
        command:
          - "--config.file=/etc/prometheus/prometheus.yml"
          - "--storage.tsdb.path=/prometheus"
          # 30d (was 15d default): the 14d security-rule soak window barely fit inside
          # default retention, so promotion reviews lost the pre-soak context. 30d covers
          # soak + prior fortnight and widens Argos's feature-extraction window.
          # Disk: ~15-22GB extra at current series counts.
          - "--storage.tsdb.retention.time=30d"
          - "--web.console.libraries=/etc/prometheus/console_libraries"
          - "--web.console.templates=/etc/prometheus/consoles"
          - "--web.enable-lifecycle"
        env:
          # GOGC=200: verified ~0.15 core less GC CPU (16% vs ~20% VM). Costs ~2GB RSS (prom ~4.8GB);
          # box has 7GB+ free so it's a good RAM-for-CPU trade on this power-optimized stack.
          GOGC: "200"
          GOMEMLIMIT: "5GiB" # soft cap: runtime tightens GC (not OOM) if heap spikes on WAL-replay/compaction/heavy query
        state: quadlet
      tags: [prometheus]

    - name: Start blackbox-exporter
      containers.podman.podman_container:
        name: blackbox-exporter
        image: quay.io/prometheus/blackbox-exporter:latest
        pod: monitoring-stack.pod
        volumes:
          - /home/aether/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:Z
        command:
          - "--config.file=/etc/blackbox_exporter/config.yml"
        state: quadlet
      tags: [blackbox]

    - name: Start Loki
      containers.podman.podman_container:
        name: loki
        # Pinned (was :latest) 2026-07-11: a fresh :latest pull on a pod restart
        # start-timed-out and killed the log sink, cascading to k8s-metrics-dead.
        # Renovate bumps this.
        image: docker.io/grafana/loki:3.7.3
        pod: monitoring-stack.pod
        pull: missing
        command:
          - "-config.file=/etc/loki/config.yml"
        volumes:
          - /home/aether/loki/loki_config.yml:/etc/loki/config.yml:Z
          - /home/aether/loki/data:/var/lib/loki:Z
        state: quadlet
        # WAL replay under mass-restart contention needs headroom past the default.
        quadlet_options:
          - |
            [Service]
            TimeoutStartSec=300
      tags: [loki]

    - name: Start tempo
      containers.podman.podman_container:
        name: tempo
        image: docker.io/grafana/tempo:2.10.1
        pod: monitoring-stack.pod
        pull: always
        command:
          - "-config.file=/etc/tempo.yaml"
        volumes:
          - /home/aether/tempo/tempo.yml:/etc/tempo.yaml:Z
        state: quadlet
      tags: [tempo]

    - name: Start otel collector
      containers.podman.podman_container:
        name: otel_collector
        # Pinned (was :latest) 2026-07-11: storage/schema surgery and the alpha
        # clickhouse exporter make version surprises unacceptable. Renovate bumps this.
        image: docker.io/otel/opentelemetry-collector-contrib:0.156.0
        pod: monitoring-stack.pod
        pull: missing
        volumes:
          - /home/aether/otel/otel_config.yml:/etc/otelcol-contrib/config.yaml:Z
        env:
          GOGC: "200" # ~0.15 core less GC CPU for ~+2GB RSS; box has ample free RAM.
          GOMEMLIMIT: "3GiB" # MUST stay below the memory_limiter soft refusal (limit-spike = 3200MiB): GC fights heap growth before the limiter drops data (2026-07-11 incident)
        state: quadlet
      tags: [otel]

    - name: Start grafana
      containers.podman.podman_container:
        name: grafana
        pod: monitoring-stack.pod
        image: docker.io/grafana/grafana:latest
        pull: always
        state: quadlet
        volumes:
          - /home/aether/grafana/grafana.ini:/etc/grafana/grafana.ini:Z
          - /home/aether/grafana/provisioning:/etc/grafana/provisioning:Z
          - grafana_storage.volume:/var/lib/grafana:Z
        env:
          GF_INSTALL_PLUGINS: grafana-clickhouse-datasource,yesoreyeram-infinity-datasource,marcusolsson-calendar-panel,marcusolsson-dynamictext-panel,volkovlabs-image-panel,volkovlabs-form-panel,grafana-clock-panel,lework-lenav-panel
          GF_SECURITY_ADMIN_USER: admin
          GF_SECURITY_ADMIN_PASSWORD: "{{ secrets.grafana_password }}"
      tags: [grafana]

    # Grafana file provisioning does not reconcile an omitted receiver from an
    # existing contact point. Keep the DeadMansSwitch heartbeat Kuma-only.
    - name: Remove stale Inquest DeadMansSwitch receiver
      uri:
        url: "http://127.0.0.1:{{ vm.monitoring_stack.ports.grafana }}/api/v1/provisioning/contact-points/inquest-deadman"
        method: DELETE
        user: "{{ secrets.grafana.username | default('shdrch') }}"
        password: "{{ secrets.grafana_password }}"
        force_basic_auth: true
        status_code: [202, 204, 404]
      register: stale_inquest_receiver
      until: stale_inquest_receiver.status in [202, 204, 404]
      retries: 30
      delay: 2
      no_log: true
      tags: [grafana]

    # === Tenant Query Proxy (Janus) ===
    - name: Start Janus multi-service proxy
      containers.podman.podman_container:
        name: janus
        pod: monitoring-stack.pod
        image: registry.gitlab.home.shdr.ch/so/aether/janus/main:latest
        pull: always
        state: quadlet
        env:
          SPRING_PROFILES_ACTIVE: all
          LOKI_URL: http://localhost:3100
          THANOS_URL: http://localhost:9090
          TEMPO_URL: http://localhost:3200
          MANAGEMENT_SERVER_PORT: "18080"
          LABEL_STORE_TYPE: configmap
          LABEL_STORE_CONFIGMAP_PATH: /etc/janus/config.yml
          OAUTH2_ISSUER_URI: https://auth.shdr.ch/realms/aether
          OAUTH2_JWK_SET_URI: https://auth.shdr.ch/realms/aether/protocol/openid-connect/certs
        volumes:
          - /home/aether/janus/config.yml:/etc/janus/config.yml:Z
        quadlet_options:
          - |
            [Service]
            Restart=on-failure
            RestartSec=30s
      tags: [janus, tenant-proxy]

    - name: Start PVE exporter
      containers.podman.podman_container:
        name: pve_exporter
        pod: monitoring-stack.pod
        image: docker.io/prompve/prometheus-pve-exporter:latest
        pull: always
        state: quadlet
        volumes:
          - /home/aether/pve-exporter/pve.yml:/etc/prometheus/pve.yml:Z
        quadlet_options:
          - |
            [Service]
            Restart=on-failure
            RestartSec=30s
            TimeoutStartSec=300s
      tags: [pve-exporter]

    - name: Start PBS exporter
      containers.podman.podman_container:
        name: pbs_exporter
        pod: monitoring-stack.pod
        image: ghcr.io/natrontech/pbs-exporter:latest
        pull: always
        state: quadlet
        env:
          PBS_ENDPOINT: "https://{{ vm.backup_stack.ip }}:8007"
          PBS_USERNAME: "{{ secrets.pbs.monitoring_user }}"
          PBS_API_TOKEN: "{{ secrets.pbs.monitoring_secret }}"
          PBS_API_TOKEN_NAME: "{{ secrets.pbs.monitoring_token_id }}"
          PBS_INSECURE: "true"
          PBS_LISTEN_ADDRESS: ":10019"
      tags: [pbs-exporter]

    - name: Start ClickHouse
      containers.podman.podman_container:
        name: clickhouse
        pod: monitoring-stack.pod
        image: docker.io/clickhouse/clickhouse-server:26.6.1.1193
        pull: missing
        state: quadlet
        volumes:
          - clickhouse_storage.volume:/var/lib/clickhouse:Z
          - /home/aether/clickhouse/init:/docker-entrypoint-initdb.d:Z
          - /home/aether/clickhouse/config.d/aether-system-logs.xml:/etc/clickhouse-server/config.d/aether-system-logs.xml:Z
          - /home/aether/clickhouse/users.d/aether-default-profile.xml:/etc/clickhouse-server/users.d/aether-default-profile.xml:Z
        env:
          CLICKHOUSE_USER: aether
          CLICKHOUSE_PASSWORD: "{{ secrets.clickhouse.password }}"
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
      tags: [clickhouse]

    # === Systemd ===
    - name: Reload systemd
      systemd:
        daemon_reload: yes
        scope: user
      tags:
        [
          prometheus,
          loki,
          tempo,
          otel,
          janus,
          grafana,
          clickhouse,
          pve-exporter,
          pbs-exporter,
          tenant-proxy,
          systemd,
        ]

    - name: Start monitoring stack quadlet
      systemd:
        name: monitoring-stack-pod
        state: restarted
        scope: user
      tags:
        [
          prometheus,
          loki,
          tempo,
          otel,
          janus,
          grafana,
          clickhouse,
          pve-exporter,
          pbs-exporter,
          tenant-proxy,
          monitoring-pod,
        ]

    - name: Wait for ClickHouse to be ready
      uri:
        url: "http://127.0.0.1:{{ vm.monitoring_stack.ports.clickhouse }}/ping"
        method: GET
        return_content: true
        status_code: 200
      register: clickhouse_health
      until:
        - clickhouse_health.status == 200
        - clickhouse_health.content | trim == "Ok."
      retries: 30
      delay: 5
      tags: [clickhouse, grafana, clickhouse-grafana-reader, argos, estate-scan]

    # Init scripts run only on an empty ClickHouse volume. Reapply this
    # idempotent DDL after readiness so existing monitoring-stack deployments
    # gain the VyOS observation schema too.
    - name: Reconcile VyOS observation ClickHouse schema
      containers.podman.podman_container_exec:
        name: clickhouse
        argv:
          - clickhouse-client
          - --user
          - "{{ clickhouse_admin_user }}"
          - --multiquery
          - --queries-file
          - /docker-entrypoint-initdb.d/09-vyos-observations.sql
      tags: [clickhouse, vyos-exporter]

    - name: Deploy Argos contracts and staged worker
      ansible.builtin.import_tasks: argos.yml
      tags: [argos]

    - name: Reconcile estate scan ClickHouse schema
      ansible.builtin.import_tasks: estate_scan.yml
      tags: [estate-scan, clickhouse]

    - name: Validate Grafana ClickHouse credential is decrypted
      assert:
        that:
          - secrets.clickhouse.grafana_readonly_password is string
          - secrets.clickhouse.grafana_readonly_password | length >= 32
          - not secrets.clickhouse.grafana_readonly_password.startswith('ENC[')
        fail_msg: >-
          The Grafana ClickHouse credential is unavailable or still encrypted;
          run the tagged play normally so common : Load secrets executes.
      register: clickhouse_grafana_secret_check
      tags: [clickhouse, grafana, clickhouse-grafana-reader, estate-scan]

    # Exact replacement prevents out-of-band grants from accumulating on this
    # IaC-owned agent-facing identity.
    - name: Reconcile Grafana ClickHouse read-only access
      containers.podman.podman_container_exec:
        name: clickhouse
        argv:
          - clickhouse-client
          - --user
          - "{{ clickhouse_admin_user }}"
          - --multiquery
          - --query
          - |
            CREATE ROLE OR REPLACE {{ clickhouse_grafana_role }} SETTINGS
              readonly = 1,
              max_execution_time = 30 MIN 1 MAX 60 CHANGEABLE_IN_READONLY,
              max_memory_usage = 2000000000,
              max_threads = 4,
              max_concurrent_queries_for_user = 8,
              max_rows_to_read = 100000000,
              max_bytes_to_read = 5000000000,
              max_result_rows = 10000,
              result_overflow_mode = 'throw';
            {% for database in clickhouse_grafana_databases %}
            GRANT SELECT ON {{ database }}.* TO {{ clickhouse_grafana_role }};
            GRANT SHOW DATABASES ON {{ database }}.* TO {{ clickhouse_grafana_role }};
            GRANT SHOW TABLES ON {{ database }}.* TO {{ clickhouse_grafana_role }};
            GRANT SHOW COLUMNS ON {{ database }}.* TO {{ clickhouse_grafana_role }};
            {% endfor %}
            CREATE USER OR REPLACE {{ clickhouse_grafana_user }}
              IDENTIFIED WITH sha256_hash BY '{{ secrets.clickhouse.grafana_readonly_password | hash("sha256") }}'
              HOST LOCAL GRANTEES NONE;
            GRANT {{ clickhouse_grafana_role }} TO {{ clickhouse_grafana_user }};
            ALTER USER {{ clickhouse_grafana_user }} DEFAULT ROLE {{ clickhouse_grafana_role }};
      no_log: true
      when:
        - clickhouse_grafana_secret_check is defined
        - clickhouse_grafana_secret_check is succeeded
      tags: [clickhouse, grafana, clickhouse-grafana-reader, estate-scan]

    - name: Restart Grafana for ClickHouse reader changes
      systemd:
        name: grafana
        state: restarted
        scope: user
      when: "'clickhouse-grafana-reader' in ansible_run_tags"
      tags: [clickhouse-grafana-reader]

    - name: Wait for Grafana after ClickHouse reader changes
      uri:
        url: "http://127.0.0.1:{{ vm.monitoring_stack.ports.grafana }}/api/health"
        method: GET
        status_code: 200
      register: clickhouse_grafana_health
      until: clickhouse_grafana_health.status == 200
      retries: 30
      delay: 5
      when: "'clickhouse-grafana-reader' in ansible_run_tags"
      tags: [clickhouse-grafana-reader]

    # === Grafana Tenant Orgs ===
    - name: Wait for Grafana to be ready
      uri:
        url: "http://127.0.0.1:{{ vm.monitoring_stack.ports.grafana }}/api/health"
        method: GET
        status_code: 200
      register: grafana_health
      until: grafana_health.status == 200
      retries: 30
      delay: 5
      tags: [grafana-tenants]

    - name: Read Grafana effective settings
      uri:
        url: "http://127.0.0.1:{{ vm.monitoring_stack.ports.grafana }}/api/admin/settings"
        method: GET
        user: "{{ secrets.grafana.username | default('shdrch') }}"
        password: "{{ secrets.grafana_password }}"
        force_basic_auth: true
        status_code: 200
      register: grafana_settings
      tags: [grafana-tenants]

    - name: Assert Generic OAuth org mapping config is active
      assert:
        that:
          - grafana_settings.json["auth.generic_oauth"]["org_attribute_path"] == "realm_access.roles"
        fail_msg: >-
          Grafana effective auth config is missing org_attribute_path=realm_access.roles.
          Check mounted /home/aether/grafana/grafana.ini and restart Grafana.
      tags: [grafana-tenants]

    - name: Provision Grafana tenants
      include_tasks:
        file: grafana_tenant.yml
        apply:
          tags:
            - grafana-tenants
      loop: "{{ tenants }}"
      loop_control:
        loop_var: tenant
      tags: [grafana-tenants]

    - name: Switch API user context back to main org
      uri:
        url: "http://127.0.0.1:{{ vm.monitoring_stack.ports.grafana }}/api/user/using/1"
        method: POST
        user: "{{ secrets.grafana.username | default('shdrch') }}"
        password: "{{ secrets.grafana_password }}"
        force_basic_auth: true
        status_code: [200]
      tags: [grafana-tenants]

- name: Deploy Fleet
  import_playbook: fleet.yml

- name: Deploy journal forwarder
  import_playbook: journal_forwarder.yml

- name: Deploy GigaHub exporter
  import_playbook: gigahub_exporter.yml

- name: Deploy QSS switch exporter
  import_playbook: qss_exporter.yml
