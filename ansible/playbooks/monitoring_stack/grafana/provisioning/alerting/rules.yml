      - uid: k8s-cronjob-failing
        title: Kubernetes CronJob Failing
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: |
                (
                  (
                    max by(namespace, job_name) (kube_job_status_failed) > 0
                    and on(namespace, job_name)
                    (time() - max by(namespace, job_name) (kube_job_status_start_time) < 6 * 3600)
                  )
                  * on(namespace, job_name) group_left(owner_name)
                    max by(namespace, job_name, owner_name) (kube_job_owner{owner_kind="CronJob"})
                )
                * on(namespace) group_left(tier, owner, criticality)
                  topk by (namespace) (1, aether:namespace_contract:info)
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "CronJob {{ $labels.namespace }}/{{ $labels.owner_name }} is failing"
          description: "A recent Job owned by CronJob {{ $labels.namespace }}/{{ $labels.owner_name }} has failed for at least one hour"

      # Backup Alert
      - uid: backup-stale
        title: Backup Stale
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: ((label_replace(time() - max by(vm_id) (pbs_snapshot_vm_last_timestamp), "id", "qemu/$1", "vm_id", "(.*)") or label_replace(time() - max by(vm_id) (pbs_snapshot_vm_last_timestamp), "id", "lxc/$1", "vm_id", "(.*)")) * on(id) group_left(name, node) max by(id, name, node) (pve_guest_info{name!=""})) / 3600
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    # Daily backup cadence: allow a 6h collection/rotation margin.
                    params: [30]
              refId: C
        noDataState: OK
        execErrState: OK
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Stale backup for {{ $labels.name }} ({{ $labels.id }})"
          description: 'Last backup was {{ $values.B.Value | printf "%.0f" }} hours ago'

      - uid: db-backup-job-failed
        title: DB Backup Job Failed
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 7200
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: |
                (
                  (
                    max by(namespace, job_name, owner_name, reason) (
                      (kube_job_status_failed{job_name=~"db-backup-.*", reason!=""} > 0)
                      * on(namespace, job_name) group_left(owner_name)
                        max by(namespace, job_name, owner_name) (kube_job_owner{owner_kind="CronJob", owner_name=~"db-backup-.*"})
                    )
                  )
                  unless on(namespace, job_name, owner_name)
                  (
                    max by(namespace, job_name, owner_name) (
                      kube_job_status_start_time{job_name=~"db-backup-.*"}
                      * on(namespace, job_name) group_left(owner_name)
                        max by(namespace, job_name, owner_name) (kube_job_owner{owner_kind="CronJob", owner_name=~"db-backup-.*"})
                    )
                    < on(namespace, owner_name) group_left()
                      max by(namespace, owner_name) (
                        label_replace(
                          kube_cronjob_status_last_successful_time{cronjob=~"db-backup-.*"},
                          "owner_name", "$1", "cronjob", "(.*)"
                        )
                      )
                  )
                )
                * on(namespace) group_left(tier, owner, criticality)
                  topk by (namespace) (1, aether:namespace_contract:info)
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: critical
          channel: page
        annotations:
          summary: "DB backup job failed in {{ $labels.namespace }}"
          description: "Job {{ $labels.job_name }} failed: {{ $labels.reason }}"

      - uid: db-backup-stale
        title: DB Backup Stale
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 7200
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: |
                (
                  (time() - last_over_time(kube_cronjob_status_last_successful_time{cronjob=~"db-backup-.*"}[2h])) / 3600
                )
                * on(namespace) group_left(tier, owner, criticality)
                  topk by (namespace) (1, aether:namespace_contract:info)
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [30]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 15m
        labels:
          severity: critical
          channel: page
        annotations:
          summary: "Stale DB backup for {{ $labels.namespace }}/{{ $labels.cronjob }}"
          description: 'Last successful DB backup was {{ $values.B.Value | printf "%.0f" }} hours ago'

      - uid: db-backup-never-succeeded
        title: DB Backup Never Succeeded
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 7200
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: |
                (
                  last_over_time(kube_cronjob_next_schedule_time{cronjob=~"db-backup-.*"}[2h])
                  unless on(namespace, cronjob)
                  last_over_time(kube_cronjob_status_last_successful_time{cronjob=~"db-backup-.*"}[2h])
                )
                * on(namespace) group_left(tier, owner, criticality)
                  topk by (namespace) (1, aether:namespace_contract:info)
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 36h
        labels:
          severity: critical
          channel: page
        annotations:
          summary: "DB backup has never succeeded for {{ $labels.namespace }}/{{ $labels.cronjob }}"
          description: "No successful DB backup has been observed for this CronJob"

      - uid: cnpg-wal-archiving-failing
        title: CNPG WAL Archiving Failing
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 1800
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: |
                (
                  sum by(namespace, cluster) (
                    increase(cnpg_pg_stat_archiver_failed_count_total[30m])
                  ) > 3
                )
                * on(namespace) group_left(backup)
                  topk by (namespace) (1, aether:namespace_contract:info{backup=~"critical|standard"})
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 30m
        labels:
          severity: critical
          channel: page
        annotations:
          summary: "CNPG WAL archiving is failing for {{ $labels.namespace }}/{{ $labels.cluster }}"
          description: "WAL archiving failures are increasing; point-in-time recovery may be at risk"

      - uid: cnpg-backup-stale
        title: CNPG Backup Stale
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: |
                (
                  (time() - max by(namespace, cluster) (barman_cloud_cloudnative_pg_io_last_available_backup_timestamp)) > 26 * 3600
                )
                * on(namespace) group_left(backup)
                  topk by (namespace) (1, aether:namespace_contract:info{backup=~"critical|standard"})
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 15m
        labels:
          severity: critical
          channel: page
        annotations:
          summary: "CNPG backup is stale for {{ $labels.namespace }}/{{ $labels.cluster }}"
          description: "Last available Barman Cloud plugin backup is older than 26 hours"

      - uid: cnpg-last-backup-failed
        title: CNPG Last Backup Failed
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: |
                (
                  max by(namespace, cluster) (barman_cloud_cloudnative_pg_io_last_failed_backup_timestamp)
                  > max by(namespace, cluster) (barman_cloud_cloudnative_pg_io_last_available_backup_timestamp)
                )
                * on(namespace) group_left(backup)
                  topk by (namespace) (1, aether:namespace_contract:info{backup=~"critical|standard"})
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 15m
        labels:
          severity: critical
          channel: page
        annotations:
          summary: "Last CNPG backup failed for {{ $labels.namespace }}/{{ $labels.cluster }}"
          description: "CNPG reports a failed backup newer than the last available backup"

      # Security soak promotion: after 14 days with no unexplained hits,
      # promote ids-suricata-severity1, wazuh-high-severity, and tetragon-escape-signal
      # from warning/security-digest to critical/page in one reviewed commit.

      - uid: ids-suricata-severity1
        title: IDS Suricata Severity 1
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: clickhouse
            model:
              datasource:
                type: grafana-clickhouse-datasource
                uid: clickhouse
              format: 1
              intervalMs: 1000
              maxDataPoints: 43200
              rawSql: |
                SELECT count() AS value
                FROM suricata.alert
                WHERE Timestamp >= now() - INTERVAL 15 MINUTE
                  AND alert_severity = 1
                  AND alert_signature_id NOT IN (0)
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 0s
        labels:
          severity: warning
          domain: security
        annotations:
          summary: "Suricata severity-1 IDS alert observed"
          description: "ClickHouse saw one or more unsuppressed Suricata severity-1 alerts in the last 15 minutes"

      - uid: ids-suricata-daily-review
        title: IDS Suricata Daily Review
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 86400
              to: 0
            datasourceUid: clickhouse
            model:
              datasource:
                type: grafana-clickhouse-datasource
                uid: clickhouse
              format: 1
              intervalMs: 1000
              maxDataPoints: 43200
              rawSql: |
                SELECT count() AS value
                FROM suricata.alert
                WHERE Timestamp >= now() - INTERVAL 24 HOUR
                  AND alert_severity IN (1, 2)
                  AND alert_signature_id NOT IN (0)
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 0s
        labels:
          severity: warning
          domain: security
        annotations:
          summary: "Suricata severity 1/2 alerts need daily review"
          description: "ClickHouse saw {{ $values.B.Value }} unsuppressed Suricata severity 1/2 alerts in the last 24 hours"

      - uid: ids-zeek-notice
        title: IDS Zeek Notice
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: clickhouse
            model:
              datasource:
                type: grafana-clickhouse-datasource
                uid: clickhouse
              format: 1
              intervalMs: 1000
              maxDataPoints: 43200
