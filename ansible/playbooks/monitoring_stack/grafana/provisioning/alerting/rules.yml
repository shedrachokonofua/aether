              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [14]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 10m
        labels:
