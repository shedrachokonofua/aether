      - uid: netpol-denials
        title: Network Policy Denials
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: |
                (
                  (
                    sum by (source_namespace) (
                      rate(hubble_drop_total{
                        reason="POLICY_DENIED",
                        source_namespace!=""
                      }[15m])
                    ) > 0.1
                  )
                  * on (source_namespace) group_left(tier, criticality, owner)
                    topk by (source_namespace) (
                      1,
                      label_replace(
                        aether:namespace_contract:info,
                        "source_namespace", "$1", "namespace", "(.*)"
                      )
                    )
                )
                or
                (
                  (
                    sum by (source_namespace) (
                      rate(hubble_drop_total{
                        reason="POLICY_DENIED",
                        source_namespace!=""
                      }[15m])
                    ) > 0.1
                  )
                  unless on (source_namespace)
                    label_replace(
                      aether:namespace_contract:info,
                      "source_namespace", "$1", "namespace", "(.*)"
                    )
                )
                or
                (
                  sum by (destination_namespace) (
                    rate(hubble_drop_total{
                      reason="POLICY_DENIED",
                      source_namespace="",
                      destination_namespace!=""
                    }[15m])
                  ) > 0.1
                )
                or
                (
                  sum(
                    rate(hubble_drop_total{
                      reason="POLICY_DENIED",
                      source_namespace="",
                      destination_namespace=""
                    }[15m])
                  ) > 0.1
                )
                or
                (
                  (
                    sum(
                      rate(hubble_drop_total{reason="POLICY_DENIED"}[15m])
                    ) > 0.1
                  )
                  and on ()
                  (
                    max(
                      (
                        sum by (source_namespace) (
                          rate(hubble_drop_total{
                            reason="POLICY_DENIED",
                            source_namespace!=""
                          }[15m])
                        )
                      )
                      or
                      (
                        sum by (destination_namespace) (
                          rate(hubble_drop_total{
                            reason="POLICY_DENIED",
                            source_namespace="",
                            destination_namespace!=""
                          }[15m])
                        )
                      )
                      or
                      (
                        sum(
                          rate(hubble_drop_total{
                            reason="POLICY_DENIED",
                            source_namespace="",
                            destination_namespace=""
                          }[15m])
                        )
                      )
                    ) <= 0.1
                  )
                )
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 15m
        labels:
          severity: warning
          domain: security
        annotations:
          summary: "Network policy denial rate exceeds 0.1/s"
          description: "Cilium reports POLICY_DENIED drops above threshold for source namespace {{ $labels.source_namespace }}, destination namespace {{ $labels.destination_namespace }}, or a diffuse cluster-wide aggregate. Contract metadata when present: tier={{ $labels.tier }}, criticality={{ $labels.criticality }}, owner={{ $labels.owner }}. Drill down via Hubble flows in Grafana."

