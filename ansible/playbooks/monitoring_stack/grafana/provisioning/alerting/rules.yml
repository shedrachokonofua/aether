apiVersion: 1

deleteRules:
  - orgId: 1
    uid: thanos-component-down
  - orgId: 1
    uid: thanos-compactor-halted
  - orgId: 1
    uid: thanos-sidecar-upload-stale

groups:
  - orgId: 1
    name: Infrastructure
    folder: Alerts
    interval: 1m
    rules:

      - uid: deadman-heartbeat
        title: DeadMansSwitch
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: vector(1)
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: Alerting
        execErrState: Alerting
        for: 0s
        labels: {}
        annotations:
          summary: "Heartbeat — if Kuma stops receiving this, home monitoring is down"

      # Host Alerts
      - uid: host-high-cpu
        title: Host High CPU
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: 100 - (avg by(instance)(rate(node_cpu_seconds_total{mode="idle",job="proxmox-hosts-node"}[5m])) * 100)
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [90]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: 'CPU usage is {{ $values.B.Value | printf "%.1f" }}%'

      # Regression tripwire for the talos-smith clocksource fix (2026-07-05):
      # if the guest falls back to acpi_pm, every guest clock read becomes a
      # PIO vmexit and HOST system-CPU spikes (~41% during the incident vs
      # ~15% healthy). Legit load (game-server, backups) drives user/iowait,
      # not sys — so sustained high host-sys% on smith specifically flags the
      # exit-storm regression. TEMPORARY tripwire: tsc=reliable self-heals at the
      # next Talos version bump (boot rewrite) — DELETE this rule at that upgrade.
      - uid: smith-high-system-cpu
        title: Smith High System CPU (clocksource regression)
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: 100 * avg(rate(node_cpu_seconds_total{instance="192.168.2.204:9100",mode="system"}[5m]))
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [30]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: 'Smith host system-CPU high ({{ $values.B.Value | printf "%.0f" }}%) — possible talos-smith clocksource regression to acpi_pm'
          description: 'Healthy ~15%, was ~41% during the acpi_pm PIO-exit storm. Check: talosctl -n 10.0.3.22 read /sys/devices/system/clocksource/clocksource0/current_clocksource (expect tsc, not acpi_pm).'

      - uid: host-high-memory
        title: Host High Memory
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: (1 - avg_over_time(node_memory_MemAvailable_bytes{job="proxmox-hosts-node"}[10m]) / avg_over_time(node_memory_MemTotal_bytes{job="proxmox-hosts-node"}[10m])) * 100
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [90]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: 'Memory usage is {{ $values.B.Value | printf "%.1f" }}%'

      # VM Alerts
      - uid: vm-high-cpu
        title: VM High CPU
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: max by(id, name) (pve_cpu_usage_ratio{id=~"qemu/.*"} * on(id) group_left(name) max by(id, name) (pve_guest_info{name!=""})) * 100
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [90]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on VM {{ $labels.name }}"
          description: 'VM CPU usage is {{ $values.B.Value | printf "%.1f" }}%'

      - uid: vm-high-memory
        title: VM High Memory
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: (sum by(host_name, exported_job) (system_memory_usage_bytes{state="used",host_name!=""}) / sum by(host_name, exported_job) (system_memory_usage_bytes{host_name!=""})) * 100
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [90]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on VM {{ $labels.host_name }}"
          description: 'VM real memory usage is {{ $values.B.Value | printf "%.1f" }}%'

      # Disk Alerts
      - uid: vm-root-disk-space-low
        title: VM Root Disk Space Low
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: (sum by(host_name, mountpoint) (last_over_time(system_filesystem_usage_bytes{state="free",host_name!="",mountpoint="/",type!~"tmpfs|overlay|squashfs"}[15m])) / sum by(host_name, mountpoint) (last_over_time(system_filesystem_usage_bytes{state=~"used|free|reserved",host_name!="",mountpoint="/",type!~"tmpfs|overlay|squashfs"}[15m]))) * 100
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [10]
              refId: C
        noDataState: NoData
        execErrState: Error
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Low root disk space on VM {{ $labels.host_name }}"
          description: 'Root filesystem free space is {{ $values.B.Value | printf "%.1f" }}%'

      - uid: vm-hostmetrics-missing
        title: VM Hostmetrics Missing
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: count by(host_name) (count_over_time(system_filesystem_usage_bytes{state="free",host_name!="",mountpoint="/",type!~"tmpfs|overlay|squashfs"}[1h])) unless on(host_name) count by(host_name) (count_over_time(system_filesystem_usage_bytes{state="free",host_name!="",mountpoint="/",type!~"tmpfs|overlay|squashfs"}[15m]))
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "VM hostmetrics missing for {{ $labels.host_name }}"
          description: "Root filesystem telemetry was present in the last hour but has been absent for 15 minutes"

      - uid: disk-space-low
        title: Disk Space Low
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: (node_filesystem_avail_bytes{job="proxmox-hosts-node",fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{job="proxmox-hosts-node",fstype!~"tmpfs|overlay"}) * 100
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [10]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Low disk space on {{ $labels.instance }} {{ $labels.mountpoint }}"
          description: 'Disk space is {{ $values.B.Value | printf "%.1f" }}% free'

      - uid: disk-smart-unhealthy
        title: Disk SMART Unhealthy
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: smartctl_device_smart_status{job="proxmox-hosts-smart"}
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "SMART failure on {{ $labels.instance }} {{ $labels.device }}"
          description: "Disk SMART status indicates failure - replace disk immediately"

      - uid: proxmox-node-exporter-down
        title: Proxmox Node Exporter Down
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: up{job="proxmox-hosts-node"}
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: Alerting
        execErrState: Error
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Proxmox node exporter is down on {{ $labels.instance }}"
          description: "Node exporter is not being scraped; disk, NVMe, CPU, and memory alerts may be blind"

      - uid: site-exporter-down
        title: Site Exporter Down
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: up{job=~"site-node-exporter|site-wireguard-exporter"}
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: Alerting
        execErrState: Error
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Site exporter down: {{ $labels.service }} on {{ $labels.host }} ({{ $labels.site }})"
          description: "A WireGuard site-fabric exporter is not being scraped; the offsite resolver node (rama, OCI) may be down or unreachable over the tunnel."

      - uid: proxmox-smart-exporter-down
        title: Proxmox SMART Exporter Down
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: up{job="proxmox-hosts-smart"}
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: Alerting
        execErrState: Error
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "SMART exporter is down on {{ $labels.instance }}"
          description: "SMART exporter is not being scraped; disk health alerts may be blind"

      - uid: ceph-exporter-down
        title: Ceph Exporter Down
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: up{job="ceph"}
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: Alerting
        execErrState: Error
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Ceph exporter is down on {{ $labels.instance }}"
          description: "Ceph exporter is not being scraped; OSD alerts may be blind"

      - uid: ceph-osd-daemon-down
        title: Ceph OSD Daemon Down
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: ceph_daemon_socket_up{job="ceph",ceph_daemon=~"ceph-osd\\..*"}
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Ceph OSD {{ $labels.ceph_daemon }} is down on {{ $labels.hostname }}"
          description: "The Ceph exporter can see the OSD daemon socket, but it is not up"

      - uid: ceph-osd-count-low
        title: Ceph OSD Count Low
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: 6 - sum(ceph_daemon_socket_up{job="ceph",ceph_daemon=~"ceph-osd\\..*"})
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: Alerting
        execErrState: Error
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Ceph has fewer than 6 OSD daemons up"
          description: '{{ $values.B.Value | printf "%.0f" }} expected Ceph OSD daemon(s) are missing or down'

      - uid: ceph-nvme-controller-dead
        title: Ceph NVMe Controller Dead
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: node_nvme_info{job="proxmox-hosts-node",state="dead"}
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "NVMe controller {{ $labels.serial }} is dead on {{ $labels.instance }}"
          description: "{{ $labels.model }} reports state=dead via node_exporter"

      - uid: ceph-osd-disk-missing
        title: Ceph OSD Disk Missing
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: absent(node_nvme_info{job="proxmox-hosts-node",instance="192.168.2.202:9100",serial="25385Z803700",state="live"}) or absent(node_nvme_info{job="proxmox-hosts-node",instance="192.168.2.202:9100",serial="25385Z803747",state="live"}) or absent(node_nvme_info{job="proxmox-hosts-node",instance="192.168.2.204:9100",serial="S7U8NJ0XA18390B",state="live"}) or absent(node_nvme_info{job="proxmox-hosts-node",instance="192.168.2.204:9100",serial="S7U8NJ0XA18330N",state="live"}) or absent(node_nvme_info{job="proxmox-hosts-node",instance="192.168.2.205:9100",serial="25206C801512",state="live"}) or absent(node_nvme_info{job="proxmox-hosts-node",instance="192.168.2.205:9100",serial="25124J801300",state="live"})
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Expected Ceph OSD disk {{ $labels.serial }} is missing on {{ $labels.instance }}"
          description: "A Ceph OSD NVMe serial is no longer present as a live controller"

      # OTel / Loki ingestion health
      - uid: otel-loki-queue-high
        title: OTel Loki Queue High
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: (otelcol_exporter_queue_size{job="otel-collector",data_type="logs",exporter="otlphttp/loki"} / otelcol_exporter_queue_capacity{job="otel-collector",data_type="logs",exporter="otlphttp/loki"}) * 100
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [80]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "OTel Loki log exporter queue is high"
          description: 'Loki log exporter queue is {{ $values.B.Value | printf "%.1f" }}% full'


      - uid: greptime-archive-down
        title: GreptimeDB Archive Down
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: up{job="greptime"}
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: Alerting
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GreptimeDB telemetry archive is unavailable"
          description: "Prometheus has failed to scrape the canary archive for 5 minutes; hot-path Prometheus and Loki remain authoritative"

      # Host Down Alert
      - uid: host-down
        title: Host Down
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: min by(id) (pve_up{id=~"node/.*"})
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: Alerting
        execErrState: Error
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Proxmox host {{ $labels.id }} is down"
          description: "Proxmox node is not responding"

      - uid: k8s-replicaset-not-ready
        title: Kubernetes Workload Not Ready
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: prometheus-local
            model:
              # spec_replicas (desired), not status_replicas (existing pods):
              # an RS whose pods can't be created at all (e.g. admission
              # rejection) has status 0-0=0 and never fires on the old expr —
              # coder sat broken for 65d unalerted this way.
              expr: |
                (
                  (
                    max by (namespace, deployment) (
                      kube_deployment_spec_replicas - kube_deployment_status_ready_replicas
                    ) > 0
                  )
                  * on (namespace) group_left(tier, owner, criticality)
                    topk by (namespace) (1, aether:namespace_contract:info)
                )
                or
                (
                  (
                    max by (namespace, replicaset) (
                      (kube_replicaset_spec_replicas - kube_replicaset_status_ready_replicas)
                      and on (namespace, replicaset)
                        kube_replicaset_owner{owner_kind!="Deployment"}
                    ) > 0
                  )
                  * on (namespace) group_left(tier, owner, criticality)
                    topk by (namespace) (1, aether:namespace_contract:info)
                )
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 15m
        # Series gaps during node churn (drain, metrics-pipeline restarts)
        # were resetting the Pending clock via Normal(MissingSeries) — the
        # 2026-07-07 wordpress outage sat not-ready 30m without firing this
        # way. Tolerate 5 missed evals (5m at 1m interval) before resolving.
        missingSeriesEvalsToResolve: 5
        labels:
          severity: critical
        annotations:
          summary: "Workload {{ $labels.namespace }}/{{ $labels.deployment }}{{ $labels.replicaset }} is not ready"
          description: 'Desired replicas exceed ready replicas for 15 minutes. Check Deployment/rollout events for admission/PSA FailedCreate errors.'

      - uid: k8s-pod-create-blocked
        title: Kubernetes Pod Create Blocked
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: |
                (
                  sum by(namespace, pod, reason) (
                    kube_pod_container_status_waiting_reason{reason=~"CreateContainerConfigError|CreateContainerError|InvalidImageName|ErrImagePull|ImagePullBackOff"}
                  )
                )
                * on(namespace) group_left(tier, owner, criticality)
                  topk by (namespace) (1, aether:namespace_contract:info)
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is blocked during create/start"
          description: 'Pod start has been blocked for 15 minutes with reason {{ $labels.reason }}. Admission/PSA FailedCreate needs event metrics; this rule only covers Pods that were created and are stuck before running.'


      # Slow-burn crashloops: step-issuer restarted 16x over 35h (2026-07-07)
      # with zero signal, then turned a routine pod move into a mesh outage.
      # 24h window catches both fast loops and slow rot; restart counters
      # survive metric gaps (monotonic), unlike waiting_reason snapshots.
      - uid: k8s-container-restart-loop
        title: Kubernetes Container Restart Loop
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: |
                (
                  sum by(namespace, pod, container) (
                    increase(kube_pod_container_status_restarts_total[24h])
                  ) >= 5
                )
                * on(namespace) group_left(tier, owner, criticality)
                  topk by (namespace) (1, aether:namespace_contract:info)
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 30m
        labels:
          severity: warning
          channel: digest
        annotations:
          summary: "Container {{ $labels.namespace }}/{{ $labels.pod }}/{{ $labels.container }} is restart-looping"
          description: "{{ $values.B.Value | printf \"%.0f\" }} restarts in 24h. Slow crashloops rot silently until a reschedule turns them into an outage — check logs before that happens."

      # Ambient mesh CA outage: ztunnel cannot mint workload identities, so
      # every pod that (re)schedules in an ambient namespace comes up unable
      # to talk mTLS. Exact minute-zero signal of the 2026-07-07 wordpress
      # outage (istio-csr restart -> "identity error: signing gRPC error").
      # Existing workloads keep cached certs, so this stays invisible until
      # something moves — alert on the log signal, not the wreckage.
      - uid: mesh-identity-signing-failure
        title: Mesh Identity Signing Failure
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: loki
            model:
              expr: sum(count_over_time({k8s_namespace_name="istio-system", k8s_container_name="istio-proxy"} |= `identity error` [10m]))
              queryType: instant
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [3]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "ztunnel cannot obtain workload identities from the mesh CA"
          description: "ztunnel logs show sustained identity-signing failures. New/rescheduled pods in ambient namespaces (infra, osemu) cannot establish mTLS. Check cert-manager-istio-csr and step-issuer in cert-manager namespace."

      - uid: k8s-pod-rejected-psa
        title: Kubernetes Pod Rejected By PSA
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: loki
            model:
              expr: |
                sum by (k8s_namespace_name, aether_tier, aether_owner, aether_criticality) (
                  count_over_time(
                    {k8s_cluster_name="aether-k8s"}
                      | event_domain="k8s"
                      |= "FailedCreate"
                      |= "violates PodSecurity"
                    [15m]
                  )
                ) > 0
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 0s
        labels:
          severity: critical
          channel: page
        annotations:
          summary: "Pods in {{ $labels.k8s_namespace_name }} are being silently rejected by PSA"
          description: "Kubernetes Events show FailedCreate PodSecurity admission rejections for this namespace"
      - uid: k8s-namespace-unclassified
