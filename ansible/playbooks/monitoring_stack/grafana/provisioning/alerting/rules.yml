          domain: security
        annotations:
          summary: "Zeek notices require security review"
          description: "ClickHouse saw {{ $values.B.Value }} Zeek notices in the last hour"

      - uid: ids-suricata-pipeline-stalled
        title: IDS Suricata Pipeline Stalled
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: clickhouse
            model:
              datasource:
                type: grafana-clickhouse-datasource
                uid: clickhouse
              format: 1
              intervalMs: 1000
              maxDataPoints: 43200
              rawSql: |
                SELECT ifNull(dateDiff('minute', max(Timestamp), now()), 999999) AS value
                FROM suricata.flow
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [60]
              refId: C
        noDataState: Alerting
        execErrState: Error
        for: 15m
