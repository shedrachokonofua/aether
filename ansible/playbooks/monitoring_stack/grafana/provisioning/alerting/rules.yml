          description: 'Last successful Talos etcd snapshot was {{ $values.B.Value | printf "%.0f" }} hours ago'

      # GPU Alerts
      - uid: gpu-high-temp
        title: GPU High Temperature
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: DCGM_FI_DEV_GPU_TEMP
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [85]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High GPU temperature on {{ $labels.Hostname }} GPU {{ $labels.gpu }}"
          description: 'GPU temperature is {{ $values.B.Value | printf "%.0f" }}°C'

      - uid: gpu-high-memory
        title: GPU High Memory
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: (DCGM_FI_DEV_FB_USED / (DCGM_FI_DEV_FB_USED + DCGM_FI_DEV_FB_FREE)) * 100
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [95]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High GPU memory usage on {{ $labels.Hostname }} GPU {{ $labels.gpu }}"
          description: 'GPU framebuffer usage is {{ $values.B.Value | printf "%.1f" }}%'

      - uid: gpu-thermal-throttling
        title: GPU XID / driver fault
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: prometheus-local
            model:
              # DCGM_FI_DEV_XID_ERRORS is a latched gauge (last Xid code seen,
              # held until driver reload) — NOT a count. Alerting on level > 0
              # re-fires forever on one stale event; changes() fires only when
              # a NEW Xid lands. max by(...) drops per-pod labels so pod churn
              # on a shared GPU can't mint duplicate alert instances.
              expr: max by (Hostname, gpu, err_code, err_msg) (changes(DCGM_FI_DEV_XID_ERRORS[15m]))
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "GPU XID error on {{ $labels.Hostname }} GPU {{ $labels.gpu }}"
          description: "New XID event (code {{ $labels.err_code }}: {{ $labels.err_msg }}) — check talosctl dmesg / GPU health"


      # HTTP synthetic probes — public apps page on sustained failure.
      # Targets come from synthetic_probe_targets (blackbox-http-apps job).
      - uid: probe-failed-public
        title: Probe Failed Public
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: probe_success{job="blackbox-http-apps", probe_exposure="public"}
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: critical
          channel: page
        annotations:
          summary: "Public app probe failed for {{ $labels.probe_hostname }}"
          description: "blackbox http_2xx probe to {{ $labels.instance }} (namespace {{ $labels.probe_namespace }}) has been failing for 5 minutes"

      - uid: probe-failed-internal
        title: Probe Failed Internal
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: probe_success{job="blackbox-http-apps", probe_exposure=~"internal|tunnel"}
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 10m
        labels:
          severity: warning
          channel: digest
        annotations:
          summary: "Internal app probe failed for {{ $labels.probe_hostname }}"
          description: "blackbox http_2xx probe to {{ $labels.instance }} (namespace {{ $labels.probe_namespace }}) has been failing for 10 minutes"

      # TLS cert expiry — fires 14 days before a probed cert's NotAfter.
      # Targets are scraped by blackbox-exporter via the `tls_connect` module
      # (see ansible/playbooks/monitoring_stack/blackbox.yml + the
      # `blackbox-tls` job in prometheus.yml.j2). Lab learned this matters in
      # the Apr 2026 OpenBao outage: server cert silently rolled past
      # NotAfter and every machine using openbao-agent stopped renewing.
      - uid: tls-cert-expiring-soon
        title: TLS cert expiring soon
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: (probe_ssl_earliest_cert_expiry - time()) / 86400
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [14]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "TLS cert on {{ $labels.instance }} expires in {{ $values.B.Value | printf \"%.1f\" }}d"
          description: "Renew before NotAfter — see docs/bastion.md (lessons learned from the OpenBao incident)."

      # Local file certificates are not visible to blackbox-exporter until
      # they are presented by a live endpoint. These rules cover the files
      # watched by the VM/NixOS certificate-monitoring paths.
      - uid: x509-file-cert-expiring
        title: Local X.509 certificate expiring
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: |
                (
                  (x509_cert_not_after - time())
                  / clamp_min(x509_cert_not_after - x509_cert_not_before, 1)
                ) < 0.30
                and x509_cert_expired == 0
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 10m
        labels:
          severity: warning
          channel: digest
        annotations:
          summary: "Local certificate {{ $labels.filepath }} has less than 30% lifetime remaining"
          description: "The watched file certificate on {{ $labels.host_name }} needs renewal before it reaches NotAfter."

      - uid: x509-file-cert-expired
        title: Local X.509 certificate expired
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: x509_cert_expired == 1
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: critical
          channel: page
        annotations:
          summary: "Local certificate {{ $labels.filepath }} is expired"
          description: "A certificate on {{ $labels.host_name }} has passed NotAfter; check its renewal unit and dependent service."

      - uid: x509-renewal-unit-failed
        title: Certificate renewal unit failed
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: systemd_unit_state{state="failed",name=~"(backrest-cert-renew|openbao-cert-renew|step-ca-cert-renew)\\.(service|timer)"} == 1
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
          channel: digest
        annotations:
          summary: "Certificate renewal unit {{ $labels.name }} failed on {{ $labels.host_name }}"
          description: "The renewal unit is in systemd failed state. Investigate before the current certificate reaches NotAfter."

      - uid: x509-renewal-daemon-down
        title: Certificate renewal daemon down
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: |
                max by (host_name, name) (
                  systemd_unit_state{
                    state="active",
                    name=~"(openbao-cert-renew|step-ca-cert-renew)\\.service"
                  }
                ) == 0
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 10m
        labels:
          severity: warning
          channel: digest
        annotations:
          summary: "Certificate renewal daemon {{ $labels.name }} is not active on {{ $labels.host_name }}"
          description: "The long-running step-ca renewal daemon is down while its certificate may still look healthy."

      - uid: x509-renewal-timer-down
        title: Certificate renewal timer down
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: systemd_unit_state{name="backrest-cert-renew.timer",state="active"} == 0
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 10m
        labels:
          severity: warning
          channel: digest
        annotations:
          summary: "Certificate renewal timer is not active on {{ $labels.host_name }}"
          description: "The timer-backed backup certificate renewal path is not scheduled."

      # Kubernetes cert-manager provides its own lifecycle timestamps. Use its
      # renewal deadline rather than a fixed 30% threshold because the cluster
      # has both long-lived application certificates and one-hour Istio certs.
      - uid: k8s-cert-renewal-overdue
        title: Kubernetes certificate renewal overdue
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: |
                (
                  certmanager_certificate_renewal_timestamp_seconds - time() < 0
                )
                and on (namespace, name, issuer_group, issuer_kind, issuer_name)
                (
                  max by (namespace, name, issuer_group, issuer_kind, issuer_name) (
                    certmanager_certificate_ready_status{condition="True"}
                  ) == 0
                )
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 10m
        labels:
          severity: warning
          channel: digest
        annotations:
          summary: "Kubernetes certificate {{ $labels.namespace }}/{{ $labels.name }} renewal is overdue"
          description: "cert-manager has passed its renewal timestamp without a Ready certificate."

      - uid: k8s-cert-expiring-critical
        title: Kubernetes certificate near expiry
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: |
                (
                  certmanager_certificate_expiration_timestamp_seconds - time() < 3600
                )
                and on (namespace, name, issuer_group, issuer_kind, issuer_name)
                (
                  max by (namespace, name, issuer_group, issuer_kind, issuer_name) (
                    certmanager_certificate_ready_status{condition="True"}
                  ) == 0
                )
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: critical
          channel: page
        annotations:
          summary: "Kubernetes certificate {{ $labels.namespace }}/{{ $labels.name }} expires within one hour"
          description: "cert-manager has not produced a Ready replacement before the certificate's NotAfter."
      # =====================================================================
      # Jellyfin — UX / auth / debrid-link observability
      # =====================================================================

      - uid: jellyfin-gelato-stream-failures
        title: Jellyfin Gelato Stream Resolution Failures
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: loki
            model:
              expr: |
                sum(count_over_time(
                  {k8s_namespace_name="jellyfin"}
                    |= "Invalid stream, skipping"
                  [1h]
                ))
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [5]
              refId: C
        noDataState: OK
        execErrState: OK
        for: 5m
        labels:
          severity: warning
          domain: media
        annotations:
          summary: "Jellyfin Gelato debrid providers are failing"
          description: "{{ $values.B.Value }} Invalid stream skipping events in the last hour — debrid provider rot (torrentio/mediafusion/comet/premiumize). Playback attempts fail before transcoding starts."

      - uid: jellyfin-gelato-no-streams
        title: Jellyfin Click-Play-No-Streams
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: loki
            model:
              expr: |
                sum(count_over_time(
                  {k8s_namespace_name="jellyfin"}
                    |~ "SyncStreams finished .* streams=0"
                  [1h]
                ))
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: OK
        for: 5m
        labels:
          severity: warning
          domain: media
        annotations:
          summary: "Jellyfin playback attempts returning zero usable streams"
          description: "{{ $values.B.Value }} SyncStreams results returned zero streams in the last hour. Users click play and nothing happens — worst-case UX with no error surfaced."

      - uid: jellyfin-down
        title: Jellyfin Server Down
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: jellyfin_up
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: Alerting
        execErrState: OK
        for: 5m
        labels:
          severity: critical
          domain: media
        annotations:
          summary: "Jellyfin exporter reports server unreachable"
          description: "jellyfin_up has been 0 for 5 minutes. The exporter cannot reach the Jellyfin API — either the server is down or the API key is invalid."

  # ===========================================================================
  # Matrix inbound application service (mnemo). Metrics arrive via the OTel
  # pipeline (job=otel-metrics). See ../mnemo/docs/MATRIX_APPSERVICE_RUNBOOK.md.
  # ===========================================================================
  - orgId: 1
    name: Matrix Appservice
    folder: Alerts
    interval: 1m
    rules:
      # Feed liveness: no transaction received in 24h while the feed was
      # previously active (guards the fresh-deploy zero case).
      - uid: mnemo-matrix-as-no-receipt
        title: Mnemo Matrix Appservice — no transactions received (24h)
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: (time() - mnemo_matrix_appservice_last_received_timestamp_seconds) and (mnemo_matrix_appservice_last_received_timestamp_seconds > 0)
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [86400]
              refId: C
        noDataState: OK
        execErrState: OK
        for: 30m
        labels:
          severity: warning
          domain: messaging
        annotations:
          summary: "mnemo has received no Matrix appservice transaction in 24h"
          description: "Synapse push feed may be down. Check the mnemo receiver (:4001), the Synapse registration, and docs/MATRIX_APPSERVICE_RUNBOOK.md."

      # Backlog: transactions accepted/processing but not processed for 5m.
      - uid: mnemo-matrix-as-backlog
        title: Mnemo Matrix Appservice — processing backlog
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: mnemo_matrix_appservice_backlog_transactions
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: OK
        for: 5m
        labels:
          severity: warning
          domain: messaging
        annotations:
          summary: "mnemo Matrix appservice projection backlog for 5m"
          description: "Transactions are accepted but not processed. The matrix_appservice Oban worker (concurrency 1) may be stuck. See docs/MATRIX_APPSERVICE_RUNBOOK.md."

      # Terminal failure: status=failed is set only on the last Oban attempt.
      - uid: mnemo-matrix-as-failed
        title: Mnemo Matrix Appservice — terminal transaction failure
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: mnemo_matrix_appservice_failed_transactions
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: OK
        for: 1m
        labels:
          severity: critical
          domain: messaging
        annotations:
          summary: "mnemo Matrix appservice has a terminally failed transaction"
          description: "A transaction exhausted all Oban attempts. Inspect last_error and replay per docs/MATRIX_APPSERVICE_RUNBOOK.md."

      # Repeated authentication failures (bad/rotated hs_token or probing).
      - uid: mnemo-matrix-as-auth-failures
        title: Mnemo Matrix Appservice — repeated auth failures
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: increase(mnemo_matrix_appservice_auth_failures_total[15m])
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [5]
              refId: C
        noDataState: OK
        execErrState: OK
        for: 0m
        labels:
          severity: warning
          domain: messaging
        annotations:
          summary: "mnemo Matrix appservice authentication failures"
          description: "More than 5 bearer-auth rejections in 15m. Check for an hs_token mismatch (rotation drift) or unauthorized probing."

      # Transaction ID reused with a different body hash — delivery-contract violation.
      - uid: mnemo-matrix-as-conflict
        title: Mnemo Matrix Appservice — transaction/body-hash conflict
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: sum(mnemo_matrix_appservice_transactions_total{result="conflict"})
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: OK
        for: 0m
        labels:
          severity: critical
          domain: messaging
        annotations:
          summary: "mnemo Matrix appservice transaction ID/body-hash conflict"
          description: "A transaction ID was reused with different content — a delivery-contract violation. Investigate Synapse retry behavior immediately."

  # ===========================================================================
  - orgId: 1
    name: Journal Forwarder
    folder: Alerts
    interval: 1m
    rules:
      # No successful export from a source in 15m. Every live host logs
      # something within 15m, so a stale source means the gatewayd is down,
      # the mTLS/WireGuard path broke, or a cert renewal was missed.
      - uid: journal-forwarder-poll-stale
        title: Journal Forwarder Poll Stale
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: time() - ojgf_last_success_timestamp_seconds
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [900]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
          domain: monitoring
        annotations:
          summary: "Journal forwarder source {{ $labels.source }} has not exported in >15m"
          description: 'No successful OTLP export from {{ $labels.source }} for {{ $values.B.Value | printf "%.0f" }}s. Check the source gatewayd, the WireGuard/mTLS path, and cert renewal.'

      # Sustained poll failures against a source (gatewayd down, TLS expiry,
      # network path broken). TLS-expiry failures surface here by design.
      - uid: journal-forwarder-poll-errors
        title: Journal Forwarder Poll Errors
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: increase(ojgf_poll_errors_total[15m])
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [10]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
          domain: monitoring
        annotations:
          summary: "Journal forwarder poll errors for {{ $labels.source }}"
          description: '{{ $values.B.Value | printf "%.0f" }} poll errors in 15m against {{ $labels.source }}. Check gatewayd reachability and certificate validity.'

      # The forwarder metrics endpoint is entirely gone: service down or the
      # scrape broke. absent() returns 1 only when no series exist.
      - uid: journal-forwarder-absent
        title: Journal Forwarder Absent
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: absent(ojgf_last_poll_timestamp_seconds)
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 10m
        labels:
          severity: warning
          domain: monitoring
        annotations:
          summary: "Journal forwarder metrics absent"
          description: "No ojgf_* metrics on monitoring-stack for >10m — the otel-journal-gatewayd-forwarder service is down or its scrape broke."

      # Estate scanner — stale/failed coverage (Phase 2 gate before broad scans)
      - uid: estate-scan-run-stale
        title: Estate Scan Run Stale
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: clickhouse
            model:
              datasource:
                type: grafana-clickhouse-datasource
                uid: clickhouse
              format: 1
              intervalMs: 1000
              maxDataPoints: 43200
              rawSql: |
                SELECT ifNull(dateDiff('hour', max(coalesce(finished_at, started_at)), now()), 999) AS value
                FROM estate_scan.scan_runs FINAL
                WHERE status = 'succeeded'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [12]
              refId: C
        noDataState: Alerting
        execErrState: Error
        for: 15m
        labels:
          severity: warning
          domain: security
        annotations:
          summary: "Estate scanner has no successful run in >12h"
          description: "Last successful estate_scan.scan_runs row is {{ $values.B.Value }} hours old. Check Kestra aether.estate/estate-scan-home and the estate-scanner guest."

      - uid: estate-scan-run-failed
        title: Estate Scan Run Failed
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: clickhouse
            model:
              datasource:
                type: grafana-clickhouse-datasource
                uid: clickhouse
              format: 1
              intervalMs: 1000
              maxDataPoints: 43200
              rawSql: |
                SELECT count() AS value
                FROM estate_scan.scan_runs FINAL
                WHERE status = 'failed'
                  AND coalesce(finished_at, started_at) >= now() - INTERVAL 6 HOUR
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 0s
        labels:
          severity: warning
          domain: security
        annotations:
          summary: "Estate scanner recorded a failed run"
          description: "{{ $values.B.Value }} failed estate_scan.scan_runs in the last 6 hours. Inspect stage_artifacts and Kestra execution logs."

  # ===========================================================================
  # Network — end-to-end path health via the four network exporters:
  # GigaHub fiber/WAN (gigahub-exporter), VyOS router (vyos-exporter),
  # QNAP rack switch (qss-exporter), UniFi WiFi (unpoller).
  # ===========================================================================
  - orgId: 1
    name: Network
    folder: Alerts
    interval: 1m
    rules:

      - uid: network-gpon-down
        title: GPON Fiber Down
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: 'gigahub_gpon_operational'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: 'GPON ONT deregistered — fiber link down at the GigaHub'
          description: 'The ONT lost GPON registration. Check the fiber connector at the GigaHub, then Bell service status.'

      - uid: network-pppoe-down
        title: PPPoE WAN Down
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: 'gigahub_ppp_up'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: 'PPPoE WAN session down on the GigaHub'
          description: 'No internet. If GPON is still registered, this is a session/auth problem — the GigaHub usually re-establishes within minutes.'

      - uid: network-optical-rx-low
        title: Optical RX Power Low
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: 'gigahub_optical_rx_power_dbm'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [-25]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: 'Optical RX power low ({{ $values.B.Value | printf "%.1f" }} dBm; baseline -22.5, B+ floor -28)'
          description: 'RX drifting toward the GPON B+ sensitivity floor. Inspect/clean the fiber connector; compare against the 7-day trend on the Network dashboard.'

      - uid: network-optical-rx-critical
        title: Optical RX Power Critical
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: 'gigahub_optical_rx_power_dbm'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [-27]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: 'Optical RX power near the GPON B+ sensitivity floor ({{ $values.B.Value | printf "%.1f" }} dBm)'
          description: 'Link loss imminent. Check for a bent/pinched patch cable or water ingress at outdoor joints; call Bell if the drop is at the OLT side.'

      - uid: network-optical-rx-drift
        title: Optical RX Power Drift
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: 'gigahub_optical_rx_power_dbm - avg_over_time(gigahub_optical_rx_power_dbm[7d])'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [-3]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: 'Optical RX dropped {{ $values.B.Value | printf "%.1f" }} dB below its 7-day baseline'
          description: 'Slow drift is the fiber-degradation signature even while absolute power is in spec. Inspect connectors before it reaches the floor.'

      - uid: network-exporter-scrape-down
        title: Network Exporter Scrape Failing
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: 'up{exported_job=~"gigahub-exporter|qss-exporter|vyos-exporter|unifi"}'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Network exporter scrape failing: {{ $labels.exported_job }} on {{ $labels.host_name }}'
          description: 'The node agent reaches the exporter''s port but the scrape fails. Check the exporter service unit on that host.'

      - uid: network-exporters-absent
        title: Network Exporters Absent
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: '4 - count(group by (exported_job) (up{exported_job=~"gigahub-exporter|qss-exporter|vyos-exporter|unifi"}))'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: '{{ $values.B.Value }} of 4 network exporter(s) absent from telemetry — node agent or pipeline down'
          description: 'Expected exporters: gigahub-exporter, qss-exporter, vyos-exporter, unifi. Series vanished from Prometheus entirely — most likely a node agent death (systemctl
            status aether-otel-collector on monitoring-stack; the otlp-receiver port conflict crash-looped it twice before) or the central collector pipeline.'

      - uid: network-vyos-service-failed
        title: VyOS Service Failed
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: 'sum(vyos_service_failed)'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'One or more expected VyOS services failed'
          description: 'A monitored systemd unit on the router is in failed state. Check the VyOS row on the Network dashboard, then the router journal.'

      - uid: network-conntrack-high
        title: Router Conntrack High
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: 'max(vyos_conntrack_utilization_ratio) * 100'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [50]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'Router conntrack table {{ $values.B.Value | printf "%.0f" }}% full'
          description: 'Normal load is <1% (~2-6k flows); 50% (~130k) means a scan, a runaway client, or a P2P storm. Raise the limit only if the load is legitimate.'

      - uid: network-switch-port-errors
        title: Switch Port Errors
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: 'max by (port) (increase(qss_port_fcs_errors[15m]) + increase(qss_port_receive_errors[15m]))'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [50]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
          channel: digest
        annotations:
          summary: 'Switch port {{ $labels.port }} accumulating FCS/RX errors ({{ $values.B.Value | printf "%.0f" }} in 15m)'
          description: 'Physical-layer errors on this port — reseat/replace the cable or SFP.'

      - uid: network-sfp-temp-high
        title: Switch SFP Temperature High
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: 'max by (port) (qss_sfp_temperature_celsius)'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [75]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'SFP module on switch port {{ $labels.port }} at {{ $values.B.Value | printf "%.0f" }}°C'
          description: 'Normal is ~55°C. Check rack airflow and the switch fans before the module throttles or dies.'

      - uid: network-ap-offline
        title: UniFi AP Offline
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: 'count(unpoller_device_info{type="uap"})'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: Alerting
        execErrState: Error
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'UniFi AP offline (or unpoller lost the controller)'
          description: 'No AP visible to unpoller (single-AP estate: the U7 Pro). WiFi is down or the controller/unpoller on home-gateway-stack is broken.'

      - uid: network-suricata-capture-drops
        title: Suricata Capture Drops
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: 'increase(vyos_suricata_capture_drops_total[15m])'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [1000]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 10m
        labels:
          severity: warning
          channel: digest
        annotations:
          summary: 'Suricata dropping capture packets ({{ $values.B.Value | printf "%.0f" }} in 15m) — IDS blind spots under load'
          description: 'The IDS cannot keep up with traffic; alerts may be missed. Check router CPU and Suricata memory on the IDS dashboard.'

      - uid: network-dns-servfail
        title: DNS SERVFAIL Elevated
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: 'sum(increase(vyos_dns_queries_total{outcome="servfail"}[15m]))'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [50]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
          channel: digest
        annotations:
          summary: 'Elevated SERVFAIL rate from the VyOS DNS forwarder ({{ $values.B.Value | printf "%.0f" }} in 15m)'
          description: 'Upstream resolver trouble — check the Technitium nodes ns1/ns2 (.236/.237) and their DoH upstreams.'

      - uid: network-dhcp-pool-high
        title: DHCP Pool Near Exhaustion
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: 'max by (pool) (vyos_dhcp_pool_utilization_ratio) * 100'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [90]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 15m
        labels:
          severity: warning
          channel: digest
        annotations:
          summary: 'DHCP pool {{ $labels.pool }} at {{ $values.B.Value | printf "%.0f" }}% utilization'
          description: 'New devices on that VLAN will fail to get a lease. Widen the range or evict stale leases.'

      - uid: network-device-rebooted
        title: Network Device Rebooted
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: '(vyos_uptime_seconds < 600) or (gigahub_device_uptime_seconds < 600)'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 0s
        labels:
          severity: warning
          channel: digest
        annotations:
          summary: 'Router or GigaHub rebooted in the last 10 minutes'
          description: 'Unexpected reboots of the edge devices are worth a look: power blip, crash, or firmware update. Uptime series identifies which device.'


      - uid: network-new-mac
        title: New MAC Address On Network
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: clickhouse
            model:
              datasource:
                type: grafana-clickhouse-datasource
                uid: clickhouse
              format: 1
              intervalMs: 1000
              maxDataPoints: 43200
              rawSql: |
                SELECT mac, coalesce(hostname, 'unknown') AS hostname, 1 AS value
                FROM (
                  SELECT mac,
                         min(first_seen) AS first_seen,
                         anyLast(hostname) AS hostname
                  FROM network.mac_first_seen
                  GROUP BY mac
                  HAVING first_seen > now() - INTERVAL 20 MINUTE
                )
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: 'New device on the network: {{ $labels.mac }} ({{ $labels.hostname }})'
          description: 'MAC {{ $labels.mac }} observed for the first time ever (network.mac_first_seen: router DHCP/ARP + switch FDB). If unexpected, check the Network dashboard and DHCP leases.'

      - uid: network-observations-stale
        title: Observation Pipeline Stale
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: clickhouse
            model:
              datasource:
                type: grafana-clickhouse-datasource
                uid: clickhouse
              format: 1
              intervalMs: 1000
              maxDataPoints: 43200
              rawSql: |
                SELECT ifNull(dateDiff('minute', max(timestamp), now()), 999) AS value
                FROM network.observations
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [30]
              refId: C
        noDataState: Alerting
        execErrState: Error
        for: 10m
        labels:
          severity: warning
          channel: digest
        annotations:
          summary: 'Observation pipeline stale — no new network.observations rows for {{ $values.B.Value }} minutes'
          description: 'vyos_neighbor rows normally land every few minutes. Check the router collector, node agent, central ClickHouse collector, and ClickHouse.'

      # Per-stream freshness: the global rule above catches total pipeline
      # death, but a single dead source hides inside a global max(timestamp).
      # Fast streams only - event-driven sources (vyos_firewall/router,
      # exporter lifecycle) are legitimately quiet and excluded.
      - uid: network-observation-stream-stale
        title: Observation Stream Stale
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: clickhouse
            model:
              datasource:
                type: grafana-clickhouse-datasource
                uid: clickhouse
              format: 1
              intervalMs: 1000
              maxDataPoints: 43200
              rawSql: |
                SELECT source_type, dateDiff('minute', max(timestamp), now()) AS value
                FROM network.observations
                WHERE source_type IN ('vyos_neighbor','vyos_dhcp','vyos_connectivity','qss_fdb','qss_lldp','qss_switch')
                GROUP BY source_type
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [45]
              refId: C
        noDataState: Alerting
        execErrState: Error
        for: 10m
        labels:
          severity: warning
          channel: digest
        annotations:
          summary: 'Observation stream {{ $labels.source_type }} stale for {{ $values.B.Value | printf "%.0f" }} minutes'
          description: 'One source stopped while others may still flow: check the exporter for that source (vyos-exporter / qss-exporter), its sealed-file directory, and the collector leg that ships it.'

      # DNS query attribution stream: every resolver ships per-client query
      # logs to Loki. The NixOS home pair (adguard/adguard-secondary) tails the
      # Log Exporter NDJSON via its local collector; the agent-free offsite node
      # (rama) tails it into the journal, pulled by journal-gatewayd ->
      # otel_journal_forwarder. The `|= questionName` filter isolates query
      # lines even inside rama's shared journal stream. ns2 carries the DNAT'd
      # estate traffic, so an hour of silence from any node means the
      # attribution pipeline (app, file, collector/forwarder, or Loki) broke -
      # the resolver itself may still be serving.
      - uid: dns-querylog-stale
        title: DNS Query Log Stream Stale
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: loki
            model:
              expr: 'sum by (service_name) (count_over_time({service_name=~"adguard|adguard-secondary|rama"} |= `questionName` [1h]))'
              queryType: instant
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: Alerting
        execErrState: Error
        for: 15m
        labels:
          severity: warning
          channel: digest
        annotations:
          summary: 'DNS query log stream from {{ $labels.service_name }} silent for an hour'
          description: 'Per-client DNS attribution stopped flowing from that resolver: check the Log Exporter app + /var/log/technitium/query.ndjson, then the shipping leg (home pair: local collector filelog; rama: technitium-querylog-journal unit -> journal-gatewayd -> otel_journal_forwarder), then Loki ingest. DNS service itself may still be up.'