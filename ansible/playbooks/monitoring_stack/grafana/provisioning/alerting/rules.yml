          description: "The latest scheduled Talos etcd snapshot command did not complete successfully"

      - uid: talos-etcd-snapshot-stale
        title: Talos Etcd Snapshot Stale
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 7200
              to: 0
            datasourceUid: prometheus-local
            model:
              expr: (time() - aether_talos_etcd_snapshot_last_success_timestamp_seconds{service_name="aether-restic"}) / 3600
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
