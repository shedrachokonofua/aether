              expr: (time() - aether_restic_snapshot_last_success_timestamp_seconds{service_name="aether-restic"}) / 3600
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [30]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "Stale restic backup for {{ $labels.plan_id }}"
          description: 'Last restic snapshot for {{ $labels.path }} was {{ $values.B.Value | printf "%.0f" }} hours ago'

      - uid: talos-etcd-snapshot-failed
        title: Talos Etcd Snapshot Failed
        condition: C
