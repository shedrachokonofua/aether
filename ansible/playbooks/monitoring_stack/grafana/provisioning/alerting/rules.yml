apiVersion: 1

groups:
  - orgId: 1
    name: Infrastructure
    folder: Alerts
    interval: 1m
    rules:
      # Host Alerts
      - uid: host-high-cpu
        title: Host High CPU
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: 100 - (avg by(instance)(rate(node_cpu_seconds_total{mode="idle",job="proxmox-hosts-node"}[5m])) * 100)
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [90]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: 'CPU usage is {{ $values.B.Value | printf "%.1f" }}%'

      - uid: host-high-memory
        title: Host High Memory
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: (1 - avg_over_time(node_memory_MemAvailable_bytes{job="proxmox-hosts-node"}[10m]) / avg_over_time(node_memory_MemTotal_bytes{job="proxmox-hosts-node"}[10m])) * 100
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [90]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: 'Memory usage is {{ $values.B.Value | printf "%.1f" }}%'

      # VM Alerts
      - uid: vm-high-cpu
        title: VM High CPU
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: max by(id, name) (pve_cpu_usage_ratio{id=~"qemu/.*"} * on(id) group_left(name) max by(id, name) (pve_guest_info{name!=""})) * 100
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [90]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on VM {{ $labels.name }}"
          description: 'VM CPU usage is {{ $values.B.Value | printf "%.1f" }}%'

      - uid: vm-high-memory
        title: VM High Memory
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: (sum by(host_name, exported_job) (system_memory_usage_bytes{state="used",host_name!=""}) / sum by(host_name, exported_job) (system_memory_usage_bytes{host_name!=""})) * 100
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [90]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on VM {{ $labels.host_name }}"
          description: 'VM real memory usage is {{ $values.B.Value | printf "%.1f" }}%'

      # Disk Alerts
      - uid: vm-root-disk-space-low
        title: VM Root Disk Space Low
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: (sum by(host_name, mountpoint) (last_over_time(system_filesystem_usage_bytes{state="free",host_name!="",mountpoint="/",type!~"tmpfs|overlay|squashfs"}[15m])) / sum by(host_name, mountpoint) (last_over_time(system_filesystem_usage_bytes{state=~"used|free|reserved",host_name!="",mountpoint="/",type!~"tmpfs|overlay|squashfs"}[15m]))) * 100
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [10]
              refId: C
        noDataState: NoData
        execErrState: Error
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Low root disk space on VM {{ $labels.host_name }}"
          description: 'Root filesystem free space is {{ $values.B.Value | printf "%.1f" }}%'

      - uid: vm-hostmetrics-missing
        title: VM Hostmetrics Missing
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: count by(host_name) (count_over_time(system_filesystem_usage_bytes{state="free",host_name!="",mountpoint="/",type!~"tmpfs|overlay|squashfs"}[1h])) unless on(host_name) count by(host_name) (count_over_time(system_filesystem_usage_bytes{state="free",host_name!="",mountpoint="/",type!~"tmpfs|overlay|squashfs"}[15m]))
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "VM hostmetrics missing for {{ $labels.host_name }}"
          description: "Root filesystem telemetry was present in the last hour but has been absent for 15 minutes"

      - uid: disk-space-low
        title: Disk Space Low
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: (node_filesystem_avail_bytes{job="proxmox-hosts-node",fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{job="proxmox-hosts-node",fstype!~"tmpfs|overlay"}) * 100
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [10]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Low disk space on {{ $labels.instance }} {{ $labels.mountpoint }}"
          description: 'Disk space is {{ $values.B.Value | printf "%.1f" }}% free'

      - uid: disk-smart-unhealthy
        title: Disk SMART Unhealthy
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: smartctl_device_smart_status{job="proxmox-hosts-smart"}
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "SMART failure on {{ $labels.instance }} {{ $labels.device }}"
          description: "Disk SMART status indicates failure - replace disk immediately"

      - uid: proxmox-node-exporter-down
        title: Proxmox Node Exporter Down
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: up{job="proxmox-hosts-node"}
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: Alerting
        execErrState: Error
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Proxmox node exporter is down on {{ $labels.instance }}"
          description: "Node exporter is not being scraped; disk, NVMe, CPU, and memory alerts may be blind"

      - uid: proxmox-smart-exporter-down
        title: Proxmox SMART Exporter Down
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: up{job="proxmox-hosts-smart"}
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: Alerting
        execErrState: Error
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "SMART exporter is down on {{ $labels.instance }}"
          description: "SMART exporter is not being scraped; disk health alerts may be blind"

      - uid: ceph-exporter-down
        title: Ceph Exporter Down
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: up{job="ceph"}
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: Alerting
        execErrState: Error
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Ceph exporter is down on {{ $labels.instance }}"
          description: "Ceph exporter is not being scraped; OSD alerts may be blind"

      - uid: ceph-osd-daemon-down
        title: Ceph OSD Daemon Down
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: ceph_daemon_socket_up{job="ceph",ceph_daemon=~"ceph-osd\\..*"}
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Ceph OSD {{ $labels.ceph_daemon }} is down on {{ $labels.hostname }}"
          description: "The Ceph exporter can see the OSD daemon socket, but it is not up"

      - uid: ceph-osd-count-low
        title: Ceph OSD Count Low
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: 6 - sum(ceph_daemon_socket_up{job="ceph",ceph_daemon=~"ceph-osd\\..*"})
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: Alerting
        execErrState: Error
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Ceph has fewer than 6 OSD daemons up"
          description: '{{ $values.B.Value | printf "%.0f" }} expected Ceph OSD daemon(s) are missing or down'

      - uid: ceph-nvme-controller-dead
        title: Ceph NVMe Controller Dead
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: node_nvme_info{job="proxmox-hosts-node",state="dead"}
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "NVMe controller {{ $labels.serial }} is dead on {{ $labels.instance }}"
          description: "{{ $labels.model }} reports state=dead via node_exporter"

      - uid: ceph-osd-disk-missing
        title: Ceph OSD Disk Missing
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: absent(node_nvme_info{job="proxmox-hosts-node",instance="192.168.2.202:9100",serial="25385Z803700",state="live"}) or absent(node_nvme_info{job="proxmox-hosts-node",instance="192.168.2.202:9100",serial="25385Z803747",state="live"}) or absent(node_nvme_info{job="proxmox-hosts-node",instance="192.168.2.204:9100",serial="S7U8NJ0XA18390B",state="live"}) or absent(node_nvme_info{job="proxmox-hosts-node",instance="192.168.2.204:9100",serial="S7U8NJ0XA18330N",state="live"}) or absent(node_nvme_info{job="proxmox-hosts-node",instance="192.168.2.205:9100",serial="25206C801512",state="live"}) or absent(node_nvme_info{job="proxmox-hosts-node",instance="192.168.2.205:9100",serial="25124J801300",state="live"})
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Expected Ceph OSD disk {{ $labels.serial }} is missing on {{ $labels.instance }}"
          description: "A Ceph OSD NVMe serial is no longer present as a live controller"

      # OTel / Loki ingestion health
      - uid: otel-loki-queue-high
        title: OTel Loki Queue High
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: (otelcol_exporter_queue_size{job="otel-collector",data_type="logs",exporter="otlphttp/loki"} / otelcol_exporter_queue_capacity{job="otel-collector",data_type="logs",exporter="otlphttp/loki"}) * 100
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [80]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "OTel Loki log exporter queue is high"
          description: 'Loki log exporter queue is {{ $values.B.Value | printf "%.1f" }}% full'

      # Host Down Alert
      - uid: host-down
        title: Host Down
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: min by(id) (pve_up{id=~"node/.*"})
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: Alerting
        execErrState: Error
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Proxmox host {{ $labels.id }} is down"
          description: "Proxmox node is not responding"

      # Backup Alert
      - uid: backup-stale
        title: Backup Stale
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: ((label_replace(time() - max by(vm_id) (pbs_snapshot_vm_last_timestamp), "id", "qemu/$1", "vm_id", "(.*)") or label_replace(time() - max by(vm_id) (pbs_snapshot_vm_last_timestamp), "id", "lxc/$1", "vm_id", "(.*)")) * on(id) group_left(name, node) max by(id, name, node) (pve_guest_info{name!=""})) / 3600
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [24]
              refId: C
        noDataState: OK
        execErrState: OK
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "Stale backup for {{ $labels.name }} ({{ $labels.id }})"
          description: 'Last backup was {{ $values.B.Value | printf "%.0f" }} hours ago'

      - uid: db-backup-job-failed
        title: DB Backup Job Failed
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 7200
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: |
                (
                  max by(namespace, job_name, owner_name, reason) (
                    (kube_job_status_failed{job_name=~"db-backup-.*", reason!=""} > 0)
                    * on(namespace, job_name) group_left(owner_name)
                      kube_job_owner{owner_kind="CronJob", owner_name=~"db-backup-.*"}
                  )
                )
                unless on(namespace, job_name, owner_name)
                (
                  max by(namespace, job_name, owner_name) (
                    kube_job_status_start_time{job_name=~"db-backup-.*"}
                    * on(namespace, job_name) group_left(owner_name)
                      kube_job_owner{owner_kind="CronJob", owner_name=~"db-backup-.*"}
                  )
                  < on(namespace, owner_name) group_left()
                    max by(namespace, owner_name) (
                      label_replace(
                        kube_cronjob_status_last_successful_time{cronjob=~"db-backup-.*"},
                        "owner_name", "$1", "cronjob", "(.*)"
                      )
                    )
                )
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "DB backup job failed in {{ $labels.namespace }}"
          description: "Job {{ $labels.job_name }} failed: {{ $labels.reason }}"

      - uid: db-backup-stale
        title: DB Backup Stale
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 7200
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: (time() - last_over_time(kube_cronjob_status_last_successful_time{cronjob=~"db-backup-.*"}[2h])) / 3600
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [30]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "Stale DB backup for {{ $labels.namespace }}/{{ $labels.cronjob }}"
          description: 'Last successful DB backup was {{ $values.B.Value | printf "%.0f" }} hours ago'

      - uid: db-backup-never-succeeded
        title: DB Backup Never Succeeded
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 7200
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: last_over_time(kube_cronjob_next_schedule_time{cronjob=~"db-backup-.*"}[2h]) unless on(namespace, cronjob) last_over_time(kube_cronjob_status_last_successful_time{cronjob=~"db-backup-.*"}[2h])
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 36h
        labels:
          severity: critical
        annotations:
          summary: "DB backup has never succeeded for {{ $labels.namespace }}/{{ $labels.cronjob }}"
          description: "No successful DB backup has been observed for this CronJob"

      - uid: restic-metrics-exporter-down
        title: Restic Metrics Exporter Down
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: 1 - up{service_name="aether-restic"}
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: Alerting
        execErrState: Error
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Restic metrics exporter is down"
          description: "Prometheus cannot scrape backup-stack's restic snapshot metrics"

