      # TLS cert expiry — fires 14 days before a probed cert's NotAfter.
      # Targets are scraped by blackbox-exporter via the `tls_connect` module
      # (see ansible/playbooks/monitoring_stack/blackbox.yml + the
      # `blackbox-tls` job in prometheus.yml.j2). Lab learned this matters in
      # the Apr 2026 OpenBao outage: server cert silently rolled past
      # NotAfter and every machine using openbao-agent stopped renewing.
      - uid: tls-cert-expiring-soon
        title: TLS cert expiring soon
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: (probe_ssl_earliest_cert_expiry - time()) / 86400
