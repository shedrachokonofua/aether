apiVersion: 1

groups:
  - orgId: 1
    name: Infrastructure
    folder: Alerts
    interval: 1m
    rules:
      # Host Alerts
      - uid: host-high-cpu
        title: Host High CPU
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: 100 - (avg by(instance)(rate(node_cpu_seconds_total{mode="idle",job="proxmox-hosts-node"}[5m])) * 100)
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [90]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: 'CPU usage is {{ $values.B.Value | printf "%.1f" }}%'

      - uid: host-high-memory
        title: Host High Memory
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: (1 - avg_over_time(node_memory_MemAvailable_bytes{job="proxmox-hosts-node"}[10m]) / avg_over_time(node_memory_MemTotal_bytes{job="proxmox-hosts-node"}[10m])) * 100
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [90]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: 'Memory usage is {{ $values.B.Value | printf "%.1f" }}%'

      # VM Alerts
      - uid: vm-high-cpu
        title: VM High CPU
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: max by(id, name) (pve_cpu_usage_ratio{id=~"qemu/.*"} * on(id) group_left(name) max by(id, name) (pve_guest_info{name!=""})) * 100
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [90]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on VM {{ $labels.name }}"
          description: 'VM CPU usage is {{ $values.B.Value | printf "%.1f" }}%'

      - uid: vm-high-memory
        title: VM High Memory
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: (sum by(host_name, exported_job) (system_memory_usage_bytes{state="used",host_name!=""}) / sum by(host_name, exported_job) (system_memory_usage_bytes{host_name!=""})) * 100
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [90]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on VM {{ $labels.host_name }}"
          description: 'VM real memory usage is {{ $values.B.Value | printf "%.1f" }}%'

      # Disk Alerts
      - uid: vm-root-disk-space-low
        title: VM Root Disk Space Low
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: (sum by(host_name, mountpoint) (last_over_time(system_filesystem_usage_bytes{state="free",host_name!="",mountpoint="/",type!~"tmpfs|overlay|squashfs"}[15m])) / sum by(host_name, mountpoint) (last_over_time(system_filesystem_usage_bytes{state=~"used|free|reserved",host_name!="",mountpoint="/",type!~"tmpfs|overlay|squashfs"}[15m]))) * 100
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [10]
              refId: C
        noDataState: NoData
        execErrState: Error
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Low root disk space on VM {{ $labels.host_name }}"
          description: 'Root filesystem free space is {{ $values.B.Value | printf "%.1f" }}%'

      - uid: vm-hostmetrics-missing
        title: VM Hostmetrics Missing
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: count by(host_name) (count_over_time(system_filesystem_usage_bytes{state="free",host_name!="",mountpoint="/",type!~"tmpfs|overlay|squashfs"}[1h])) unless on(host_name) count by(host_name) (count_over_time(system_filesystem_usage_bytes{state="free",host_name!="",mountpoint="/",type!~"tmpfs|overlay|squashfs"}[15m]))
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "VM hostmetrics missing for {{ $labels.host_name }}"
          description: "Root filesystem telemetry was present in the last hour but has been absent for 15 minutes"

      - uid: disk-space-low
        title: Disk Space Low
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: (node_filesystem_avail_bytes{job="proxmox-hosts-node",fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{job="proxmox-hosts-node",fstype!~"tmpfs|overlay"}) * 100
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [10]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Low disk space on {{ $labels.instance }} {{ $labels.mountpoint }}"
          description: 'Disk space is {{ $values.B.Value | printf "%.1f" }}% free'

      - uid: disk-smart-unhealthy
        title: Disk SMART Unhealthy
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: smartctl_device_smart_status{job="proxmox-hosts-smart"}
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "SMART failure on {{ $labels.instance }} {{ $labels.device }}"
          description: "Disk SMART status indicates failure - replace disk immediately"

      # OTel / Loki ingestion health
      - uid: otel-loki-queue-high
        title: OTel Loki Queue High
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: (otelcol_exporter_queue_size{job="otel-collector",data_type="logs",exporter="otlphttp/loki"} / otelcol_exporter_queue_capacity{job="otel-collector",data_type="logs",exporter="otlphttp/loki"}) * 100
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [80]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "OTel Loki log exporter queue is high"
          description: 'Loki log exporter queue is {{ $values.B.Value | printf "%.1f" }}% full'

      # Host Down Alert
      - uid: host-down
        title: Host Down
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: min by(id) (pve_up{id=~"node/.*"})
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: Alerting
        execErrState: Error
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Proxmox host {{ $labels.id }} is down"
          description: "Proxmox node is not responding"

      # Backup Alert
      - uid: backup-stale
        title: Backup Stale
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: ((label_replace(time() - max by(vm_id) (pbs_snapshot_vm_last_timestamp), "id", "qemu/$1", "vm_id", "(.*)") or label_replace(time() - max by(vm_id) (pbs_snapshot_vm_last_timestamp), "id", "lxc/$1", "vm_id", "(.*)")) * on(id) group_left(name, node) max by(id, name, node) (pve_guest_info{name!=""})) / 3600
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [24]
              refId: C
        noDataState: OK
        execErrState: OK
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "Stale backup for {{ $labels.name }} ({{ $labels.id }})"
          description: 'Last backup was {{ $values.B.Value | printf "%.0f" }} hours ago'

      - uid: db-backup-job-failed
        title: DB Backup Job Failed
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 7200
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: sum by(namespace, job_name, reason) (max_over_time(kube_job_status_failed{job_name=~"db-backup-.*"}[2h]) > 0)
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "DB backup job failed in {{ $labels.namespace }}"
          description: "Job {{ $labels.job_name }} failed: {{ $labels.reason }}"

      - uid: db-backup-stale
        title: DB Backup Stale
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 7200
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: (time() - last_over_time(kube_cronjob_status_last_successful_time{cronjob=~"db-backup-.*"}[2h])) / 3600
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [30]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "Stale DB backup for {{ $labels.namespace }}/{{ $labels.cronjob }}"
          description: 'Last successful DB backup was {{ $values.B.Value | printf "%.0f" }} hours ago'

      - uid: db-backup-never-succeeded
        title: DB Backup Never Succeeded
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 7200
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: last_over_time(kube_cronjob_next_schedule_time{cronjob=~"db-backup-.*"}[2h]) unless on(namespace, cronjob) last_over_time(kube_cronjob_status_last_successful_time{cronjob=~"db-backup-.*"}[2h])
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 36h
        labels:
          severity: critical
        annotations:
          summary: "DB backup has never succeeded for {{ $labels.namespace }}/{{ $labels.cronjob }}"
          description: "No successful DB backup has been observed for this CronJob"

      # GPU Alerts
      - uid: gpu-high-temp
        title: GPU High Temperature
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: DCGM_FI_DEV_GPU_TEMP
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [85]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High GPU temperature on {{ $labels.Hostname }} GPU {{ $labels.gpu }}"
          description: 'GPU temperature is {{ $values.B.Value | printf "%.0f" }}°C'

      - uid: gpu-high-memory
        title: GPU High Memory
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: (DCGM_FI_DEV_FB_USED / (DCGM_FI_DEV_FB_USED + DCGM_FI_DEV_FB_FREE)) * 100
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [95]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High GPU memory usage on {{ $labels.Hostname }} GPU {{ $labels.gpu }}"
          description: 'GPU framebuffer usage is {{ $values.B.Value | printf "%.1f" }}%'

      - uid: gpu-thermal-throttling
        title: GPU XID / driver fault
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: DCGM_FI_DEV_XID_ERRORS
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "GPU XID error on {{ $labels.Hostname }} GPU {{ $labels.gpu }}"
          description: "DCGM reported a non-zero XID error count — check dmesg / GPU health"

      # TLS cert expiry — fires 14 days before a probed cert's NotAfter.
      # Targets are scraped by blackbox-exporter via the `tls_connect` module
      # (see ansible/playbooks/monitoring_stack/blackbox.yml + the
      # `blackbox-tls` job in prometheus.yml). Lab learned this matters in
      # the Apr 2026 OpenBao outage: server cert silently rolled past
      # NotAfter and every machine using openbao-agent stopped renewing.
      - uid: tls-cert-expiring-soon
        title: TLS cert expiring soon
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: (probe_ssl_earliest_cert_expiry - time()) / 86400
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [14]
              refId: C
        noDataState: OK
        execErrState: Error
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "TLS cert on {{ $labels.instance }} expires in {{ $values.B.Value | printf \"%.1f\" }}d"
          description: "Renew before NotAfter — see docs/bastion.md (lessons learned from the OpenBao incident)."
