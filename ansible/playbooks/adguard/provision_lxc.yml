---
# Provision primary AdGuard LXC using custom NixOS base image.
#
# Prerequisites:
#   1. Build and upload the base image: task nix:upload-lxc-image
#   2. This creates /var/lib/vz/template/cache/nixos-base-lxc.tar.xz on cephfs
#
# After provisioning:
#   task configure:adguard  # Deploys the full NixOS config via nixos-rebuild

- name: Provision primary AdGuard LXC (NixOS)
  hosts: oracle
  gather_facts: true
  roles:
    - common
  vars:
    adguard_vm: "{{ vm.adguard }}"
    adguard_label: "primary AdGuard"
    nixos_template: "cephfs:vztmpl/nixos-base-lxc.tar.xz"
    nixos_template_path: "/mnt/pve/cephfs/template/cache/nixos-base-lxc.tar.xz"
  tasks:
    - import_tasks: tasks/provision_lxc.yml
