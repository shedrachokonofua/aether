---
- name: Register LiteLLM virtual keys
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    litellm_url: "{{ lookup('env', 'LITELLM_URL') | default('https://litellm.home.shdr.ch', true) }}"
    litellm_key_models:
      - all-team-models
    litellm_key_user_id: default_user_id
    litellm_key_models_by_alias:
      holmes:
        - router/glm-5.2
        - zai/glm-5.2
        - aether/qwen3.6-35b-a3b:think
        - aether/qwen3.6-27b:think
        - qwen-cloud/qwen3.8-max-preview
      omp:
        - glm
        - clinepass/glm-5.2
        - ollama-cloud/glm-5.2
        - qwen-cloud/glm-5.2
        - router/glm-5.2
        - zai/glm-5.2
        - aether/qwen3.5-9b
        - aether/qwen3.5-9b:think
        - aether/qwen3.6-27b
        - aether/qwen3.6-27b:code
        - aether/qwen3.6-27b:think
        - aether/qwen3.6-35b-a3b
        - aether/qwen3.6-35b-a3b:code
        - aether/qwen3.6-35b-a3b:think
        - clinepass/qwen3.7-max
        - qwen-cloud/qwen3.8-max-preview
        - qwen3.7-max
        - router/qwen3.7-max
        - kimi
        - clinepass/kimi-k2.7-code
        - ollama-cloud/kimi-k2.6
        - ollama-cloud/kimi-k2.7-code
        - router/kimi-k2.7-code
        - deepseek-v4-flash
        - deepseek-v4-pro
        - clinepass/deepseek-v4-flash
        - clinepass/deepseek-v4-pro
        - ollama-cloud/deepseek-v4-flash:cloud
        - ollama-cloud/deepseek-v4-pro:cloud
        - router/deepseek-v4-flash
        - router/deepseek-v4-pro
        - minimax-m3
        - clinepass/minimax-m3
        - ollama-cloud/minimax-m3
        - router/minimax-m3
        - mimo-v2.5-pro
        - clinepass/mimo-v2.5-pro
        - router/mimo-v2.5-pro
        - xiaomi/mimo-v2.5-pro
      deskplane_mcp:
        - router/minimax-m3
        - openai/gpt-5.4
        - openai/gpt-5.4-mini

  tasks:
    - name: Load secrets
      community.sops.load_vars:
        file: "{{ aether_root }}/secrets/secrets.yml"
        name: secrets

    - name: Check LiteLLM key inputs
      ansible.builtin.assert:
        that:
          - secrets.litellm.master_key is defined
          - secrets.litellm.virtual_keys is defined
          - secrets.litellm.virtual_keys | length > 0
        fail_msg: "secrets.litellm.master_key and secrets.litellm.virtual_keys are required"

    - name: Wait for LiteLLM API
      ansible.builtin.uri:
        url: "{{ litellm_url }}/health/liveliness"
        method: GET
        status_code: [200]
      register: litellm_health
      retries: 12
      delay: 5
      until: litellm_health.status == 200

    - name: Check if virtual keys exist by alias
      ansible.builtin.uri:
        url: "{{ litellm_url }}/key/list?key_alias={{ item.key }}"
        method: GET
        headers:
          Authorization: "Bearer {{ secrets.litellm.master_key }}"
        status_code: [200]
        return_content: true
      register: litellm_key_check
      loop: "{{ secrets.litellm.virtual_keys | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      no_log: true

    - name: Build existing alias list
      ansible.builtin.set_fact:
        litellm_existing_aliases: "{{ (litellm_existing_aliases | default([])) + [item.item.key] }}"
      loop: "{{ litellm_key_check.results }}"
      loop_control:
        label: "{{ item.item.key }}"
      when: item.json.total_count | default(0) | int > 0

    - name: Build missing alias list
      ansible.builtin.set_fact:
        litellm_missing_aliases: "{{ (litellm_missing_aliases | default([])) + [item.item.key] }}"
      loop: "{{ litellm_key_check.results }}"
      loop_control:
        label: "{{ item.item.key }}"
      when: item.json.total_count | default(0) | int == 0

    - name: Create missing virtual keys
      ansible.builtin.uri:
        url: "{{ litellm_url }}/key/generate"
        method: POST
        headers:
          Authorization: "Bearer {{ secrets.litellm.master_key }}"
          Content-Type: application/json
        body_format: json
        body:
          key: "{{ item.item.value }}"
          key_alias: "{{ item.item.key }}"
          models: "{{ litellm_key_models_by_alias[item.item.key] | default(litellm_key_models) }}"
          user_id: "{{ litellm_key_user_id }}"
        status_code: [200]
      loop: "{{ litellm_key_check.results }}"
      loop_control:
        label: "{{ item.item.key }}"
      when: item.json.total_count | default(0) | int == 0
      no_log: true

    - name: Synchronize Holmes virtual-key model allowlist
      ansible.builtin.uri:
        url: "{{ litellm_url }}/key/update"
        method: POST
        headers:
          Authorization: "Bearer {{ secrets.litellm.master_key }}"
          Content-Type: application/json
        body_format: json
        body:
          key: "{{ secrets.litellm.virtual_keys.holmes }}"
          models: "{{ litellm_key_models_by_alias.holmes }}"
        status_code: [200]
      no_log: true

    - name: Synchronize omp virtual-key model allowlist
      ansible.builtin.uri:
        url: "{{ litellm_url }}/key/update"
        method: POST
        headers:
          Authorization: "Bearer {{ secrets.litellm.master_key }}"
          Content-Type: application/json
        body_format: json
        body:
          key: "{{ secrets.litellm.virtual_keys.omp }}"
          models: "{{ litellm_key_models_by_alias.omp }}"
        status_code: [200]
      no_log: true

    - name: Synchronize deskplane_mcp virtual-key model allowlist
      ansible.builtin.uri:
        url: "{{ litellm_url }}/key/update"
        method: POST
        headers:
          Authorization: "Bearer {{ secrets.litellm.master_key }}"
          Content-Type: application/json
        body_format: json
        body:
          key: "{{ secrets.litellm.virtual_keys.deskplane_mcp }}"
          models: "{{ litellm_key_models_by_alias.deskplane_mcp }}"
        status_code: [200]
      no_log: true

    - name: Report virtual key registration
      ansible.builtin.debug:
        msg:
          litellm_url: "{{ litellm_url }}"
          existing_aliases: "{{ litellm_existing_aliases | default([]) | sort }}"
          created_aliases: "{{ litellm_missing_aliases | default([]) | sort }}"
