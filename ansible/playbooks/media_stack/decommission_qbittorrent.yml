---
# One-shot playbook: stop and export qbittorrent (gluetun + qbit + exporter pod)
# from the media-stack VM so its config can be restored into the Kubernetes
# ceph-rbd PVC.
#
# Run order (operator):
#   1. tofu apply  → qbittorrent Deployment up with default config
#   2. ansible-playbook playbooks/media_stack/decommission_qbittorrent.yml
#   3. POD=$(kubectl -n media get pods -l app=qbittorrent -o jsonpath='{.items[0].metadata.name}')
#      kubectl -n media cp /tmp/media-stack-export/qbittorrent-config.tar.gz media/$POD:/tmp/ -c qbittorrent
#      kubectl -n media exec $POD -c qbittorrent -- sh -c \
#        'find /config -mindepth 1 -maxdepth 1 ! -name lost+found -exec rm -rf {} + && \
#         tar xzf /tmp/qbittorrent-config.tar.gz -C /config --strip-components=1 && \
#         chown -R abc:users /config && rm -f /tmp/qbittorrent-config.tar.gz'
#      kubectl -n media rollout restart deploy/qbittorrent
#   4. After verification (WebUI reachable, torrents resume, *arrs see the
#      download client), rerun this playbook with -e cleanup=true to disable
#      the quadlet pod and remove /home/aether/qbittorrent.
#   5. After cleanup, re-run site.yml on the media-stack VM so the
#      vm_monitoring_agent role drops the legacy qbittorrent scrape target.

- name: Decommission qBittorrent from media-stack VM
  hosts: media-stack
  gather_facts: false
  vars:
    admin_user: aether
    export_dir: /tmp/media-stack-export
    cleanup: false

  tasks:
    - name: Stop qbittorrent pod (user scope)
      ansible.builtin.systemd:
        name: qbittorrent-pod
        state: stopped
        scope: user
      ignore_errors: true

    - name: Create local export directory
      delegate_to: localhost
      ansible.builtin.file:
        path: "{{ export_dir }}"
        state: directory
        mode: "0755"

    - name: Create remote export directory
      ansible.builtin.file:
        path: "/home/{{ admin_user }}/export"
        state: directory
        mode: "0755"

    - name: Archive qBittorrent config
      become: true
      ansible.builtin.command:
        cmd: tar czf /home/{{ admin_user }}/export/qbittorrent-config.tar.gz -C /home/{{ admin_user }}/qbittorrent config
      changed_when: true

    - name: Make tarball readable by ansible user
      become: true
      ansible.builtin.file:
        path: "/home/{{ admin_user }}/export/qbittorrent-config.tar.gz"
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: "0644"

    - name: Fetch tarball to control node
      ansible.builtin.fetch:
        src: "/home/{{ admin_user }}/export/qbittorrent-config.tar.gz"
        dest: "{{ export_dir }}/qbittorrent-config.tar.gz"
        flat: true

    - name: Disable qbittorrent pod
      ansible.builtin.systemd:
        name: qbittorrent-pod
        enabled: false
        scope: user
      when: cleanup | bool
      ignore_errors: true

    - name: Remove qbittorrent application directory
      ansible.builtin.file:
        path: "/home/{{ admin_user }}/qbittorrent"
        state: absent
      when: cleanup | bool

    - name: Clean up remote export directory
      ansible.builtin.file:
        path: "/home/{{ admin_user }}/export"
        state: absent
      when: cleanup | bool
