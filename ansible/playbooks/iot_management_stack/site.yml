---
- name: Deploy IoT Management Stack
  hosts: iot-management-stack
  gather_facts: true
  vars:
    ha_config_dir: "/home/aether/homeassistant/config"
    zwavejs_data_dir: /home/aether/zwavejs
    matter_server_data_dir: /home/aether/matter-server
    home_assistant_timezone: "America/Toronto"
    zwave_device_serial: "32753a4f5dbcea11987e94e368aed703"
    zwave_device_by_id: "/dev/serial/by-id/usb-Silicon_Labs_CP2102N_USB_to_UART_Bridge_Controller_{{ zwave_device_serial }}-if00-port0"
    thread_device_by_id: "/dev/serial/by-id/usb-SMLIGHT_SMLIGHT_SLZB-07_2e0e5e02db18f0119fc76a7db887153e-if00-port0"
    otbr_data_dir: /var/lib/otbr
    quadlet_dir: /etc/containers/systemd
    rootless_user_systemd_dir: /home/aether/.config/containers/systemd
  roles:
    - common
    - vm_baseline
    - dnf
    - role: vm_monitoring_agent
      prometheus_scrape_configs:
        - job_name: "homeassistant"
          scrape_interval: 30s
          metrics_path: /api/prometheus
          static_configs:
            - targets: ["localhost:8123"]
          authorization:
            credentials: "{{ secrets.homeassistant.telemetry_token }}"

  tasks:
    - name: Install dependencies
      become: true
      dnf:
        name:
          - usbutils
          - bluez
          - bluez-tools
        state: present

    - name: Ensure system bluetooth.service is started and enabled
      become: true
      ansible.builtin.systemd:
        name: bluetooth.service
        state: started
        enabled: yes
        scope: system

    - name: Check Z-Wave stick is present (by serial)
      ansible.builtin.stat:
        path: "{{ zwave_device_by_id }}"
      register: zwave_device

    - name: Fail if Z-Wave stick not detected
      ansible.builtin.fail:
        msg: "Z-Wave CP2102N stick not visible to VM at {{ zwave_device_by_id }} -- check Proxmox USB passthrough"
      when: not zwave_device.stat.exists

    - name: Check Thread/SLZB-07 stick is present (by serial)
      ansible.builtin.stat:
        path: "{{ thread_device_by_id }}"
      register: thread_device

    - name: Fail if Thread stick not detected
      ansible.builtin.fail:
        msg: "SLZB-07 Thread stick not visible to VM at {{ thread_device_by_id }} -- check Proxmox USB passthrough"
      when: not thread_device.stat.exists

    # Defense-in-depth: a serial-targeted udev rule sets /dev/ttyUSB0 (Z-Wave)
    # to 0666. Containers on this VM are rootful and root has access regardless,
    # so this is a no-op for the runtime path -- kept so a future move back to
    # rootless still works without surprise.
    - name: Install Z-Wave udev rule
      become: true
      ansible.builtin.template:
        src: ./99-zwave.rules.j2
        dest: /etc/udev/rules.d/99-zwave.rules
        owner: root
        group: root
        mode: "0644"
      notify: reload udev and re-trigger zwave

    - name: Create required directories
      become: true
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ ha_config_dir }}"
        - "{{ zwavejs_data_dir }}"
        - "{{ matter_server_data_dir }}"

    - name: Write main home assistant configuration file
      become: true
      ansible.builtin.copy:
        src: "./ha_config.yml"
        dest: "{{ ha_config_dir }}/configuration.yaml"
        mode: "0644"

    - name: Touch other home assistant config files
      become: true
      ansible.builtin.file:
        path: "{{ item }}"
        state: touch
        mode: "0644"
      loop:
        - "{{ ha_config_dir }}/automations.yaml"
        - "{{ ha_config_dir }}/scripts.yaml"
        - "{{ ha_config_dir }}/scenes.yaml"

    - name: Write Z-Wave settings file
      become: true
      ansible.builtin.template:
        src: ./zwave_settings.json.j2
        dest: "{{ zwavejs_data_dir }}/settings.json"
        mode: "0644"

    # Migration: stop and remove rootless aether quadlets if they still exist.
    # The HA/zwavejs-ui/matter-server pod was originally rootless; we moved it
    # to rootful so DBus EXTERNAL auth (which compares kernel-reported peer UID
    # to claimed UID) succeeds for the BlueZ integration. Safe to re-run -- the
    # systemd module fails-silently when units are absent.
    - name: Stop rootless iot pod services if present
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
        scope: user
      loop:
        - iot-management-stack-pod.service
        - homeassistant.service
        - zwavejs-ui.service
        - matter-server.service
      failed_when: false

    - name: Remove rootless aether quadlet files
      ansible.builtin.file:
        path: "{{ rootless_user_systemd_dir }}/{{ item }}"
        state: absent
      loop:
        - iot-management-stack.pod
        - homeassistant.container
        - zwavejs-ui.container
        - matter-server.container

    - name: Reload aether's user systemd after rootless cleanup
      ansible.builtin.systemd:
        daemon_reload: yes
        scope: user

    # Rootful Quadlets at /etc/containers/systemd/. Containers run as root which
    # avoids userns UID translation; required for HA's bluez/dbus_fast EXTERNAL
    # auth to succeed against the system DBus.
    - name: Render iot-management-stack pod quadlet
      become: true
      ansible.builtin.template:
        src: ./iot-management-stack.pod.j2
        dest: "{{ quadlet_dir }}/iot-management-stack.pod"
        owner: root
        group: root
        mode: "0644"
      notify: restart iot pod and contents

    - name: Render homeassistant container quadlet
      become: true
      ansible.builtin.template:
        src: ./homeassistant.container.j2
        dest: "{{ quadlet_dir }}/homeassistant.container"
        owner: root
        group: root
        mode: "0644"
      notify: restart only homeassistant

    - name: Render zwavejs-ui container quadlet
      become: true
      ansible.builtin.template:
        src: ./zwavejs-ui.container.j2
        dest: "{{ quadlet_dir }}/zwavejs-ui.container"
        owner: root
        group: root
        mode: "0644"
      notify: restart only zwavejs-ui

    - name: Render matter-server container quadlet
      become: true
      ansible.builtin.template:
        src: ./matter-server.container.j2
        dest: "{{ quadlet_dir }}/matter-server.container"
        owner: root
        group: root
        mode: "0644"
      notify: restart only matter-server

    - name: Ensure OTBR data directory exists
      become: true
      ansible.builtin.file:
        path: "{{ otbr_data_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Render home-automation-stack pod quadlet
      become: true
      ansible.builtin.template:
        src: ./home-automation-stack.pod.j2
        dest: "{{ quadlet_dir }}/home-automation-stack.pod"
        owner: root
        group: root
        mode: "0644"
      notify: restart home-automation-stack pod and otbr

    - name: Render OTBR container quadlet
      become: true
      ansible.builtin.template:
        src: ./otbr.container.j2
        dest: "{{ quadlet_dir }}/otbr.container"
        owner: root
        group: root
        mode: "0644"
      notify: restart otbr only

    - name: Reload system systemd so quadlets are picked up on first run
      become: true
      ansible.builtin.systemd:
        daemon_reload: yes
        scope: system

    - name: Ensure iot-management-stack pod service is started and enabled
      become: true
      ansible.builtin.systemd:
        name: iot-management-stack-pod.service
        state: started
        enabled: yes
        scope: system

    - name: Ensure home-automation-stack pod service is started and enabled
      become: true
      ansible.builtin.systemd:
        name: home-automation-stack-pod.service
        state: started
        enabled: yes
        scope: system

    - name: Ensure container services are started and enabled
      become: true
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: started
        enabled: yes
        scope: system
      loop:
        - homeassistant.service
        - zwavejs-ui.service
        - matter-server.service
        - otbr.service

    - name: Check if HACS is already installed
      ansible.builtin.stat:
        path: "{{ ha_config_dir }}/custom_components/hacs"
      register: hacs_installed

    - name: Install Home Assistant Community Store
      become: true
      ansible.builtin.shell: |
        podman exec homeassistant bash -c "wget -O - https://get.hacs.xyz | bash -"
      when: not hacs_installed.stat.exists

  handlers:
    - name: reload udev rules
      listen: reload udev and re-trigger zwave
      become: true
      ansible.builtin.command: udevadm control --reload-rules

    - name: re-trigger Z-Wave device for new perms
      listen: reload udev and re-trigger zwave
      become: true
      ansible.builtin.command: udevadm trigger --action=change --subsystem-match=tty

    # Per-container restart handlers. Each container quadlet notifies only its
    # own restart so changing one doesn't churn the others.
    - name: daemon-reload (container path)
      listen:
        - restart only homeassistant
        - restart only zwavejs-ui
        - restart only matter-server
        - restart otbr only
      become: true
      ansible.builtin.systemd:
        daemon_reload: yes
        scope: system

    - name: restart homeassistant
      listen: restart only homeassistant
      become: true
      ansible.builtin.systemd:
        name: homeassistant.service
        state: restarted
        scope: system

    - name: restart zwavejs-ui
      listen: restart only zwavejs-ui
      become: true
      ansible.builtin.systemd:
        name: zwavejs-ui.service
        state: restarted
        scope: system

    - name: restart matter-server
      listen: restart only matter-server
      become: true
      ansible.builtin.systemd:
        name: matter-server.service
        state: restarted
        scope: system

    # Pod-level restart handlers. Restarting a pod takes its containers down
    # with it; the systemd "Bound to ... but unit isn't active" race forces us
    # to stop containers, restart pod, then start containers in order.

    - name: daemon-reload (iot pod path)
      listen: restart iot pod and contents
      become: true
      ansible.builtin.systemd:
        daemon_reload: yes
        scope: system

    - name: stop iot containers before pod restart
      listen: restart iot pod and contents
      become: true
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
        scope: system
      loop:
        - homeassistant.service
        - zwavejs-ui.service
        - matter-server.service

    - name: restart iot-management-stack pod
      listen: restart iot pod and contents
      become: true
      ansible.builtin.systemd:
        name: iot-management-stack-pod.service
        state: restarted
        scope: system

    - name: start iot containers after pod is up
      listen: restart iot pod and contents
      become: true
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: started
        scope: system
      loop:
        - homeassistant.service
        - zwavejs-ui.service
        - matter-server.service

    - name: daemon-reload (home-automation pod path)
      listen: restart home-automation-stack pod and otbr
      become: true
      ansible.builtin.systemd:
        daemon_reload: yes
        scope: system

    - name: stop otbr before pod restart
      listen: restart home-automation-stack pod and otbr
      become: true
      ansible.builtin.systemd:
        name: otbr.service
        state: stopped
        scope: system

    - name: restart home-automation-stack pod
      listen: restart home-automation-stack pod and otbr
      become: true
      ansible.builtin.systemd:
        name: home-automation-stack-pod.service
        state: restarted
        scope: system

    - name: start otbr after pod is up
      listen: restart home-automation-stack pod and otbr
      become: true
      ansible.builtin.systemd:
        name: otbr.service
        state: started
        scope: system

    - name: restart only otbr
      listen: restart otbr only
      become: true
      ansible.builtin.systemd:
        name: otbr.service
        state: restarted
        scope: system
