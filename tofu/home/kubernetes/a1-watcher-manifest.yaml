# OCI A1 capacity watcher — CronJob polling for VM.Standard.A1.Flex capacity
# in ca-toronto-1 and launching aether-oci-a1 the moment Oracle restocks,
# largest size first (flex resizes up in place later). On success it pages
# ntfy /system and disarms by suspending its own CronJob via the API server
# (re-arm: kubectl patch cronjob -n a1-watcher a1-watcher -p '{"spec":{"suspend":false}}').
#
# Identity: dedicated least-priv API-key user aether-a1-watcher (group
# A1Watchers: manage compute-capacity-reports in tenancy; manage
# instance-family + use virtual-network-family in the aether compartment).
# The Secret (oci-credentials) is created out-of-band from sops:
#   sops -d secrets/secrets.yml | yq .oci_a1_watcher  ->  kubectl create secret
#
# APPLIED BY HAND 2026-07-17 (user call: skip tofu, import later). To adopt:
# wrap in a kubernetes_manifest resource or keep as-is and manage drift here.
#
# After launch fires:
#   tofu -chdir=tofu import 'module.oci[0].oci_core_instance.a1' <ocid-from-job-logs>
---
apiVersion: v1
kind: Namespace
metadata:
  name: a1-watcher
  labels:
    app.kubernetes.io/managed-by: manual-pending-tofu-import
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: a1-watcher
  namespace: a1-watcher
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: a1-watcher-suspend
  namespace: a1-watcher
rules:
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: a1-watcher-suspend
  namespace: a1-watcher
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: a1-watcher-suspend
subjects:
  - kind: ServiceAccount
    name: a1-watcher
    namespace: a1-watcher
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: a1-watcher-script
  namespace: a1-watcher
data:
  watch.sh: |
    #!/bin/bash
    set -euo pipefail
    NTFY_URL=${NTFY_URL:?}
    TENANCY=${TENANCY:?}
    COMPARTMENT=${COMPARTMENT:?}
    SUBNET=${SUBNET:?}
    AD=${AD:?}
    SSH_PUBKEY=${SSH_PUBKEY:?}
    export OCI_CLI_CONFIG_FILE=/oci/config SUPPRESS_LABEL_WARNING=True

    notify() {
      python3 - "$NTFY_URL" "$1" "$2" <<'PY'
    import sys, urllib.request
    req = urllib.request.Request(sys.argv[1], data=sys.argv[2].encode(),
        headers={"Title": "A1 capacity watcher", "Priority": sys.argv[3]})
    try: urllib.request.urlopen(req, timeout=10)
    except Exception as e: print(f"ntfy failed: {e}")
    PY
    }

    BEST=$(oci compute compute-capacity-report create \
      --compartment-id "$TENANCY" --availability-domain "$AD" \
      --shape-availabilities '[
        {"instanceShape":"VM.Standard.A1.Flex","instanceShapeConfig":{"ocpus":4,"memoryInGBs":24}},
        {"instanceShape":"VM.Standard.A1.Flex","instanceShapeConfig":{"ocpus":2,"memoryInGBs":12}},
        {"instanceShape":"VM.Standard.A1.Flex","instanceShapeConfig":{"ocpus":1,"memoryInGBs":6}}]' \
      --query "reverse(sort_by(data.\"shape-availabilities\"[?\"availability-status\"=='AVAILABLE'].\"instance-shape-config\", &ocpus))[0].{o:ocpus,m:\"memory-in-gbs\"}" \
      --output json 2>/dev/null || echo null)

    if [ "$BEST" = "null" ] || [ -z "$BEST" ]; then
      echo "$(date -Is) no A1 capacity"
      exit 0
    fi
    OCPUS=$(python3 -c "import json,sys;print(int(json.loads(sys.argv[1])['o']))" "$BEST")
    MEM=$(python3 -c "import json,sys;print(int(json.loads(sys.argv[1])['m']))" "$BEST")
    echo "$(date -Is) capacity AVAILABLE: ${OCPUS} ocpu / ${MEM}GB - launching"

    IMAGE_ID=$(oci compute image list --compartment-id "$TENANCY" \
      --operating-system "Canonical Ubuntu" --operating-system-version "24.04" \
      --shape "VM.Standard.A1.Flex" --sort-by TIMECREATED --sort-order DESC \
      --query 'data[0].id' --raw-output)

    if ! LAUNCH=$(oci compute instance launch \
      --compartment-id "$COMPARTMENT" --availability-domain "$AD" \
      --display-name aether-oci-a1 --hostname-label oci-a1 \
      --shape VM.Standard.A1.Flex \
      --shape-config "{\"ocpus\":$OCPUS,\"memoryInGBs\":$MEM}" \
      --image-id "$IMAGE_ID" --subnet-id "$SUBNET" --assign-public-ip true \
      --metadata "{\"ssh_authorized_keys\":\"$SSH_PUBKEY\"}" \
      --query 'data.id' --raw-output 2>&1); then
      notify "A1 capacity AVAILABLE (${OCPUS}/${MEM}GB) but launch FAILED: ${LAUNCH:0:250}" high
      exit 1
    fi

    echo "launched: $LAUNCH"
    notify "aether-oci-a1 LAUNCHED (${OCPUS} ocpu / ${MEM}GB), instance $LAUNCH. Next: tofu import 'module.oci[0].oci_core_instance.a1' $LAUNCH. Watcher suspending itself." high

    # Disarm: suspend our own CronJob via the API server.
    TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
    curl -fsS --cacert /var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
      -H "Authorization: Bearer $TOKEN" \
      -H "Content-Type: application/merge-patch+json" \
      -X PATCH \
      "https://kubernetes.default.svc/apis/batch/v1/namespaces/a1-watcher/cronjobs/a1-watcher" \
      -d '{"spec":{"suspend":true}}' >/dev/null 2>&1 \
      || python3 - <<'PY'
    import json, ssl, urllib.request
    token = open("/var/run/secrets/kubernetes.io/serviceaccount/token").read()
    ctx = ssl.create_default_context(cafile="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt")
    req = urllib.request.Request(
        "https://kubernetes.default.svc/apis/batch/v1/namespaces/a1-watcher/cronjobs/a1-watcher",
        data=json.dumps({"spec": {"suspend": True}}).encode(), method="PATCH",
        headers={"Authorization": f"Bearer {token}",
                 "Content-Type": "application/merge-patch+json"})
    urllib.request.urlopen(req, context=ctx, timeout=10)
    PY
    echo "cronjob suspended; watcher disarmed"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: a1-watcher
  namespace: a1-watcher
spec:
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 240
      template:
        spec:
          serviceAccountName: a1-watcher
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile: { type: RuntimeDefault }
          containers:
            - name: watch
              image: ghcr.io/oracle/oci-cli:latest
              command: ["/bin/bash", "/scripts/watch.sh"]
              envFrom:
                - secretRef:
                    name: a1-watcher-params
              resources:
                requests: { cpu: 50m, memory: 128Mi }
                limits: { cpu: "500m", memory: 384Mi }
              securityContext:
                allowPrivilegeEscalation: false
                capabilities: { drop: ["ALL"] }
              env:
                # oci-cli refuses group-readable keys unless told otherwise;
                # the fsGroup-mounted secret is 0440 by necessity.
                - { name: OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING, value: "True" }
                - { name: HOME, value: /tmp }
              volumeMounts:
                - { name: script, mountPath: /scripts }
                - { name: oci-creds, mountPath: /oci }
          volumes:
            - name: script
              configMap: { name: a1-watcher-script, defaultMode: 0755 }
            - name: oci-creds
              secret: { secretName: a1-watcher-oci, defaultMode: 0440 }
