id: estate-scan-home
namespace: aether.estate

description: |
  Staged home-estate discovery + L7 DAG. Dispatches typed aether-scan stages over SSH
  to kestra-estate-scanner@10.0.2.13 (ForceCommand). Polls via on-guest wait-stage
  (Kestra LoopUntil + SSH non-zero exitCode is unreliable — outputs are dropped).
  inventory-sync refreshes synthetic_probe + CT hostname inventory (CT-only report-only).
  validate merges IP fingerprint URLs with declared hostname HTTPS in one Nuclei pass.
  l7_scope=full fingerprints services-all.jsonl (baseline); changed uses deltas only.

concurrency:
  behavior: QUEUE
  limit: 1

inputs:
  - id: profile
    type: STRING
    defaults: nuclei-daily
  - id: l7_scope
    type: STRING
    defaults: full
    description: "full = all discovered listeners; changed = new/changed only"

tasks:
  # ClickHouse estate_scan.run_id is UUID; Kestra execution.id is Url62 — mint RFC4122.
  - id: mint_run_id
    type: io.kestra.plugin.core.debug.Return
    format: "{{ uuid() }}"

  - id: fingerprint_artifact
    type: io.kestra.plugin.core.debug.Return
    format: "{{ inputs.l7_scope == 'changed' ? 'services-changed.jsonl' : 'services-all.jsonl' }}"

  - id: targets
    type: io.kestra.plugin.fs.ssh.Command
    host: "{{ envs.estate_scanner_host }}"
    username: "{{ envs.estate_scanner_user }}"
    authMethod: PUBLIC_KEY
    privateKey: "{{ secret('ESTATE_SCANNER_SSH_KEY') }}"
    # Plugin has no knownHosts property yet; pin before Phase 4 calendars
    # (host key in config/ssh/estate-scanner.known_hosts).
    strictHostKeyChecking: "false"
    commands:
      - "targets snapshot {{ outputs.mint_run_id.value }} {{ inputs.profile }}"

  - id: inventory_sync
    type: io.kestra.plugin.fs.ssh.Command
    host: "{{ envs.estate_scanner_host }}"
    username: "{{ envs.estate_scanner_user }}"
    authMethod: PUBLIC_KEY
    privateKey: "{{ secret('ESTATE_SCANNER_SSH_KEY') }}"
    strictHostKeyChecking: "false"
    commands:
      - "inventory-sync {{ outputs.mint_run_id.value }}"

  - id: discover_home
    type: io.kestra.plugin.fs.ssh.Command
    host: "{{ envs.estate_scanner_host }}"
    username: "{{ envs.estate_scanner_user }}"
    authMethod: PUBLIC_KEY
    privateKey: "{{ secret('ESTATE_SCANNER_SSH_KEY') }}"
    strictHostKeyChecking: "false"
    commands:
      - "discover {{ outputs.mint_run_id.value }} home"

  - id: wait_discover
    type: io.kestra.plugin.fs.ssh.Command
    host: "{{ envs.estate_scanner_host }}"
    username: "{{ envs.estate_scanner_user }}"
    authMethod: PUBLIC_KEY
    privateKey: "{{ secret('ESTATE_SCANNER_SSH_KEY') }}"
    strictHostKeyChecking: "false"
    commands:
      - "wait-stage {{ outputs.mint_run_id.value }} discover home 1800"

  - id: merge_diff
    type: io.kestra.plugin.fs.ssh.Command
    host: "{{ envs.estate_scanner_host }}"
    username: "{{ envs.estate_scanner_user }}"
    authMethod: PUBLIC_KEY
    privateKey: "{{ secret('ESTATE_SCANNER_SSH_KEY') }}"
    strictHostKeyChecking: "false"
    commands:
      - "merge-diff {{ outputs.mint_run_id.value }}"

  - id: fingerprint
    type: io.kestra.plugin.fs.ssh.Command
    host: "{{ envs.estate_scanner_host }}"
    username: "{{ envs.estate_scanner_user }}"
    authMethod: PUBLIC_KEY
    privateKey: "{{ secret('ESTATE_SCANNER_SSH_KEY') }}"
    strictHostKeyChecking: "false"
    commands:
      - "fingerprint {{ outputs.mint_run_id.value }} {{ outputs.fingerprint_artifact.value }}"

  - id: wait_fingerprint
    type: io.kestra.plugin.fs.ssh.Command
    host: "{{ envs.estate_scanner_host }}"
    username: "{{ envs.estate_scanner_user }}"
    authMethod: PUBLIC_KEY
    privateKey: "{{ secret('ESTATE_SCANNER_SSH_KEY') }}"
    strictHostKeyChecking: "false"
    commands:
      - "wait-stage {{ outputs.mint_run_id.value }} fingerprint 1200"

  - id: validate
    type: io.kestra.plugin.fs.ssh.Command
    host: "{{ envs.estate_scanner_host }}"
    username: "{{ envs.estate_scanner_user }}"
    authMethod: PUBLIC_KEY
    privateKey: "{{ secret('ESTATE_SCANNER_SSH_KEY') }}"
    strictHostKeyChecking: "false"
    commands:
      - "validate {{ outputs.mint_run_id.value }} fingerprint.jsonl nuclei-daily"

  - id: wait_validate
    type: io.kestra.plugin.fs.ssh.Command
    host: "{{ envs.estate_scanner_host }}"
    username: "{{ envs.estate_scanner_user }}"
    authMethod: PUBLIC_KEY
    privateKey: "{{ secret('ESTATE_SCANNER_SSH_KEY') }}"
    strictHostKeyChecking: "false"
    commands:
      - "wait-stage {{ outputs.mint_run_id.value }} validate 28800"

  - id: finalize
    type: io.kestra.plugin.fs.ssh.Command
    host: "{{ envs.estate_scanner_host }}"
    username: "{{ envs.estate_scanner_user }}"
    authMethod: PUBLIC_KEY
    privateKey: "{{ secret('ESTATE_SCANNER_SSH_KEY') }}"
    strictHostKeyChecking: "false"
    commands:
      - "finalize {{ outputs.mint_run_id.value }}"

triggers: []
