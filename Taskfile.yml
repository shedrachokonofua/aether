    cmds:
      - >-
        ansible-playbook ansible/playbooks/estate_scanner/site.yml
        -e estate_scanner_provision_approved={{.ESTATE_SCANNER_PROVISION_APPROVED | default "false"}}
        {{.CLI_ARGS}}
  configure:estate-scanner:
    desc: Deploy NixOS configuration to estate-scanner LXC (guest must already exist)
    vars:
      TARGET_IP:
        sh: yq '.estate_scanner.ip' config/vm.yml
      BUILD_IP:
        sh: yq '.nix_builder.ip' config/vm.yml
    cmds:
      - task: _nixos-deploy
