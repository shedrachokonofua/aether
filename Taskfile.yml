          TARGET_IP: "{{.TARGET_IP}}"
          BUILD_IP: "{{.BUILD_IP}}"
          REMOTE_BUILD_PATH: /root/aether-build
          FLAKE_TARGET: estate-scanner
  deploy:estate-scanner:
