        vars:
          TARGET_IP: "{{.TARGET_IP}}"
          BUILD_IP: "{{.BUILD_IP}}"
          FLAKE_TARGET: adguard-secondary
  deploy:adguard:
    desc: Full deploy - provision LXC + configure NixOS
    cmds:
      - task: provision:adguard
      - task: configure:adguard
  deploy:adguard-secondary:
    desc: Full deploy - provision secondary LXC + configure NixOS
    cmds:
      - task: provision:adguard-secondary
      - task: configure:adguard-secondary
  configure:bastion:
    desc: Deploy NixOS configuration to bastion LXC
    vars:
      TARGET_IP:
