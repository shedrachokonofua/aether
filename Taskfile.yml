version: "3"

# Minimal Taskfile for Nix workflow
# Most tools are just available: tofu, ansible, sops, aws, step, bao
# This file only contains multi-step workflows and playbook shortcuts

vars:
  CACHE_DIR: ${HOME}/.aether-toolbox
  AETHER_SSH_AGENT_SOCK:
    sh: 'printf "%s" "${AETHER_SSH_AUTH_SOCK:-${AETHER_CACHE_DIR:-$HOME/.aether-toolbox}/ssh/agent.sock}"'
  TASK_SSH_AUTH_SOCK:
    sh: 'printf "%s" "${SSH_AUTH_SOCK:-${AETHER_SSH_AUTH_SOCK:-${AETHER_CACHE_DIR:-$HOME/.aether-toolbox}/ssh/agent.sock}}"'

env:
  ANSIBLE_CONFIG: ./ansible/ansible.cfg
  LC_ALL: C.UTF-8
  LANG: C.UTF-8
  AWS_REGION: us-east-1
  SSH_AUTH_SOCK: "{{.TASK_SSH_AUTH_SOCK}}"
  AETHER_SSH_AUTH_SOCK: "{{.AETHER_SSH_AGENT_SOCK}}"

tasks:
  # ===========================================================================
  # Bootstrap
  # ===========================================================================
  bootstrap:
    desc: Bootstrap the project
    cmds:
      - chmod +x ./bootstrap/bootstrap.sh
      - ./bootstrap/bootstrap.sh {{.CLI_ARGS}}

  bootstrap:sops:
    desc: Bootstrap SOPS
    cmds:
      - task: age-keygen
        vars:
          CLI_ARGS: -o config/age-key.txt

  # ===========================================================================
  # Auth (multi-step flows worth wrapping)
  # ===========================================================================
  login:
    desc: Unified SSO login (AWS, Google WIF, OpenBao, Ceph RGW, SSH cert)
    cmds:
      - mkdir -p {{.CACHE_DIR}}/bao {{.CACHE_DIR}}/step
      - AETHER_CACHE_DIR={{.CACHE_DIR}} ./scripts/login.bb {{.CLI_ARGS}}

  login:status:
    desc: Check auth status
    cmds:
      - AETHER_CACHE_DIR={{.CACHE_DIR}} ./scripts/login.bb --status

  bao:
    desc: OpenBao CLI
    cmds:
      - |
        [ -f "{{.CACHE_DIR}}/bao/token" ] && export VAULT_ADDR=https://bao.home.shdr.ch VAULT_TOKEN=$(cat {{.CACHE_DIR}}/bao/token)
        bao {{.CLI_ARGS}}

  ctl:
    desc: Ops CLI (status, backups, etc.)
    cmds:
      - bb scripts/aetherctl.bb {{.CLI_ARGS}}

  # ===========================================================================
  # Tofu (only compound operations)
  # ===========================================================================
  tofu:init:
    desc: Init with backend config
    cmds:
      - sh ./scripts/create-tofu-state-config.sh
      - tofu -chdir=tofu init -backend-config=../config/tofu-state.config -upgrade -reconfigure

  tofu:write-outputs:
    desc: Write outputs to secrets/tf-outputs.json
    cmds:
      - tofu -chdir=tofu output -json > ./secrets/tf-outputs.json

  tofu:apply:
    desc: Apply + write outputs + export k8s auth
    cmds:
      - |
        [ -f "{{.CACHE_DIR}}/bao/token" ] && export VAULT_ADDR=https://bao.home.shdr.ch VAULT_TOKEN=$(cat {{.CACHE_DIR}}/bao/token)
        [ -f "{{.CACHE_DIR}}/google-env" ] && set -a && . "{{.CACHE_DIR}}/google-env" && set +a
        tofu -chdir=tofu apply {{.CLI_ARGS}}
      - tofu -chdir=tofu output -json > ./secrets/tf-outputs.json
      - task: k8s:auth

  tofu:plan:
    desc: Plan changes
    cmds:
      - |
        [ -f "{{.CACHE_DIR}}/bao/token" ] && export VAULT_ADDR=https://bao.home.shdr.ch VAULT_TOKEN=$(cat {{.CACHE_DIR}}/bao/token)
        [ -f "{{.CACHE_DIR}}/google-env" ] && set -a && . "{{.CACHE_DIR}}/google-env" && set +a
        tofu -chdir=tofu plan {{.CLI_ARGS}}

  tofu:refresh:
    desc: Refresh + write outputs
    cmds:
      - |
        [ -f "{{.CACHE_DIR}}/bao/token" ] && export VAULT_ADDR=https://bao.home.shdr.ch VAULT_TOKEN=$(cat {{.CACHE_DIR}}/bao/token)
        [ -f "{{.CACHE_DIR}}/google-env" ] && set -a && . "{{.CACHE_DIR}}/google-env" && set +a
        tofu -chdir=tofu refresh {{.CLI_ARGS}}
      - tofu -chdir=tofu output -json > ./secrets/tf-outputs.json

  tofu:import:
    desc: Import existing resource into state
    cmds:
      - |
        [ -f "{{.CACHE_DIR}}/bao/token" ] && export VAULT_ADDR=https://bao.home.shdr.ch VAULT_TOKEN=$(cat {{.CACHE_DIR}}/bao/token)
        [ -f "{{.CACHE_DIR}}/google-env" ] && set -a && . "{{.CACHE_DIR}}/google-env" && set +a
        tofu -chdir=tofu import {{.CLI_ARGS}}

  tofu:apply:gitlab-runner:
    desc: Apply only the k8s GitLab Runner (Helm) — avoids full stack plan
    cmds:
      - task: tofu:apply
        vars:
          {
            CLI_ARGS: "-target=module.home.module.kubernetes.helm_release.gitlab_runner -auto-approve",
          }

  tofu:unlock:
    desc: Unlock state
    cmds:
      - |
        [ -f "{{.CACHE_DIR}}/bao/token" ] && export VAULT_ADDR=https://bao.home.shdr.ch VAULT_TOKEN=$(cat {{.CACHE_DIR}}/bao/token)
        [ -f "{{.CACHE_DIR}}/google-env" ] && set -a && . "{{.CACHE_DIR}}/google-env" && set +a
        tofu -chdir=tofu force-unlock {{.CLI_ARGS}}

  k8s:auth:
    desc: Export kubeconfig + talosconfig for cluster access
    cmds:
      - |
        mkdir -p ~/.kube ~/.talos
        if tofu -chdir=tofu output -raw talos_kubeconfig > ~/.kube/config 2>/dev/null && \
           tofu -chdir=tofu output -raw talos_client_configuration > ~/.talos/config 2>/dev/null; then
          echo "✅ Exported ~/.kube/config (kubectl) and ~/.talos/config (talosctl)"
        else
          echo "⏭️  No k8s cluster in state, skipping auth export"
        fi

  # ===========================================================================
  # Talos
  # ===========================================================================
  talos:schematics:
    desc: Generate Talos Image Factory schematic IDs for Talos VM images
    cmds:
      - |
        set -euo pipefail

        standard_id="$(curl -fsS -X POST \
          -H 'Content-Type: application/yaml' \
          --data-binary @- \
          https://factory.talos.dev/schematics <<'YAML' | jq -r '.id'
        customization:
          systemExtensions:
            officialExtensions:
              - siderolabs/binfmt-misc
              - siderolabs/gvisor
              - siderolabs/kata-containers
              - siderolabs/lldpd
              - siderolabs/qemu-guest-agent
              - siderolabs/stargz-snapshotter
        YAML
        )"

        nvidia_id="$(curl -fsS -X POST \
          -H 'Content-Type: application/yaml' \
          --data-binary @- \
          https://factory.talos.dev/schematics <<'YAML' | jq -r '.id'
        customization:
          systemExtensions:
            officialExtensions:
              - siderolabs/binfmt-misc
              - siderolabs/gvisor
              - siderolabs/kata-containers
              - siderolabs/lldpd
              - siderolabs/nvidia-container-toolkit-lts
              - siderolabs/nvidia-open-gpu-kernel-modules-lts
              - siderolabs/qemu-guest-agent
              - siderolabs/stargz-snapshotter
        YAML
        )"

        printf 'talos_schematic = "%s"\n' "$standard_id"
        printf 'talos_nvidia_schematic = "%s"\n' "$nvidia_id"

  # ===========================================================================
  # Secrets (only needs Bao env vars - AWS uses ~/.aws/credentials, age uses .sops.yaml)
  # ===========================================================================
  sv:
    desc: View secrets
    cmds:
      - |
        [ -f "{{.CACHE_DIR}}/bao/token" ] && export VAULT_ADDR=https://bao.home.shdr.ch VAULT_TOKEN=$(cat {{.CACHE_DIR}}/bao/token)
        sops -d ./secrets/secrets.yml

  se:
    desc: Edit secrets
    cmds:
      - |
        [ -f "{{.CACHE_DIR}}/bao/token" ] && export VAULT_ADDR=https://bao.home.shdr.ch VAULT_TOKEN=$(cat {{.CACHE_DIR}}/bao/token)
        sops ./secrets/secrets.yml

  sg:
    desc: "Get secret (usage: task sg -- .path.to.key)"
    cmds:
      - |
        [ -f "{{.CACHE_DIR}}/bao/token" ] && export VAULT_ADDR=https://bao.home.shdr.ch VAULT_TOKEN=$(cat {{.CACHE_DIR}}/bao/token)
        sops -d ./secrets/secrets.yml | yq '{{.CLI_ARGS}}'

  sl:
    desc: List secret keys
    cmds:
      - |
        # [ -f "{{.CACHE_DIR}}/bao/token" ] && export VAULT_ADDR=https://bao.home.shdr.ch VAULT_TOKEN=$(cat {{.CACHE_DIR}}/bao/token)
        sops -d ./secrets/secrets.yml | yq '.. | path | select(length > 0) | "." + join(".")'

  sops:rotate:
    desc: Rotate all secrets with current keys
    cmds:
      - |
        [ -f "{{.CACHE_DIR}}/bao/token" ] && export VAULT_ADDR=https://bao.home.shdr.ch VAULT_TOKEN=$(cat {{.CACHE_DIR}}/bao/token)
        find secrets -name '*.yml' -o -name '*.yaml' | xargs -I{} sops updatekeys --yes {}

  gmail:reauth:
    desc: Reauthorize Mnemo Gmail and update gmail.refresh_token in SOPS
    cmds:
      - |
        [ -f "{{.CACHE_DIR}}/bao/token" ] && export VAULT_ADDR=https://bao.home.shdr.ch VAULT_TOKEN=$(cat {{.CACHE_DIR}}/bao/token)
        bb ./scripts/gmail-oauth-reauth.bb {{.CLI_ARGS}}

  # ===========================================================================
  # Ansible Galaxy (worth automating)
  # ===========================================================================
  galaxy:
    desc: Install Ansible dependencies
    dir: ./ansible
    cmds:
      - ansible-galaxy collection install -r requirements.yml
      - ansible-galaxy role install -r requirements.yml

  # ===========================================================================
  # NixOS Base Images
  # ===========================================================================
  nix:build-vm-image:
    desc: Build NixOS VM base image (qcow2 for Proxmox + Terraform)
    vars:
      STEP_CA_IP:
        sh: yq '.step_ca.ip' config/vm.yml
    cmds:
      - |
        echo "Fetching SSH CA public key from step-ca..."
        SSH_CA_PUBKEY=$(ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@{{.STEP_CA_IP}} cat /etc/step-ca/certs/ssh_user_ca_key.pub)
        echo "Building VM base image (qcow2)..."
        rm -rf .nix-vm-image
        SSH_CA_PUBKEY="$SSH_CA_PUBKEY" nix build .#vm-base-image --impure -o .nix-vm-image
        echo "✅ Image built: $(ls .nix-vm-image/*.qcow2)"

  nix:build-lxc-image:
    desc: Build NixOS LXC base image (tar.xz for Proxmox)
    vars:
      STEP_CA_IP:
        sh: yq '.step_ca.ip' config/vm.yml
    cmds:
      - |
        echo "Fetching SSH CA public key from step-ca..."
        SSH_CA_PUBKEY=$(ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@{{.STEP_CA_IP}} cat /etc/step-ca/certs/ssh_user_ca_key.pub)
        echo "Building LXC base image..."
        rm -rf .nix-lxc-image
        SSH_CA_PUBKEY="$SSH_CA_PUBKEY" nix build .#lxc-base-image --impure -o .nix-lxc-image
        echo "✅ Image built: $(ls .nix-lxc-image/tarball/*.tar.xz)"

  nix:upload-vm-image:
    desc: Upload VM base image to cephfs (for Terraform)
    deps: [nix:build-vm-image]
    vars:
      SMITH_IP: 192.168.2.204
    cmds:
      - |
        echo "Uploading VM image to cephfs..."
        ssh root@{{.SMITH_IP}} "mkdir -p /mnt/pve/cephfs/template/iso"
        rsync -avP .nix-vm-image/*.qcow2 root@{{.SMITH_IP}}:/mnt/pve/cephfs/template/iso/nixos-base-vm.qcow2.img
        echo "✅ Uploaded to cephfs:iso/nixos-base-vm.qcow2.img"
        echo ""
        echo "Reference in Terraform:"
        echo '  file_id = "cephfs:iso/nixos-base-vm.qcow2.img"'

  nix:upload-lxc-image:
    desc: Upload LXC base image to cephfs (shared across all nodes)
    deps: [nix:build-lxc-image]
    vars:
      SMITH_IP: 192.168.2.204
    cmds:
      - |
        echo "Uploading LXC image to cephfs..."
        ssh root@{{.SMITH_IP}} "mkdir -p /mnt/pve/cephfs/template/cache"
        rsync -avP .nix-lxc-image/tarball/*.tar.xz root@{{.SMITH_IP}}:/mnt/pve/cephfs/template/cache/nixos-base-lxc.tar.xz
        echo "✅ Uploaded to cephfs:vztmpl/nixos-base-lxc.tar.xz"

  # ===========================================================================
  # Playbooks
  # ===========================================================================
  provision:infra:
    cmds: [task: tofu:init, task: tofu:apply]

  ansible:playbook:
    cmds:
      - ansible-playbook ansible/playbooks/{{.CLI_ARGS}}
  provision:router:
    cmds:
      - ansible-playbook ansible/playbooks/home_router/site.yml
  configure:router:
    cmds: [ansible-playbook ansible/playbooks/home_router/configure_router.yml]
  configure:router-estate-scanner-dispatch:
    desc: Surgical SERVICES-to-TRUSTED rule 26 — Talos→estate-scanner:22 only
    cmds:
      - ansible-playbook ansible/playbooks/home_router/allow_estate_scanner_dispatch.yml
  configure:vyos-exporter:
    desc: Deploy pinned VyOS exporter release to the home router
    cmds:
      - ansible-playbook ansible/playbooks/home_router/configure_vyos_exporter.yml
  configure:vyos-observations:
    desc: Reconcile the central ClickHouse schema and OTel route for VyOS observations
    cmds:
      - ansible-playbook ansible/playbooks/monitoring_stack/configure_vyos_observations.yml
  deploy:vyos-exporter:
    desc: Deploy the pinned router exporter with OTel and ClickHouse ingestion
    cmds:
      - task: configure:vyos-observations
      - ansible-playbook ansible/playbooks/home_router/configure_otel.yml
      - task: configure:vyos-exporter
  provision:nfs:
    cmds: [ansible-playbook ansible/playbooks/network_file_server/site.yml]
  configure:gateway:
    cmds: [ansible-playbook ansible/playbooks/home_gateway_stack/site.yml]
  configure:caddy:
    cmds: [ansible-playbook ansible/playbooks/home_gateway_stack/caddy/site.yml]
  configure:dnsmasq:
    cmds: [ansible-playbook ansible/playbooks/home_gateway_stack/dnsmasq/site.yml]
  configure:monitoring:
    cmds:
      - ansible-playbook ansible/playbooks/monitoring_stack/site.yml {{.CLI_ARGS}}
  configure:argos:
    desc: Stage and validate Argos contracts on monitoring-stack; service remains disabled by default
    cmds:
      - ansible-playbook ansible/playbooks/monitoring_stack/site.yml --tags argos {{.CLI_ARGS}}
  configure:estate-scan-schema:
    desc: Apply estate_scan ClickHouse schema + writer identity on monitoring-stack
    cmds:
      - ansible-playbook ansible/playbooks/monitoring_stack/site.yml --tags estate-scan {{.CLI_ARGS}}
  configure:estate-scanner-credentials:
    desc: Deploy estate_scan ClickHouse writer password to the estate-scanner guest
    cmds:
      - ansible-playbook ansible/playbooks/estate_scanner/configure_credentials.yml {{.CLI_ARGS}}
  configure:journal-forwarder:
    desc: Deploy the OTel journal forwarder on monitoring-stack
    cmds:
      - ansible-playbook ansible/playbooks/monitoring_stack/site.yml --tags journal-forwarder {{.CLI_ARGS}}
  configure:gigahub-exporter:
    desc: Deploy the pinned GigaHub exporter on monitoring-stack
    cmds:
      - ansible-playbook ansible/playbooks/monitoring_stack/site.yml --tags gigahub-exporter {{.CLI_ARGS}}
  deploy:gigahub-exporter:
    desc: Deploy the GigaHub exporter and refresh the node agent scrape config
    cmds:
      - task: configure:gigahub-exporter
      - ansible-playbook ansible/playbooks/monitoring_stack/site.yml --tags monitoring-agent {{.CLI_ARGS}}
  configure:journal-gateways:
    desc: Deploy systemd-journal-gatewayd (mTLS) to the Proxmox hypervisors
    cmds:
      - ansible-playbook ansible/playbooks/setup_journal_gateways.yml {{.CLI_ARGS}}
  configure:grafana:
    cmds:
      - ansible-playbook ansible/playbooks/monitoring_stack/site.yml --tags grafana {{.CLI_ARGS}}
  configure:ceph-exporter:
    cmds: [ansible-playbook ansible/playbooks/configure_ceph_exporter.yml]
  configure:gitlab:
    cmds: [ansible-playbook ansible/playbooks/gitlab/site.yml]
  configure:backup:
    cmds: [ansible-playbook ansible/playbooks/backup_stack/site.yml]
  configure:iot:
    cmds: [ansible-playbook ansible/playbooks/iot_management_stack/site.yml]
  configure:vm-agents:
    cmds: [ansible-playbook ansible/playbooks/setup_vm_monitoring_agents.yml]
  configure:host-agents:
    cmds: [ansible-playbook ansible/playbooks/setup_host_monitoring_agents.yml]
  configure:cockpit-agents:
    cmds: [ansible-playbook ansible/playbooks/setup_cockpit_agents.yml]
  configure:cockpit:
    cmds: [ansible-playbook ansible/playbooks/cockpit/site.yml]
  configure:litellm-keys:
    desc: Register SOPS-backed LiteLLM virtual keys by alias
    cmds: [ansible-playbook ansible/playbooks/register_litellm_virtual_keys.yml]
  configure:notifications-stack:
    cmds: [ansible-playbook ansible/playbooks/notifications_stack/site.yml]
  configure:notifications:
    cmds: [ansible-playbook ansible/playbooks/notifications_stack/postfix.yml]
  provision:keycloak:
    cmds: [ansible-playbook ansible/playbooks/keycloak/site.yml]
  configure:keycloak:
    cmds: [ansible-playbook ansible/playbooks/keycloak/deploy_keycloak.yml]
  configure:public-gateway:
    cmds: [ansible-playbook ansible/playbooks/public_gateway_stack/site.yml]
  configure:cloud-wireguard:
    desc: Configure routed WireGuard on AWS and GCP cloud peers
    cmds:
      - ansible-playbook ansible/playbooks/public_gateway_stack/site.yml --tags site-wireguard
      - ansible-playbook ansible/playbooks/uptime_monitor_stack/site.yml --tags site-wireguard
  configure:uptime-monitor:
    desc: Deploy the GCP uptime monitor and its routed WireGuard site connection
    cmds: [ansible-playbook ansible/playbooks/uptime_monitor_stack/site.yml]
  provision:step-ca:
    cmds: [ansible-playbook ansible/playbooks/step_ca/site.yml]
  provision:step-ca-trust:
    cmds: [ansible-playbook ansible/playbooks/step_ca/provision_aws_trust.yml]
  configure:step-ca:
    cmds: [ansible-playbook ansible/playbooks/step_ca/deploy_step_ca.yml]
  backup:step-ca:
    desc: Back up step-ca CA key material to SOPS-encrypted secrets/step-ca-backup.yml
    cmds:
      - |
        [ -f "{{.CACHE_DIR}}/bao/token" ] && export VAULT_ADDR=https://bao.home.shdr.ch VAULT_TOKEN=$(cat {{.CACHE_DIR}}/bao/token)
        ansible-playbook ansible/playbooks/step_ca/backup_keys.yml
  provision:adguard:
    desc: Provision AdGuard LXC from base image
    cmds: [ansible-playbook ansible/playbooks/adguard/site.yml]
  provision:adguard-secondary:
    desc: Provision secondary AdGuard LXC from base image
    cmds: [ansible-playbook ansible/playbooks/adguard/secondary.yml]
  provision:bastion:
    desc: Provision bastion LXC from base image
    cmds: [ansible-playbook ansible/playbooks/bastion/site.yml]
  # ===========================================================================
  # NixOS Deploy Helper (internal)
  # ===========================================================================
  nix:builder:start:
    desc: Start the generic Nix builder on Neo and wait for SSH
    vars:
      BUILDER_ID:
        sh: yq '.nix_builder.id' config/vm.yml
      BUILDER_IP:
        sh: yq '.nix_builder.ip' config/vm.yml
      NODE_IP:
        sh: yq '.all.children.home.children.machines.hosts.neo.ansible_host' ansible/inventory/hosts.yml
    cmds:
      - |
        set -euo pipefail
        SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
        STATUS=$(ssh $SSH_OPTS root@{{.NODE_IP}} "qm status {{.BUILDER_ID}}" | awk '{print $2}')
        if [ "$STATUS" != "running" ]; then
          ssh $SSH_OPTS root@{{.NODE_IP}} "qm start {{.BUILDER_ID}}"
        fi
        for attempt in $(seq 1 30); do
          if ssh $SSH_OPTS -o ConnectTimeout=2 root@{{.BUILDER_IP}} true 2>/dev/null; then
            ssh $SSH_OPTS root@{{.BUILDER_IP}} "mkdir -p /var/lib/nix-builder && touch /var/lib/nix-builder/last-use"
            exit 0
          fi
          sleep 2
        done
        echo "nix-builder did not become reachable within 60 seconds" >&2
        exit 1

  nix:builder:stop:
    desc: Power off the generic Nix builder immediately
    vars:
      BUILDER_ID:
        sh: yq '.nix_builder.id' config/vm.yml
      NODE_IP:
        sh: yq '.all.children.home.children.machines.hosts.neo.ansible_host' ansible/inventory/hosts.yml
    cmds:
      - ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@{{.NODE_IP}} "qm shutdown {{.BUILDER_ID}} --timeout 60"

  _nixos-deploy:
    internal: true
    desc: |
      Internal helper for NixOS deployments. Rsyncs the repo to the target,
      then runs nixos-rebuild on the target so the (x86_64-linux) IFD inputs
      build natively — supports running deploys from non-Linux laptops.
    vars:
      STEP_CA_IP:
        sh: yq '.step_ca.ip' config/vm.yml
      REMOTE_PATH: '{{.REMOTE_PATH | default "/root/aether"}}'
      BUILD_IP: '{{.BUILD_IP | default ""}}'
      REMOTE_BUILD_PATH: '{{.REMOTE_BUILD_PATH | default "/root/aether-build"}}'
    cmds:
      - |
        set -euo pipefail
        SSH_CA_PUBKEY=$(ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@{{.STEP_CA_IP}} cat /etc/step-ca/certs/ssh_user_ca_key.pub)
        if [ -n "{{.BUILD_IP}}" ]; then
          task nix:builder:start
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@{{.BUILD_IP}} \
            "mkdir -p /var/lib/nix-builder && touch /var/lib/nix-builder/last-use"
          rsync -aH --delete --delete-excluded \
            -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            --exclude=.git \
            --exclude=.terraform \
            --exclude=secrets/ \
            --exclude=tofu/.terraform \
            --exclude=node_modules \
            ./ root@{{.BUILD_IP}}:{{.REMOTE_BUILD_PATH}}/
          SYSTEM_PATH=$(ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@{{.BUILD_IP}} \
            "cd {{.REMOTE_BUILD_PATH}} && SSH_CA_PUBKEY=\"$SSH_CA_PUBKEY\" nix --extra-experimental-features 'nix-command flakes' build --print-out-paths .#nixosConfigurations.\"{{.FLAKE_TARGET}}\".config.system.build.toplevel --no-link --impure")
          export NIX_SSHOPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          nix copy --no-check-sigs \
            --from ssh-ng://root@{{.BUILD_IP}} \
            --to ssh-ng://root@{{.TARGET_IP}} \
            "$SYSTEM_PATH"
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@{{.TARGET_IP}} \
            "nix-env -p /nix/var/nix/profiles/system --set '$SYSTEM_PATH' && '$SYSTEM_PATH/bin/switch-to-configuration' switch"
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@{{.BUILD_IP}} \
            "touch /var/lib/nix-builder/last-use"
        else
          rsync -aH --delete --delete-excluded \
            -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            --exclude=.git \
            --exclude=.terraform \
            --exclude=secrets/ \
            --exclude=tofu/.terraform \
            --exclude=node_modules \
            ./ root@{{.TARGET_IP}}:{{.REMOTE_PATH}}/
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@{{.TARGET_IP}} \
            "cd {{.REMOTE_PATH}} && SSH_CA_PUBKEY=\"$SSH_CA_PUBKEY\" nix --extra-experimental-features 'nix-command flakes' run nixpkgs#nixos-rebuild -- switch --flake .#{{.FLAKE_TARGET}} --impure"
        fi

  configure:adguard:
    desc: Deploy NixOS configuration to AdGuard LXC
    vars:
      TARGET_IP:
        sh: yq '.adguard.ip' config/vm.yml
      BUILD_IP:
        sh: yq '.nix_builder.ip' config/vm.yml
    cmds:
      - task: _nixos-deploy
        vars:
          TARGET_IP: "{{.TARGET_IP}}"
          BUILD_IP: "{{.BUILD_IP}}"
          FLAKE_TARGET: adguard
  configure:adguard-secondary:
    desc: Deploy NixOS configuration to secondary AdGuard LXC
    vars:
